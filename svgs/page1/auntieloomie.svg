<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#1a1a1a" letter-spacing="2">AUNTIELOOMIE</text>
  <text x="408" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">Folk Game  ·  6+ players  ·  Beginner</text>
  <line x1="220" y1="126" x2="596" y2="126" stroke="#ccc" stroke-width="0.75"/>
  <rect x="80" y="160" width="656" height="736" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <rect x="90" y="170" width="636" height="716" rx="3" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.1"/>
  <text x="408" y="420" text-anchor="middle" font-family="serif" font-size="120" fill="#1a1a1a" opacity="0.08">☘</text>
  <text x="408" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Players join hands in a circle and move together using a three-step</text>
  <text x="408" y="524" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">pattern: one step in, one step back, one step to the side — while</text>
  <text x="408" y="548" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">singing the call-and-response song.</text>
  <text x="408" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Keep the pattern going through each verse.</text>
  <text x="408" y="612" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">At the final kissing verse, players drop hands and quickly find a</text>
  <text x="408" y="636" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">partner to give a friendly kiss on the cheek before reforming the</text>
  <text x="408" y="660" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">circle for the next round.</text>
  <text x="408" y="1014" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ccc">Heritage Parlor  ·  Page 1 of 2  ·  Turn over for full instructions</text>
</svg>