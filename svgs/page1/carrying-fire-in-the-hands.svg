  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="82" text-anchor="middle" font-family="&apos;Playfair Display&apos;, Georgia, serif" font-size="34" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CARRYING FIRE IN THE HANDS</text>
  <text x="408" y="110" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="14" fill="#555">Magic Trick  ·  Performer + audience players  ·  Beginner</text>
  <line x1="220" y1="126" x2="596" y2="126" stroke="#ccc" stroke-width="0.75"/>
  <rect x="80" y="160" width="656" height="736" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <rect x="90" y="170" width="636" height="716" rx="3" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.1"/>
  <text x="408" y="420" text-anchor="middle" font-family="serif" font-size="120" fill="#1a1a1a" opacity="0.08">✦</text>
  <text x="408" y="500" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">Effect: The performer&apos;s hands appear to be on fire — but they&apos;re</text>
  <text x="408" y="524" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">unharmed.</text>
  <text x="408" y="556" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">Method: Wet both hands THOROUGHLY with water first.</text>
  <text x="408" y="588" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">Quickly apply a tiny amount of isopropyl alcohol (rubbing alcohol —</text>
  <text x="408" y="612" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">no more than a teaspoon).</text>
  <text x="408" y="664" text-anchor="middle" font-family="&apos;Playfair Display&apos;, Georgia, serif" font-size="14" font-weight="bold" fill="#8b4513">You will need:</text>
  <text x="408" y="688" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="14" fill="#555">surgical spirit</text>
  <text x="408" y="710" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="14" fill="#555">damp hands</text>
  <text x="408" y="1014" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="11" fill="#ccc">Heritage Parlor  ·  Page 1 of 2  ·  Turn over for full instructions</text>
