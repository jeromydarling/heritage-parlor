<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <style>@import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Source+Sans+3:wght@300;400;600&amp;display=swap");</style>
    <pattern id="ph" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="82" text-anchor="middle" font-family="&apos;Playfair Display&apos;, Georgia, serif" font-size="34" font-weight="bold" fill="#1a1a1a" letter-spacing="2">TWENTY QUESTIONS</text>
  <text x="408" y="110" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="14" fill="#555">Parlor Game  ·  Any players  ·  Beginner</text>
  <line x1="220" y1="126" x2="596" y2="126" stroke="#ccc" stroke-width="0.75"/>
  <rect x="80" y="160" width="656" height="736" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <rect x="90" y="170" width="636" height="716" rx="3" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.1"/>
  <text x="408" y="420" text-anchor="middle" font-family="serif" font-size="120" fill="#1a1a1a" opacity="0.08">❧</text>
  <text x="408" y="500" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">One player thinks of a specific person, place, or object and says</text>
  <text x="408" y="524" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">&apos;I&apos;m thinking of something — animal, vegetable, or mineral?&apos; The</text>
  <text x="408" y="548" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">group takes turns asking yes/no questions to narrow it down.</text>
  <text x="408" y="580" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">The thinker can only answer &apos;yes,&apos; &apos;no,&apos; or &apos;sort of.</text>
  <text x="408" y="612" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">&apos; The group has exactly 20 questions total to name it.</text>
  <text x="408" y="1014" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="11" fill="#ccc">Heritage Parlor  ·  Page 1 of 2  ·  Turn over for full instructions</text>
</svg>