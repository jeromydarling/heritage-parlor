<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE HAT AND DIE TRICK</text>
  <text x="408" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">Magic Trick  ·  Performer + audience players  ·  Advanced</text>
  <line x1="220" y1="126" x2="596" y2="126" stroke="#ccc" stroke-width="0.75"/>
  <rect x="80" y="160" width="656" height="736" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <rect x="90" y="170" width="636" height="716" rx="3" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.1"/>
  <text x="408" y="420" text-anchor="middle" font-family="serif" font-size="120" fill="#1a1a1a" opacity="0.08">✦</text>
  <text x="408" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Effect: A die placed under a cover on a hat vanishes and is found in</text>
  <text x="408" y="524" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">a second hat.</text>
  <text x="408" y="556" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Method: the visible die is hollow (a shell) with the real solid die</text>
  <text x="408" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">inside it.</text>
  <text x="408" y="612" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">When the cover is lowered over the die on the hat brim, its rim</text>
  <text x="408" y="636" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">catches the hollow shell and lifts it away invisibly as the cover is</text>
  <text x="408" y="660" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">&apos;removed&apos; — the shell rides up inside the cover.</text>
  <text x="408" y="712" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#8b4513">You will need:</text>
  <text x="408" y="736" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">two identical top hats</text>
  <text x="408" y="758" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">hollow die (larger)</text>
  <text x="408" y="780" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">solid die (smaller)</text>
  <text x="408" y="802" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">cover</text>
  <text x="408" y="1014" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ccc">Heritage Parlor  ·  Page 1 of 2  ·  Turn over for full instructions</text>
</svg>