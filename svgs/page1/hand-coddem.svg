<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HAND (CODDEM)</text>
  <text x="408" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">Parlor Game  ·  Sides players  ·  Beginner</text>
  <line x1="220" y1="126" x2="596" y2="126" stroke="#ccc" stroke-width="0.75"/>
  <rect x="80" y="160" width="656" height="736" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <rect x="90" y="170" width="636" height="716" rx="3" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.1"/>
  <text x="408" y="420" text-anchor="middle" font-family="serif" font-size="120" fill="#1a1a1a" opacity="0.08">❧</text>
  <text x="408" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Team A has a small object (a coin, a button, a pebble).</text>
  <text x="408" y="532" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">All Team A players hold both fists closed — but only one person holds</text>
  <text x="408" y="556" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">the object, in one specific hand.</text>
  <text x="408" y="588" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">Team B must guess: which player has it, AND which hand? Team A may</text>
  <text x="408" y="612" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">shuffle and pass the object between players between guesses to</text>
  <text x="408" y="636" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a">confuse.</text>
  <text x="408" y="688" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#8b4513">You will need:</text>
  <text x="408" y="712" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#555">small coin or pebble</text>
  <text x="408" y="1014" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ccc">Heritage Parlor  ·  Page 1 of 2  ·  Turn over for full instructions</text>
</svg>