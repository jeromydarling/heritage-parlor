<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <style>@import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Source+Sans+3:wght@300;400;600&amp;display=swap");</style>
    <pattern id="ph" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="82" text-anchor="middle" font-family="&apos;Playfair Display&apos;, Georgia, serif" font-size="34" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SCULPTOR</text>
  <text x="408" y="110" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="14" fill="#555">Physical Game  ·  Any players  ·  Beginner</text>
  <line x1="220" y1="126" x2="596" y2="126" stroke="#ccc" stroke-width="0.75"/>
  <rect x="80" y="160" width="656" height="736" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <rect x="90" y="170" width="636" height="716" rx="3" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.1"/>
  <text x="408" y="420" text-anchor="middle" font-family="serif" font-size="120" fill="#1a1a1a" opacity="0.08">⚡</text>
  <text x="408" y="500" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">The Sculptor takes a player, spins them gently a few times, and</text>
  <text x="408" y="524" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">releases them.</text>
  <text x="408" y="556" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">The player must INSTANTLY freeze in whatever position they land — no</text>
  <text x="408" y="580" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">adjusting, no matter how awkward! The Sculptor works around the room</text>
  <text x="408" y="604" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">creating a gallery of frozen poses.</text>
  <text x="408" y="636" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">After everyone is &apos;sculpted,&apos; the group votes: best pose, funniest</text>
  <text x="408" y="660" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="16" fill="#1a1a1a">pose, most dramatic pose.</text>
  <text x="408" y="1014" text-anchor="middle" font-family="&apos;Source Sans 3&apos;, Georgia, sans-serif" font-size="11" fill="#ccc">Heritage Parlor  ·  Page 1 of 2  ·  Turn over for full instructions</text>
</svg>