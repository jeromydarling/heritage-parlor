<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE KNIGHT&apos;S TOUR</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chessboard or grid paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chess knight or marker</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place a chess knight on any square of an 8×8 chessboard. Move it</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">using only legal knight moves (L-shaped: two squares one direction,</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one square perpendicular). Visit every square exactly once — 64</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">squares total. A &apos;closed&apos; tour ends a knight&apos;s move away from the</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">starting square. A good solving strategy: always move to the square</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">that has the fewest onward moves available (Warnsdorff&apos;s Rule). A</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">chessboard and a knight piece are all you need — or draw a grid on</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper and use a coin as your marker.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Knight&apos;s Tour problem was studied by Euler in 1759 and by</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Al-Adli in 840 AD. The total number of closed knight&apos;s tours on an</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">8×8 board is 26,534,728,821,064 — a number not computed until 1995</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">using modern computers.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A chess knight must tour every square of an 8×8 board, landing on</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">each exactly once, making only legal knight moves (one square in</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">one direction, two in the other). The challenge is to find a</text>
  <text x="110" y="712" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">complete tour — or better, a re-entrant tour where the knight can</text>
  <text x="110" y="730" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">return to its starting square in one final move.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>