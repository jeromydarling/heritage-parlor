<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE RIVER CROSSING (FOX, GOOSE, AND B...</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">You need to cross a river with a fox, a goose, and a bag of corn. Your boat</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">holds only you and one passenger at a time. Left unsupervised: fox eats the</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">goose; goose eats the corn. Solution: 1) Take the goose across. 2) Return</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">alone. 3) Take the fox across. 4) Bring the goose back. 5) Take the corn</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">across. 6) Return alone. 7) Take the goose across. Seven trips total. The key</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">insight most people miss: you&apos;re allowed to bring something back.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This puzzle appears in Alcuin of York&apos;s &apos;Propositiones ad Acuendos Juvenes&apos;</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(Problems to Sharpen the Young) written around 800 AD — making it at least</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1,200 years old. It is one of the oldest documented recreational mathematical</text>
  <text x="56" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzles in Western literature.</text>
  <text x="56" y="516" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A farmer must cross a river with a fox, a goose, and a bag of corn. The boat</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">holds only the farmer and one item. Left alone, the fox will eat the goose;</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the goose will eat the corn. How does he cross without any loss?</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>