<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PERPLEXED CELLARMAN</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  24 tokens</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Arrange 24 objects in a 5×5 grid (with the center left empty) so</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">that each of the four outer sides has the same number. The corner</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">objects are shared between two sides. If each side must total 7:</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">figure out how many go in the corners vs. the middle of each side.</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">There are multiple valid arrangements — can you find more than one?</text>
  <text x="110" y="437" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian cellars were serious business — a well-stocked and</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">organized wine cellar was a mark of good household management,</text>
  <text x="110" y="497" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">making this a charmingly domestic puzzle.</text>
  <text x="110" y="531" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Arrange 24 bottles in a cellar so that every row contains the same</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">number.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>