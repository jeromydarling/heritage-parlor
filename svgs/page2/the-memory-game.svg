<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MEMORY GAME</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  tray</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  20+ small objects</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Need: a tray, 20–30 small objects (anything from around the house —</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keys, coins, pencils, erasers, spoons). Lay them all on the tray</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and give everyone one minute to silently memorize them. Cover the</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tray with a cloth. Players write down every object they can</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">remember. Most correct items wins. Variation: secretly remove one</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">item and ask players to name what&apos;s missing.</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="526" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Memory games were prescribed by Victorian physicians as mental</text>
  <text x="110" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">exercise to prevent the &apos;decay of faculties&apos; — an early forerunner</text>
  <text x="110" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of modern cognitive health practices.</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="620" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players study a tray of objects for one minute, then must list as</text>
  <text x="110" y="638" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">many as they can remember after the tray is covered.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>