<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MEMORY GAME</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  tray</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  20+ small objects</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Need: a tray, 20–30 small objects (anything from around the house — keys,</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">coins, pencils, erasers, spoons). Lay them all on the tray and give everyone</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one minute to silently memorize them. Cover the tray with a cloth. Players</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">write down every object they can remember. Most correct items wins.</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Variation: secretly remove one item and ask players to name what&apos;s missing.</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="451" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Memory games were prescribed by Victorian physicians as mental exercise to</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">prevent the &apos;decay of faculties&apos; — an early forerunner of modern cognitive</text>
  <text x="56" y="487" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">health practices.</text>
  <text x="56" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players study a tray of objects for one minute, then must list as many as</text>
  <text x="56" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">they can remember after the tray is covered.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>