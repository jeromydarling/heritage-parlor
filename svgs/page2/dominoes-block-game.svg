<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">DOMINOES (BLOCK GAME)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  28-tile double-six domino set</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw 7 tiles each (2 players) or 5 tiles each (3–4 players); leave the rest</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">as the &apos;boneyard.&apos; The player with the highest double places it first.</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players take turns placing a tile so its number matches an open end of the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">chain. Can&apos;t play? Draw from the boneyard until you can. Once the boneyard is</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">empty and you still can&apos;t play, you pass. Game ends when one player runs out</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of tiles (they win) or all players are blocked (lowest total pip count wins).</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Score the winner&apos;s total as the sum of everyone else&apos;s remaining pips.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Dominoes arrived in Europe from China around 1750. The name comes from the</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">black-and-white domino masquerade masks worn by priests. The double-six set</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of 28 tiles became standard in the 18th century and remains the most common</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">set.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The ancient tiled game of matching numbers end-to-end to build a chain.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>