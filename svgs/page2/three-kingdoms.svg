<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THREE KINGDOMS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player thinks of any object and announces which of the three kingdoms it</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">belongs to: animal (anything that comes from a living creature), vegetable</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(plants, wood, cotton), or mineral (rocks, metals, glass). The other players</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">take turns asking yes/no questions to narrow it down. Classic starters: &apos;Is</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it alive?&apos;, &apos;Is it bigger than a person?&apos;, &apos;Can you eat it?&apos;, &apos;Is it used by</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">humans?&apos; Whoever correctly names the object gets the next turn as thinker.</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">This is the direct ancestor of Twenty Questions.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three Kingdoms is the earliest recorded version of what became the famous</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">game &apos;Twenty Questions&apos; — the animal/vegetable/mineral format was so</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">well-established by the Victorian era that it was used as a pedagogical tool</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in natural history education.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player thinks of an object from the animal, vegetable, or mineral</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">kingdom. Others ask questions that can be answered yes or no, trying to</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">narrow down what the object is. The questioners must determine the kingdom</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">first, then zero in on the specific object.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>