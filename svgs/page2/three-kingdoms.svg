<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THREE KINGDOMS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player thinks of any object and announces which of the three</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">kingdoms it belongs to: animal (anything that comes from a living</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">creature), vegetable (plants, wood, cotton), or mineral (rocks,</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">metals, glass). The other players take turns asking yes/no</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">questions to narrow it down. Classic starters: &apos;Is it alive?&apos;, &apos;Is</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it bigger than a person?&apos;, &apos;Can you eat it?&apos;, &apos;Is it used by</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">humans?&apos; Whoever correctly names the object gets the next turn as</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thinker. This is the direct ancestor of Twenty Questions.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three Kingdoms is the earliest recorded version of what became the</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">famous game &apos;Twenty Questions&apos; — the animal/vegetable/mineral</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">format was so well-established by the Victorian era that it was</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">used as a pedagogical tool in natural history education.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player thinks of an object from the animal, vegetable, or</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mineral kingdom. Others ask questions that can be answered yes or</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">no, trying to narrow down what the object is. The questioners must</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">determine the kingdom first, then zero in on the specific object.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>