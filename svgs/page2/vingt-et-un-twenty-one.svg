<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">VINGT-ET-UN (TWENTY-ONE)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player is Banker. Everyone places bets (use points or chips, not money).</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The Banker deals one card face-down to each player. Players then choose to</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">receive more cards face-down (&apos;buy&apos; them) or face-up (&apos;twist&apos;). Goal: get</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">closer to 21 than the Banker without going over. A natural (Ace + face card =</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">called Pontoon or Blackjack) beats everything and the Banker must pay double.</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Banker wins all ties. This is the exact same game as modern Blackjack — just</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with different names. Note: family-friendly version uses points, not money.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Vingt-et-Un arrived in France from Spain in the 17th century and reached</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Britain by 1800. Napoleon was reportedly fond of it. The identical game</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">became Blackjack in American casinos in the 1930s when casinos began offering</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a bonus for a natural with a black Jack.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The ancestor of modern Blackjack - reach 21 without going bust to beat the</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bank.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>