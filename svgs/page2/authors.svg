<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">AUTHORS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  Authors illustrated card set</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Use the Authors deck (13 sets of 4 cards — each set is one author</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with their 4 most famous works). Deal all cards. On your turn, ask</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">any player for a specific card (e.g., &apos;Do you have Dickens&apos;s A Tale</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of Two Cities?&apos;). If they have it, you take it and ask again. If</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">not, your turn ends. Lay down complete sets of all four works when</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you collect them. Player with the most complete sets wins. If you</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">don&apos;t have the deck, make your own with any category — movies,</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">athletes, bands — just keep the 4-card-per-set format.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Authors was designed by Anne W. Abbott and published in 1861,</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">making it one of the first explicitly educational card games in</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">America. The standard deck included Shakespeare, Dickens, Tennyson,</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Longfellow, and Whittier.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An educational Victorian card game: collect complete sets of four</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">famous works by each great author.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>