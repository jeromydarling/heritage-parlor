<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE BOOMERANG (CARD TRICK)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  visiting card or playing card</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Take a playing card and fold it very slightly along its length — a gentle</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">curve, not a sharp crease. Hold the card vertically by one short end between</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thumb and forefinger. Flick your wrist sharply to release it with backspin,</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">throwing it at a slight upward angle. When released correctly, the card</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">curves away and loops back toward you. It takes practice to get the wrist</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">snap and angle right, but the aerodynamics are genuine — the bent card acts</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">like a tiny wing generating asymmetric lift.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Australian boomerangs were a sensation at Victorian exhibitions, and</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;boomerang tricks&apos; with cards, hoops, and sticks became fashionable parlor</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">diversions in the 1850s-60s as the unusual returning trajectory fascinated</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">European observers.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A stiff card is bent slightly and thrown with a particular wrist action so</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that it spins and curves through the air, returning like a boomerang to the</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">thrower. The card creates its own gyroscopic flight path when given proper</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">backspin.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>