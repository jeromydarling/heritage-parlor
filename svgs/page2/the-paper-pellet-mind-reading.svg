<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PAPER PELLET MIND-READING</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper pellets</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Three spectators write secret words on paper, fold them up, and you</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">appear to read all three minds. Method: Before the trick, write a known word</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on a dummy pellet. Draw the first real pellet from a hat, press it to your</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">forehead, and name your PRE-WRITTEN word as if &apos;reading&apos; it — but open the</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pellet secretly and read what&apos;s actually written. For the second pellet, name</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">what you just read (from the first), then secretly read that pellet. Repeat —</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you&apos;re always one step ahead. Confidence makes this work; hesitation breaks</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This is the foundation of a classic three-pellet trick that has fooled highly</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">intelligent spectators including scientists. The key is confidence - the</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">transition between reading the previous pellet and naming it as the current</text>
  <text x="56" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">one is purely psychological.</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three spectators write secret words on paper, fold them - the magician reads</text>
  <text x="56" y="622" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all three minds.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>