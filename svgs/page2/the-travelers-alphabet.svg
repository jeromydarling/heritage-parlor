<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE TRAVELER&apos;S ALPHABET</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players sit in a row. The first player says something like &apos;I traveled to</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Athens and ate artichokes&apos; — every key word must start with A. The next</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player does the same for B: &apos;I traveled to Berlin and bought books.&apos; Continue</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through the alphabet, one letter per person. Anyone who hesitates too long or</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">uses the wrong letter pays a silly penalty (do a funny dance, tell a joke, or</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sing a line of a song). Z is traditionally excused since it&apos;s so hard. You</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">can make it easier by only requiring the destination to start with the</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">letter.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Traveler&apos;s Alphabet was one of the most popular Victorian alphabet games</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">because geography was an admired accomplishment. A player who knew their</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">atlas well had a genuine advantage.</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players in a row must each name a place and activity beginning with</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">successive letters of the alphabet.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>