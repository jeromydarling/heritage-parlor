<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE FOUR COLOURS PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  puzzle box with four colored stalls</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  four colored pellets</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Tilt the enclosed box so the four colored pellets roll freely</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">inside. Guide each pellet toward its matching-colored stall through</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">careful tilting. The challenge: positioning one pellet correctly</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tends to dislodge the others. Develop a system: get three pellets</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">into their stalls, then make tiny adjustments to guide the fourth</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">without losing the first three. Build a mental map of the box&apos;s</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">interior through trial and error. Color-sorting dexterity puzzles</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">like this are still sold as novelty items.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The title &apos;Four Colours&apos; in this context refers to the four stall</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">colors — it predates the famous Four Color Map Theorem (proved</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1976), which states that any map can be colored with just four</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">colors so no adjacent regions share a color.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Four differently colored stalls (red, white, blue, and mixed) are</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">inside a box. Four colored pellets must be maneuvered by tilting</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the box until each pellet rests in the stall matching its color. A</text>
  <text x="110" y="712" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pure dexterity challenge of color-matching through delicate box</text>
  <text x="110" y="730" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">manipulation.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>