<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PASSE-PASSE BOTTLE AND GLASS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  2 cardboard tubes</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  special bottle and glass</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A bottle and a glass covered by two cardboard tubes repeatedly swap</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">places — the bottle is here, now it&apos;s there, back again — impossibly. Method:</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The bottle is hollow at the bottom and fits over the glass like a cover. One</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of the tubes is large enough to cover both objects at once. During the</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;swap,&apos; both objects end up under one tube briefly, then are revealed</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">separately in switched positions. The routine can be repeated multiple times</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">before the method is spotted. Note: requires the special prop</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bottle-and-glass set.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Passe-Passe or Bottle and Glass became one of the most commercially</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">successful tricks of the Victorian era. Robert-Houdin performed it for</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Napoleon III and received a diamond ring. The prop was sold in magic shops</text>
  <text x="56" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">throughout London.</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A bottle and glass covered by tubes repeatedly and impossibly swap positions.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>