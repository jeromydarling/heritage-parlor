<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ANIMAL VEGETABLE OR MINERAL</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player thinks of any object, person, or concept and keeps it</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">secret. Everyone else gets to ask up to 20 yes/no questions to</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">figure out what it is. The thinker answers only &apos;Yes,&apos; &apos;No,&apos; or</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Sometimes.&apos; The first question is traditionally &apos;Is it animal,</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">vegetable, or mineral?&apos; (animal = alive or once-alive creature;</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">vegetable = plant-based; mineral = everything else). Whoever</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">guesses correctly goes next. If no one guesses in 20 questions, the</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thinker wins that round and thinks of something new.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Animal, Vegetable, or Mineral (also called Twenty Questions) became</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a hugely popular BBC radio panel programme in 1952, running for</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">nine years. The taxonomy reflects Victorian natural history</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">categories taught in schools.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player thinks of an object; others ask only yes/no questions to</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">identify it in twenty questions.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>