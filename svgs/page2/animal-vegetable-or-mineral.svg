<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ANIMAL VEGETABLE OR MINERAL</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player thinks of any object, person, or concept and keeps it secret.</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Everyone else gets to ask up to 20 yes/no questions to figure out what it is.</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The thinker answers only &apos;Yes,&apos; &apos;No,&apos; or &apos;Sometimes.&apos; The first question is</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">traditionally &apos;Is it animal, vegetable, or mineral?&apos; (animal = alive or</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">once-alive creature; vegetable = plant-based; mineral = everything else).</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Whoever guesses correctly goes next. If no one guesses in 20 questions, the</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thinker wins that round and thinks of something new.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Animal, Vegetable, or Mineral (also called Twenty Questions) became a hugely</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">popular BBC radio panel programme in 1952, running for nine years. The</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">taxonomy reflects Victorian natural history categories taught in schools.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player thinks of an object; others ask only yes/no questions to identify</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it in twenty questions.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>