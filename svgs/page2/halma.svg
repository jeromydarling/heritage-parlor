<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HALMA</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  16x16 Halma board</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pieces in up to 4 colors</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player&apos;s pieces start in a corner &apos;camp&apos; on the 16×16 grid. On</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">each turn, move one piece: either slide it to an adjacent square,</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">or jump over any adjacent piece (yours or an opponent&apos;s) in a</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">straight line. You can chain multiple jumps in a single turn. Goal:</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">move all your pieces into the opposite corner camp. No pieces are</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">captured — it&apos;s a pure racing game. Jumping chains can move pieces</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">across the board in one dramatic turn, so look for those</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opportunities. Can be played by 2 or 4 players.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Halma was invented in 1883 by George Howard Monks, a Harvard</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">medical professor, and became an immediate Victorian parlor</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sensation. Halma means &apos;jump&apos; in Greek. A smaller 8x8 version</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">developed into Chinese Checkers in 1892.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Victorian British invention: race all your pieces to the opposite</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">corner by jumping over others.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>