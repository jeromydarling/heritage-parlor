<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HALMA</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  16x16 Halma board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pieces in up to 4 colors</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player&apos;s pieces start in a corner &apos;camp&apos; on the 16×16 grid. On each</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">turn, move one piece: either slide it to an adjacent square, or jump over any</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">adjacent piece (yours or an opponent&apos;s) in a straight line. You can chain</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">multiple jumps in a single turn. Goal: move all your pieces into the opposite</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">corner camp. No pieces are captured — it&apos;s a pure racing game. Jumping chains</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">can move pieces across the board in one dramatic turn, so look for those</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opportunities. Can be played by 2 or 4 players.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Halma was invented in 1883 by George Howard Monks, a Harvard medical</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">professor, and became an immediate Victorian parlor sensation. Halma means</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;jump&apos; in Greek. A smaller 8x8 version developed into Chinese Checkers in</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1892.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Victorian British invention: race all your pieces to the opposite corner by</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">jumping over others.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>