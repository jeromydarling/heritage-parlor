<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">LOST AND FOUND</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small hidden object</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player leaves the room. The others hide a small object (a coin,</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">button, or ring) somewhere in plain sight but in an unusual spot.</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The hunter returns and searches. The audience gives hints using</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">only their facial expressions and body language — growing tense</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">when the hunter is getting warm, relaxing when they wander away. No</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">words or sounds allowed. This is harder than it sounds for both</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sides: the hunter must read faces carefully, and the audience must</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keep poker faces. First to find it in five games wins.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Lost and Found (a simpler version of Hot Boiled Beans) was</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">recommended for quieter Victorian parties because it required no</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">noise or physical activity - only keen observation. The social</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">reading of faces was a valued Victorian social skill.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player hides an object; the others hunt for it guided only by</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">observation of faces.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>