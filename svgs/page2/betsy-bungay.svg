<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BETSY BUNGAY</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Two players face each other and clasp each other&apos;s wrists crosswise to form a</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">seat. A third player sits on the linked arms. The carriers walk and all three</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sing the Betsy Bungay song together. On the final word — surprise! — the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">carriers unclasp, depositing the passenger gently onto the grass to a shriek</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of laughter. Play on soft ground and agree in advance so no one falls hard.</text>
  <text x="56" y="383" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The sedan chair — a covered litter carried by two footmen — was a luxury form</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of transport in 18th-century Britain, and this game mischievously mimics the</text>
  <text x="56" y="443" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">grand experience before deliberately depositing the &apos;passenger&apos; on the</text>
  <text x="56" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ground.</text>
  <text x="56" y="495" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two children cross hands to make a &apos;sedan chair.&apos; A third child sits on their</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">linked hands. They sing: &apos;Hi, Betsy Bungay, all day on Sunday; / You&apos;re the</text>
  <text x="56" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">lock and I&apos;m the key, / All day on Monday.&apos; On the last line, they unclasp</text>
  <text x="56" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">their hands and drop their passenger.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>