<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGNETIZED CANE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  walking cane</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  horsehair or fine thread attached to clothing</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A walking cane stands upright without visible support, dances, bows,</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and follows your hand — apparently attracted by magnetism. Method: attach a</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">long fine thread between a hook on your trouser leg (near the knee) and the</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cane&apos;s balance point. Standing still, the thread is nearly invisible. Place</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the cane at the thread&apos;s length from your body — it hangs suspended,</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">seemingly unsupported. By shifting your leg, you make the cane dance. Modern</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">performers use thin monofilament fishing line. Practice the leg movements</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">until they appear to be natural standing shifts.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fine horsehair was the standard invisible thread in Victorian magic —</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performers prized individual hairs selected for their fineness and length.</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Modern magicians use monofilament fishing line or specialty &apos;invisible</text>
  <text x="56" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">thread&apos; sold by magic suppliers.</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A walking cane appears to dance and balance unsupported, following the</text>
  <text x="56" y="622" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer&apos;s hand without touching it. A barely visible horsehair or fine</text>
  <text x="56" y="640" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">thread runs from the cane to a hook on the performer&apos;s trouser leg —</text>
  <text x="56" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">movements of the legs control the cane&apos;s dance.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>