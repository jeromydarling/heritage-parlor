<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGNETIZED CANE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  walking cane</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  horsehair or fine thread attached to clothing</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A walking cane stands upright without visible support,</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dances, bows, and follows your hand — apparently attracted by</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">magnetism. Method: attach a long fine thread between a hook on your</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">trouser leg (near the knee) and the cane&apos;s balance point. Standing</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">still, the thread is nearly invisible. Place the cane at the</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thread&apos;s length from your body — it hangs suspended, seemingly</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">unsupported. By shifting your leg, you make the cane dance. Modern</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">performers use thin monofilament fishing line. Practice the leg</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">movements until they appear to be natural standing shifts.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fine horsehair was the standard invisible thread in Victorian magic</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">— performers prized individual hairs selected for their fineness</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and length. Modern magicians use monofilament fishing line or</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">specialty &apos;invisible thread&apos; sold by magic suppliers.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A walking cane appears to dance and balance unsupported, following</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the performer&apos;s hand without touching it. A barely visible</text>
  <text x="110" y="715" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">horsehair or fine thread runs from the cane to a hook on the</text>
  <text x="110" y="733" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer&apos;s trouser leg — movements of the legs control the cane&apos;s</text>
  <text x="110" y="751" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dance.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>