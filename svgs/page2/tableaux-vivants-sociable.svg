<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">TABLEAUX VIVANTS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  costumes</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  simple backdrop or curtain</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  props</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">A team secretly plans and costumes a famous scene from history, art, or</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mythology, then arranges themselves behind a curtain or blanket. On a signal,</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the curtain opens — and they freeze in a perfect living picture and hold it</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">silently for 30 to 60 seconds. The audience studies them carefully and then</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tries to identify the scene. No speaking or moving allowed during the</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tableau. Lighting effects (a flashlight from below, different colored lights)</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">add drama. Costume creativity is half the fun.</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="493" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Tableaux Vivants were enormously fashionable in Victorian America and Europe</text>
  <text x="56" y="511" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">from the 1820s to 1900s. The most ambitious included professional lighting,</text>
  <text x="56" y="529" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">gauze screens for supernatural effects, and original costume design —</text>
  <text x="56" y="547" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">essentially amateur theatre without dialogue.</text>
  <text x="56" y="581" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="605" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Groups of participants arrange themselves to form a living picture of a</text>
  <text x="56" y="623" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">historical scene, painting, or dramatic moment and hold it perfectly still</text>
  <text x="56" y="641" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">while the audience observes. Popular scenes include &apos;The Army and Navy&apos;</text>
  <text x="56" y="659" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(soldiers flanking the Goddess of Liberty) and &apos;The Drunkard&apos;s Home&apos; (a</text>
  <text x="56" y="677" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">miserable family scene).</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>