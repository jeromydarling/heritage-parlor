<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DOUBLE MEANING</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hat</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass of any liquid</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Challenge a friend: &apos;I bet I can drink this glass of water under my hat,</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">without touching the hat.&apos; They accept. Put the hat on your head. Get down on</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your hands and knees (you are now physically under the hat). Go through the</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">motion of &apos;drinking&apos; on the floor. Stand up, pick up the glass, and drink it</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">openly. When your friend objects, point out: you drank the water while you</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">were under the hat — exactly as promised. It&apos;s a word-trick, not a physical</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">feat. The fun is in their expression when they realize they agreed to the</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wrong definition.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Wager tricks that win through word-play rather than physical skill were a</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">staple of Victorian club entertainment. Being able to win a bet through wit</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">was considered a mark of intelligence and good humor.</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The performer bets they can drink a glass of liquid under a hat without</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">touching the hat. The spectator accepts the wager. The performer gets on</text>
  <text x="56" y="622" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">hands and knees, acts as if drinking from under the hat, then stands up and</text>
  <text x="56" y="640" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">drinks the glass openly — having fulfilled the literal wager of drinking</text>
  <text x="56" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;under&apos; the hat (they were below it) without touching it.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>