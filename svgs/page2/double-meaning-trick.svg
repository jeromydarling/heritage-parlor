<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DOUBLE MEANING</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hat</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass of any liquid</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Challenge a friend: &apos;I bet I can drink this glass of water under my</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hat, without touching the hat.&apos; They accept. Put the hat on your</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">head. Get down on your hands and knees (you are now physically</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">under the hat). Go through the motion of &apos;drinking&apos; on the floor.</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Stand up, pick up the glass, and drink it openly. When your friend</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">objects, point out: you drank the water while you were under the</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hat — exactly as promised. It&apos;s a word-trick, not a physical feat.</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The fun is in their expression when they realize they agreed to the</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wrong definition.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Wager tricks that win through word-play rather than physical skill</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">were a staple of Victorian club entertainment. Being able to win a</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bet through wit was considered a mark of intelligence and good</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">humor.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The performer bets they can drink a glass of liquid under a hat</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">without touching the hat. The spectator accepts the wager. The</text>
  <text x="110" y="715" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer gets on hands and knees, acts as if drinking from under</text>
  <text x="110" y="733" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the hat, then stands up and drinks the glass openly — having</text>
  <text x="110" y="751" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fulfilled the literal wager of drinking &apos;under&apos; the hat (they were</text>
  <text x="110" y="769" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">below it) without touching it.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>