<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PIQUET</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  32-card Piquet deck (7 through Ace in 4 suits)</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Remove all 2s through 6s, leaving 32 cards. Deal 12 each; 8 cards form the</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;talon&apos; (spare pile). Each player may swap up to 5 cards to improve their</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hand. Before play, declare and score combinations: Point (longest suit),</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Sequence (run of 3+ in a suit), Set (three or four of a kind). Then play 12</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tricks. Special scoring: Repique (reaching 30 points in declarations before</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opponent scores anything) = 60 bonus points; Pique (reaching 30 first during</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">play) = 30 bonus. The scoring system is complex but rewards deep strategy.</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One of the finest two-player card games ever made.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Piquet dates to 1535 and was the card game of French nobility - Cardinal</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Mazarin played it. It appears in Dickens, Thackeray, and Trollope. Foster</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">called it &apos;the finest card game for two persons ever invented.&apos;</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The grand French two-player card game, considered the most intellectually</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">demanding of all traditional card games.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>