<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">OLD SOLDIER</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  walking stick</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The Old Soldier (walking stick required) limps around asking every</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player tricky questions. Everyone must answer without using any of</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the six forbidden words: &apos;Yes,&apos; &apos;No,&apos; &apos;Nay,&apos; &apos;Black,&apos; &apos;White,&apos; or</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Grey.&apos; Every slip earns the soldier a point or a fun token. The</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Soldier tries to slip you up with quick, natural-feeling questions.</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Far harder than it sounds — avoiding &apos;yes&apos; and &apos;no&apos; is a real brain</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">workout.</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Word-avoidance games like Old Soldier are among the oldest parlor</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">entertainments in existence — similar games appear in medieval</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">European manuscripts, and the specific taboo words varied by region</text>
  <text x="110" y="557" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and era.</text>
  <text x="110" y="591" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player acts as an old soldier limping with a stick, begging</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">garments and items from other players. When asked questions,</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">players must answer without saying &apos;Yes,&apos; &apos;No,&apos; &apos;Nay,&apos; &apos;Black,&apos;</text>
  <text x="110" y="669" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;White,&apos; or &apos;Grey.&apos; Those who slip and say a forbidden word owe a</text>
  <text x="110" y="687" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">forfeit to the old soldier.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)  ·  Heritage Parlor</text>
</svg>