<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">OLD SOLDIER</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  walking stick</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The Old Soldier (walking stick required) limps around asking every player</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tricky questions. Everyone must answer without using any of the six forbidden</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">words: &apos;Yes,&apos; &apos;No,&apos; &apos;Nay,&apos; &apos;Black,&apos; &apos;White,&apos; or &apos;Grey.&apos; Every slip earns the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">soldier a point or a fun token. The Soldier tries to slip you up with quick,</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">natural-feeling questions. Far harder than it sounds — avoiding &apos;yes&apos; and</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;no&apos; is a real brain workout.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Word-avoidance games like Old Soldier are among the oldest parlor</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">entertainments in existence — similar games appear in medieval European</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">manuscripts, and the specific taboo words varied by region and era.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player acts as an old soldier limping with a stick, begging garments and</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">items from other players. When asked questions, players must answer without</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">saying &apos;Yes,&apos; &apos;No,&apos; &apos;Nay,&apos; &apos;Black,&apos; &apos;White,&apos; or &apos;Grey.&apos; Those who slip and</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">say a forbidden word owe a forfeit to the old soldier.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>