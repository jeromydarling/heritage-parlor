<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DICE BOX</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  barrel-shaped wooden box with three dice inside</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The barrel-shaped wooden box has no visible opening — yet three dice rattle</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">inside it. Your challenge: figure out how to open it. Solution: hold the box</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">normally and tap its base firmly, straight down onto a table surface. The</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">impact releases a friction-fit base plug, which pops free and reveals the</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dice. The plug is held by friction alone — no thread, no latch. Tap</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">confidently; a tentative tap won&apos;t release it. Once you know the trick, you</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">can reseal it by pressing the plug firmly back in.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The friction-fit plug joint was used by ancient Greek woodworkers and appears</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in puzzle boxes from Egypt dating to 1500 BC. Victorian puzzlers rediscovered</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it as an elegant hidden-opening mechanism.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A barrel-shaped wooden box contains three dice rattling inside. The box</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">appears to have no opening — yet the dice must have gotten in somehow.</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Solution: the base is a friction-fit plug that pops free when the box is</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tapped sharply on a table, base downward.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>