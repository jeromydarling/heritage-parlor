<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SCHIMMEL</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  dice</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  tokens</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 5 cards to each player. Set a central pool of tokens (coins, buttons, or</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">any small objects). On your turn, roll two dice. If the total matches a card</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">in your hand, play it and collect from the pool. Special combinations (like</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">matching pairs) win extra tokens from the pool. If you can&apos;t play, add a</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">token to the pool. The player who empties their hand first wins all remaining</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tokens in the pool. &apos;Schimmel&apos; means white horse — the top prize card.</text>
  <text x="56" y="448" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="472" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Schimmel (German for &apos;white horse&apos;) was one of many German card games</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">introduced to English households by Prince Albert of Saxe-Coburg, who married</text>
  <text x="56" y="508" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Queen Victoria in 1840.</text>
  <text x="56" y="542" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="566" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A German-origin card game combining dice throwing with card matching for</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">prizes.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>