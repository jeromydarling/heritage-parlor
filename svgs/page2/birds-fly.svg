<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BIRDS FLY</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players sit in a circle. One player is the caller. They announce</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">creatures or objects followed by &apos;fly!&apos; — for example, &apos;Eagles fly!</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Bees fly! Tables fly!&apos; — while raising their own hand each time.</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players should raise their hands only for things that genuinely</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">fly. The caller tries to trick everyone by raising their hand for</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">non-flying things, or deliberately NOT raising their hand for</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">flying ones. Any player who raises their hand for something that</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">can&apos;t fly (or fails to raise it for something that can) pays a</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">silly penalty. The faster the pace, the trickier it gets.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Birds Fly and similar attention games were used in Victorian</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">nurseries as calm-down activities that required focus without</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">physical movement. They trained the Victorian virtue of attentive</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">listening.</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="657" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Raise your hand only when creatures that actually fly are announced</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">- catch out others who follow wrongly.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>