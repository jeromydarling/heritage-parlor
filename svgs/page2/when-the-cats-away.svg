<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">WHEN THE CAT&apos;S AWAY (ACTING PROVERB)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  simple costumes optional</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Assign roles: one or two people play the &apos;homeowners&apos; who are away on a trip,</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and everyone else plays the household who&apos;s been left in charge. The</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">homeowners leave the room. The remaining players invent and rehearse a short</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">comic skit — a wild party escalating into chaos (spilled snacks, broken</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">things, unexpected guests, something going hilariously wrong). The homeowners</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">return at the worst possible moment. After the skit, the audience guesses the</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">proverb being illustrated: &apos;When the cat&apos;s away, the mice will play.&apos;</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Acting proverbs were among the most popular parlor entertainments in</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mid-Victorian America, combining amateur dramatics with the educational value</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of proverbs, making them respectable fun for mixed-age family evenings.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Servants throw a party while their masters are away — Patrick, Bridget, Bob,</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and Mehitable invite guests, cause chaos, smash a hat, eat the refreshments,</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">catch a thief, and are all dismissed when the masters unexpectedly return.</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The audience guesses the proverb being illustrated.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>