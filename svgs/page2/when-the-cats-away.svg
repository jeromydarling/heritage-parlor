<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">WHEN THE CAT&apos;S AWAY (ACTING PROVERB)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  simple costumes optional</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Assign roles: one or two people play the &apos;homeowners&apos; who are away</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on a trip, and everyone else plays the household who&apos;s been left in</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">charge. The homeowners leave the room. The remaining players invent</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and rehearse a short comic skit — a wild party escalating into</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">chaos (spilled snacks, broken things, unexpected guests, something</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">going hilariously wrong). The homeowners return at the worst</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">possible moment. After the skit, the audience guesses the proverb</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">being illustrated: &apos;When the cat&apos;s away, the mice will play.&apos;</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Acting proverbs were among the most popular parlor entertainments</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in mid-Victorian America, combining amateur dramatics with the</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">educational value of proverbs, making them respectable fun for</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mixed-age family evenings.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Servants throw a party while their masters are away — Patrick,</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Bridget, Bob, and Mehitable invite guests, cause chaos, smash a</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">hat, eat the refreshments, catch a thief, and are all dismissed</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">when the masters unexpectedly return. The audience guesses the</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">proverb being illustrated.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>