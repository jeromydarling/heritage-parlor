<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PINNY SHOW</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  flowers or pictures</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass or cellophane</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  framed paper with slit</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Build a miniature peep-show: arrange colorful flowers, cut</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pictures, or small toys under a piece of clear plastic or glass,</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and frame it with decorated paper. Cut a small slit in the paper to</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">peek through. The showman charges one small token per look and</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sings their advertisement — the more elaborate the pitch, the</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">better. Other players pay the toll to peek inside. A creative</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">craft-and-performance activity.</text>
  <text x="110" y="523" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="547" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pinny Show is the children&apos;s domestic version of the adult</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">peep-show booths common at Victorian fairs. Pins served as the</text>
  <text x="110" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">smallest unit of currency in children&apos;s informal economies</text>
  <text x="110" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">throughout the 19th century.</text>
  <text x="110" y="635" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="659" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A peep-show made with flowers or colored objects under glass,</text>
  <text x="110" y="677" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">framed with a paper cover with a slit to peep through. Children</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">charge one pin to peep. The song: &apos;A pin to see the poppet-show, /</text>
  <text x="110" y="713" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">All manner of colours oh! / See the ladies all below.&apos;</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)  ·  Heritage Parlor</text>
</svg>