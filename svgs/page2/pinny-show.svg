<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PINNY SHOW</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  flowers or pictures</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass or cellophane</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  framed paper with slit</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Build a miniature peep-show: arrange colorful flowers, cut pictures, or small</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">toys under a piece of clear plastic or glass, and frame it with decorated</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper. Cut a small slit in the paper to peek through. The showman charges one</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">small token per look and sings their advertisement — the more elaborate the</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pitch, the better. Other players pay the toll to peek inside. A creative</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">craft-and-performance activity.</text>
  <text x="56" y="448" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="472" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pinny Show is the children&apos;s domestic version of the adult peep-show booths</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">common at Victorian fairs. Pins served as the smallest unit of currency in</text>
  <text x="56" y="508" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">children&apos;s informal economies throughout the 19th century.</text>
  <text x="56" y="542" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="566" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A peep-show made with flowers or colored objects under glass, framed with a</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">paper cover with a slit to peep through. Children charge one pin to peep. The</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">song: &apos;A pin to see the poppet-show, / All manner of colours oh! / See the</text>
  <text x="56" y="620" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ladies all below.&apos;</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>