<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC MILL</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small magic mill toy</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A small windmill model spins and stops on your command. Method: The</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mill has a concealed bellows or small fan mechanism inside the handle. When</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you press a hidden lever or blow gently through the handle, the sails rotate.</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Release and they stop. Present it as the mill responding to whispered</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">commands or magnetic force from your fingertips. Note: the specific Victorian</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mechanical toy this was built for is no longer made, but a modern version</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">could be built using a small battery-powered fan in a decorative case.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Small mechanical toys and optical illusions were commonly sold at Victorian</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fancy goods shops and toy stalls. Many required no skills beyond purchase,</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">making them accessible to non-magicians who wanted to amuse dinner guests.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A small mill model grinds automatically when commanded by the magician,</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">stopping on command.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>