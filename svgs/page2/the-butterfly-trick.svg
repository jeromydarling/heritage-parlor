<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE BUTTERFLY TRICK</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  tissue paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine wire</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A flat piece of tissue paper transforms into a butterfly and seems to</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">flutter through the air on its own. Method: Cut a butterfly shape from tissue</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper and balance it on a thin wire spike or toothpick. Gently fan air from</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">below with slow concealed hand movements — the lightweight tissue catches the</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">air and appears to flutter by itself. For a better effect, blow very softly</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through barely-open lips to keep it airborne. The lighter the paper, the more</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">convincing the flutter. You need: tissue paper, thin wire or a toothpick.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Paper butterflies and paper flowers were a staple of &apos;natural magic&apos;</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">demonstrations in Victorian parlors. They showed that beautiful magical</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">effects could be created with simple inexpensive materials available in any</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">household.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A flat piece of tissue paper transforms into a beautiful butterfly that</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">flutters through the air.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>