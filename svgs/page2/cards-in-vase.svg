<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CARDS IN THE VASE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  special vase with internal thread mechanism</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  deck of cards</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Three chosen cards are returned to the deck, placed in a</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">vase, and then rise out of the vase one by one at your mental</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">command. Method: the special vase has fine threads attached at</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">specific positions inside. When each chosen card is controlled to</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">its thread position, an almost invisible thread connects from the</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">card to the performer&apos;s ring or a pin in their clothing. A tiny</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">movement of the hand or body causes each card to rise dramatically</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">from the vase. Three cards can rise in sequence with different</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">subtle movements triggering each. The vase mechanism can be rigged</text>
  <text x="110" y="523" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">at home with patience.</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="588" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Rising Cards is one of magic&apos;s oldest and most celebrated</text>
  <text x="110" y="606" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">effects — the first documented mechanical rising card apparatus</text>
  <text x="110" y="624" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">appeared in a French conjuring book in 1584. Modern versions use</text>
  <text x="110" y="642" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magnets, electronics, and remote controls, but the basic thread</text>
  <text x="110" y="660" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">method still works beautifully.</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="718" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three chosen cards are returned to the deck which is placed in a</text>
  <text x="110" y="736" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">vase. On command, each chosen card rises mysteriously from the</text>
  <text x="110" y="754" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">vase. The mechanism uses threads and small pulleys inside the vase</text>
  <text x="110" y="772" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">— the performer triggers each rise by a concealed hair or thread</text>
  <text x="110" y="790" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">attachment to their body.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>