<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE RISING CARDS (HAIR METHOD)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  deck of cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  wine glass</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine thread</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Selected cards rise one by one from a deck standing in a glass — as</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">if pulled by an invisible hand. Method: Attach a long fine thread (or a</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">strand of hair) from the back of the deck to a ring on your finger. Stand the</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">deck upright in a wine glass. When a card is chosen and placed near the top,</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">slowly raise your hand slightly — the thread lifts the top card upward. Place</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">different chosen cards in known positions beforehand so named cards rise on</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">command. The thread must be fine, the background not too bright, and your</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">movements absolutely smooth.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Rising Cards was one of the most dramatic effects in the Victorian magic</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">repertoire. Jean-Eugene Robert-Houdin first performed it in Paris in the</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1840s and caused a sensation. The thread method was Hoffmann&apos;s affordable</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">version for amateur performers.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Selected cards rise one by one from a glass of cards, as if pulled by</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">invisible hands.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>