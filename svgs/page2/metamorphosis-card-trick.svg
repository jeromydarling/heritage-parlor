<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE METAMORPHOSIS (CARDS)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  specially prepared half-and-half cards</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Four eights are shown, transform to blank cards, then to twos, then</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the colors change from black to red — all while the same cards are held in</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your hand. Method: the secret is a set of specially prepared half-and-half</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards — each trimmed so one half shows one design and the other half shows a</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">different design. By fanning and reclosing the cards in specific ways,</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">different halves face the audience each time. The audience sees a complete</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">transformation while you hold the same four cards throughout. Commercial</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">gimmick card sets of this type are widely available.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The half-card gimmick pioneered by tricks like The Metamorphosis directly</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">inspired the modern magic-card manufacturing industry. Dozens of commercial</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">effects today use the same half-card principle.</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Four eights are shown, change to blank cards, then to four twos, and finally</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the colors change from black to red — all through skillful handling of</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">specially prepared half-painted cards stacked in a specific order. Each</text>
  <text x="56" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">shuffle reveals a new face.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>