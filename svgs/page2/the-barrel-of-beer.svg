<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE BARREL OF BEER</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper to track amounts</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">You have a full 8-cup container, an empty 5-cup jug, and an empty</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">3-cup jug. Measure exactly 1 cup using as few pours as possible.</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">You can pour between any containers freely. Hint: 8 − 5 = 3, then 3</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">− 3 = 0... think step by step. Draw a table tracking each</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">container&apos;s level after every pour. This is a classic puzzle that</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">also teaches computer scientists about problem-solving.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Water-pouring puzzles date back to at least 1202 AD when the</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Italian mathematician Fibonacci described them. They are used today</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in computer science to teach algorithm design.</text>
  <text x="110" y="552" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Using only a 5-pint and 3-pint jug, measure out exactly 1 pint from</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a full 8-pint barrel.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>