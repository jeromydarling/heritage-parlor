<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE COIN IN THE BREAD</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marked coin</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small bread roll</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  knife</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Prep before the show: cut a small hollow in a bread roll, tuck a</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">duplicate marked coin inside, and press the crust back. During your</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">performance, borrow a coin, &apos;vanish&apos; it (secretly pocket it), then</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ask someone to cut open the roll. The matching &apos;marked&apos; coin is</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">discovered inside. The prep work — and never letting anyone inspect</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the bread beforehand — is everything.</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="526" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Impossible-location tricks (coin in fruit, coin in egg, coin in</text>
  <text x="110" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bread) rely on the principle that baked or grown objects create an</text>
  <text x="110" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">apparently unbreakable seal, making penetration magical. Hoffmann</text>
  <text x="110" y="580" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">called these &apos;the most convincing class of all coin effects.&apos;</text>
  <text x="110" y="614" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="638" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A spectator&apos;s marked coin, apparently vanished, is found baked</text>
  <text x="110" y="656" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">inside a bread roll.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>