<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">RING THROUGH THE HANDKERCHIEF</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  ring</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A borrowed ring is wrapped inside a handkerchief — then pulled free</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through the fabric without damaging it. Method: Borrow a ring. Drape the</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">handkerchief over your left fist. Poke a small loop of cloth down through the</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ring from above — so the ring looks wrapped inside. Now grip the ring through</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the cloth with your right hand and pull downward, while releasing the cloth</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">loop from below. The ring slides cleanly off the handkerchief. No preparation</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">needed. Works with any ring and any cloth — great impromptu trick.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This extremely simple technique creates a completely convincing penetration</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">effect and can be performed literally anywhere with borrowed objects.</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hoffmann called it one of the best &apos;pocket tricks&apos; - effects requiring no</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">preparation or apparatus.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A borrowed ring visibly passes through the center of a handkerchief without</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">damaging the cloth.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>