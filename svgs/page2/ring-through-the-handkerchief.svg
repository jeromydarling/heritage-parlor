<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">RING THROUGH THE HANDKERCHIEF</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  ring</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A borrowed ring is wrapped inside a handkerchief — then</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pulled free through the fabric without damaging it. Method: Borrow</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a ring. Drape the handkerchief over your left fist. Poke a small</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">loop of cloth down through the ring from above — so the ring looks</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wrapped inside. Now grip the ring through the cloth with your right</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hand and pull downward, while releasing the cloth loop from below.</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The ring slides cleanly off the handkerchief. No preparation</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">needed. Works with any ring and any cloth — great impromptu trick.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This extremely simple technique creates a completely convincing</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">penetration effect and can be performed literally anywhere with</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">borrowed objects. Hoffmann called it one of the best &apos;pocket</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tricks&apos; - effects requiring no preparation or apparatus.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A borrowed ring visibly passes through the center of a handkerchief</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">without damaging the cloth.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>