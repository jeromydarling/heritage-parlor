<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CAT&apos;S CRADLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  loop of string about 1m long</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Loop a piece of string (about 60–70cm) into a closed circle. One player wraps</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it around both hands to form the starting &apos;cat&apos;s cradle&apos; shape. The second</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player reaches in from outside, picks up specific crossing points with their</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">fingers, and lifts the string to create a new figure (&apos;soldier&apos;s bed&apos;).</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players pass it back and forth, each creating the next figure in the</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sequence: candles, manger, diamonds, cat&apos;s eye. If you make a wrong move and</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tangle it, restart. You need: a single loop of soft string about 60cm long.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Cat&apos;s Cradle is one of the most geographically widespread games in the world,</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">found in virtually every human culture from Arctic Inuit to Pacific Islander</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tribes. The identical figures appear on opposite sides of the planet,</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">suggesting either very ancient common origins or independent invention.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two players pass a loop of string between them, creating increasingly complex</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">string figures.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>