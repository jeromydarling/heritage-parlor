<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HONOR AMONG THIEVES (ACTING PROVERB)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  costume scraps optional</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cast players as a bold brigand, the unfortunate Alice Vane, and assorted gang</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">members and bystanders. Improvise the robbery scene with theatrical flair —</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">capes, dramatic poses, and over-the-top villainy encouraged. Build to the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">unexpected turning point: the brigand discovers Alice&apos;s precious locket and,</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">moved by honor, returns it as promised despite having taken everything else.</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The audience then guesses the proverb being acted out: &apos;There is honor among</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thieves.&apos;</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The phrase &apos;honor among thieves&apos; appears in English literature as early as</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1633 and was a Victorian favorite for acting proverbs because the dramatic</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">contradiction — villains with principles — made for such entertaining</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">theatre.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Brigand Cordobello robs the virtuous Alice Vane, taking all her valuables —</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">but when he discovers a miniature of her lost love, he returns it to her as</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">promised, demonstrating that even thieves keep their word. The audience must</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">guess the proverb illustrated.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>