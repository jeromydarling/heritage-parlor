<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HONOR AMONG THIEVES (ACTING PROVERB)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  costume scraps optional</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cast players as a bold brigand, the unfortunate Alice Vane, and</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">assorted gang members and bystanders. Improvise the robbery scene</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with theatrical flair — capes, dramatic poses, and over-the-top</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">villainy encouraged. Build to the unexpected turning point: the</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">brigand discovers Alice&apos;s precious locket and, moved by honor,</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">returns it as promised despite having taken everything else. The</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">audience then guesses the proverb being acted out: &apos;There is honor</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">among thieves.&apos;</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The phrase &apos;honor among thieves&apos; appears in English literature as</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">early as 1633 and was a Victorian favorite for acting proverbs</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">because the dramatic contradiction — villains with principles —</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">made for such entertaining theatre.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Brigand Cordobello robs the virtuous Alice Vane, taking all her</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">valuables — but when he discovers a miniature of her lost love, he</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">returns it to her as promised, demonstrating that even thieves keep</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">their word. The audience must guess the proverb illustrated.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>