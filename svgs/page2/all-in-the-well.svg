<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ALL IN THE WELL</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  wooden peg</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  button</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marbles or buttons for stakes</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a small circle on the ground (the &apos;well&apos;). Stand a wooden peg</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">upright in the center with a button balanced on top. From an agreed</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">throwing line, players take turns throwing a short stick at the</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">peg. If your throw knocks the button outside the circle, you win</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">double the staked items (buttons or tokens). Otherwise, keep</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">alternating turns until someone succeeds.</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="526" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A variant of this game was played at Newcastle Races with three</text>
  <text x="110" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pegs arranged in a triangle, each topped with a knife or copper</text>
  <text x="110" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">coin — showing how folk games often adapted to local materials and</text>
  <text x="110" y="580" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">festive occasions.</text>
  <text x="110" y="614" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="638" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A circle about eight inches in diameter is drawn on the ground,</text>
  <text x="110" y="656" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">termed the &apos;well,&apos; with a wooden peg (four inches tall) and a</text>
  <text x="110" y="674" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">button balanced on top. Players give items — buttons or marbles —</text>
  <text x="110" y="692" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">for a short stick to throw at the peg from a distance. If the</text>
  <text x="110" y="710" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">button flies out of the circle, the player wins double value;</text>
  <text x="110" y="728" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">otherwise they alternate until someone wins.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>