<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ALL IN THE WELL</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  wooden peg</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  button</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marbles or buttons for stakes</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a small circle on the ground (the &apos;well&apos;). Stand a wooden peg upright in</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the center with a button balanced on top. From an agreed throwing line,</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">players take turns throwing a short stick at the peg. If your throw knocks</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the button outside the circle, you win double the staked items (buttons or</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tokens). Otherwise, keep alternating turns until someone succeeds.</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="451" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A variant of this game was played at Newcastle Races with three pegs arranged</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in a triangle, each topped with a knife or copper coin — showing how folk</text>
  <text x="56" y="487" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">games often adapted to local materials and festive occasions.</text>
  <text x="56" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A circle about eight inches in diameter is drawn on the ground, termed the</text>
  <text x="56" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;well,&apos; with a wooden peg (four inches tall) and a button balanced on top.</text>
  <text x="56" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players give items — buttons or marbles — for a short stick to throw at the</text>
  <text x="56" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">peg from a distance. If the button flies out of the circle, the player wins</text>
  <text x="56" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">double value; otherwise they alternate until someone wins.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>