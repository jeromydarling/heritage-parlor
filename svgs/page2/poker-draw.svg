<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">POKER (DRAW)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  poker chips</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 5 cards to each player. First betting round (you may check,</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bet, call, raise, or fold to drop out). Players discard 0–5 cards</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and draw replacements. Second betting round. Remaining players</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reveal their hands — best hand wins. Hand rankings from lowest to</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">highest: High card, One pair, Two pair, Three of a kind, Straight</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(5 in sequence), Flush (5 same suit), Full house, Four of a kind,</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Straight flush, Royal flush. Play with chips or points — no actual</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">money needed. Bluffing is legal and encouraged.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Draw Poker appears in American literature from the 1830s. Foster</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">called it &apos;the most popular of American games.&apos; It evolved from the</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Persian game As-Nas via the French Poque, traveling to New Orleans</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">with French settlers.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The most famous American card game of skill and psychological</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bluffing.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>