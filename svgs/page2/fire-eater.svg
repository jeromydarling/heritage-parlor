<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE FIRE EATER</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  flax tow</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  potassium nitrate (niter) solution</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  candle</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A performer appears to eat glowing fire, placing burning material in</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">their mouth. Method: tow (flax fiber) soaked in potassium nitrate smolders at</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a manageable temperature when the mouth&apos;s warm moisture controls the oxygen</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">supply — closing the mouth extinguishes it. This is a genuine performance art</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">requiring professional training, mentorship, and extensive practice. The</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">original book itself warned it was &apos;not recommended for amateurs.&apos; Never</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">attempt without expert supervision. Modern fire performers train for months</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">under mentors before their first live act.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fire eating is one of the oldest performance arts in recorded history,</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">practiced at ancient Roman circus events and throughout the medieval period</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">by itinerant showmen. The fire eating scene in the 1862 book specifically</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">notes it was &apos;not recommended for amateurs,&apos; making it one of the earliest</text>
  <text x="56" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">printed safety warnings in a magic book.</text>
  <text x="56" y="620" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The performer appears to eat burning tow (flax fiber), placing glowing</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">material in their mouth and quenching it. The method: tow soaked in niter</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(potassium nitrate) ignites easily in the presence of the mouth&apos;s warmth but</text>
  <text x="56" y="698" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">can be extinguished safely by closing the mouth and excluding oxygen.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>