<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PLOUGHMAN&apos;S PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Count every square you can find in a given geometric figure made of</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">smaller squares. Count 1×1 squares, 2×2, 3×3, and so on up to the</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">full figure. Also look for tilted squares formed by connecting</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">corner points diagonally. For a grid of n×n squares, the</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">straight-edged total is n(n+1)(2n+1)÷6. Add tilted squares to get</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the full count.</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Counting all squares in a grid is a classic combinatorics problem.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The formula n(n+1)(2n+1)÷6 was popularized by Dudeney and still</text>
  <text x="110" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">appears in math competitions today.</text>
  <text x="110" y="574" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="598" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Count all the perfect squares (of all sizes) in a given figure.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Canterbury Puzzles (1907)  ·  Heritage Parlor</text>
</svg>