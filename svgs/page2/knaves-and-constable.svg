<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE KNAVES AND THE CONSTABLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of playing cards</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Three knaves (jacks) are hidden in different parts of the</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">deck; the King (constable) finds them all in one place. Method:</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hold the four jacks and the King of Spades. As you narrate the</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">story — &apos;The first knave hides in the attic, the second in the</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cellar, the third behind the kitchen&apos; — appear to slide the jacks</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to different positions, but secretly stack them together with</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">indifferent cards hidden between them. Place the King on top. One</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dramatic cut of the deck brings the King face-to-face with all</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">three jacks. The story is the misdirection.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Narrative card tricks — in which a story both explains the sequence</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of moves and completely hides the method — are considered among the</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">most elegant forms of card magic. The audience is too busy</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">following the story to notice what your hands are doing.</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="657" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A story is told: three knaves (thieves) go to different parts of a</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">house while a constable searches. The King (constable) eventually</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">finds all three together. The trick: the three knaves are placed at</text>
  <text x="110" y="711" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">specific positions in a single pile, and a cut brings the King to</text>
  <text x="110" y="729" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">join them.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>