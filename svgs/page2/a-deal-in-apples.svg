<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">A DEAL IN APPLES</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">A market vendor sells X apples for $1. If they offered 2 extra</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">apples per dollar, the price per dozen would drop by 1 cent. Find</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">X. Set up: original price per dozen = 12/X dollars. New price per</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dozen = 12/(X+2) dollars. The difference equals $0.01. This gives a</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">quadratic equation — solve it to find how many apples you could</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">originally buy for a dollar.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Apple pricing was a real math challenge in Victorian markets, where</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">vendors sold by count or weight with complex pricing tiers. This</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle mirrors real market arithmetic.</text>
  <text x="110" y="552" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">If 2 extra apples per shilling reduced the price by 1 penny per</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dozen, how many apples could you originally buy for a shilling?</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>