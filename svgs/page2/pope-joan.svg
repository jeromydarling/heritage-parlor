<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">POPE JOAN</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck minus one card</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  Pope Joan board</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Remove one card from the deck (traditionally the 8 of diamonds). All players</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">contribute chips to seven labeled pools: Ace, King, Queen, Jack, Matrimony,</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Intrigue, and Pope Joan (the 9 of diamonds). Deal all remaining cards. The</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player with the 8 of diamonds starts; play builds upward in that suit. When</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">someone plays a card matching a pool label, they claim that pool. Matrimony</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(King + Queen of same suit in sequence) and Intrigue (Queen + Jack) win</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">double pools. Whoever runs out of cards first wins any unclaimed chips. Note:</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">requires a Pope Joan board (or draw your own labeled circles).</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pope Joan was enormously popular in Georgian and early Victorian England. The</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">9 of diamonds is called the Pope because the papal tiara was compared to the</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">card&apos;s pip layout. The game gradually declined as Bezique and Whist became</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dominant.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An old English card game played on a decorated board with pools for different</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">card combinations.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>