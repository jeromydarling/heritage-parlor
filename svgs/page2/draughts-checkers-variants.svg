<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">DRAUGHTS (CHECKERS) VARIANTS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  draughts board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pieces</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">International Draughts (Polish): uses a 10×10 board with 20 pieces each. Men</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">can capture backwards as well as forwards; kings can slide any distance</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">diagonally (like a bishop in chess). Turkish Draughts: pieces move</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">orthogonally (up, down, left, right — not diagonally). Spanish Draughts: when</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">multiple captures are possible, you must take the move that captures the most</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pieces. English Draughts (standard): diagonal movement only; men can only</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">move and capture forward. Each variant rewards different strategic thinking.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">International variants of Draughts proliferated throughout the Victorian era</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as players sought greater complexity. The 10x10 Polish game is now the</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">official &apos;International Draughts&apos; played in world championships.</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">International variants of Draughts including Polish Checkers (10x10 board)</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and Turkish Draughts.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>