<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SQUIRE&apos;S PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chessboard or paper grid</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">On a standard 8×8 chessboard, move a knight to visit every single</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">square exactly once — this is the famous Knight&apos;s Tour. A knight</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">moves in an L-shape (2 squares in one direction, then 1 square</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sideways). Start on any square and try to visit all 64. A &apos;closed&apos;</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tour ends on a square one knight-move from your start. Use a</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">chessboard and a marker, or draw it on grid paper.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Knight&apos;s Tour was a favorite puzzle of Victorian mathematicians</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">— Euler had worked on it, and Dudeney found elegant structured</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">solutions that bordered on artistry.</text>
  <text x="110" y="552" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Move a knight around a chessboard visiting every square exactly</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">once.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>