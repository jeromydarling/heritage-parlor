<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PIGS IN CLOVER</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  circular enclosed box with spiral partitions</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  5 small marbles (the pigs)</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Tilt the circular box to roll the five marble &apos;pigs&apos; toward the center</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through successive ring-gates, one ring at a time. Each gate must be aligned</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">at the right moment for a marble to pass through. The maddening part: a</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">marble that clears one ring can roll back if the box tilts the wrong way. Get</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one marble to the center, then stabilize and route the next. Remarkable</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">patience required. Pigs in Clover is still widely sold as a classic dexterity</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">toy and makes a perfect road-trip puzzle.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pigs in Clover was an American invention of 1889 by Charles M. Crandall and</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">became such a sensation that it was reportedly played in the U.S. Senate,</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">causing one newspaper to wonder whether the government could function with</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all senators so distracted.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A circular box has a series of concentric partitions with gaps between them,</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">forming a spiral path from the outer ring to a small central pen. Five small</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">balls (the &apos;pigs&apos;) must all be guided through the spiral gates into the</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">center &apos;clover&apos; pen by tilting the box.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>