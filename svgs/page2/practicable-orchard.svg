<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PRACTICABLE ORCHARD</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The puzzle: draw exactly 16 dots on paper (the &apos;trees&apos;) so that you can find</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">10 straight lines, each passing through exactly 4 dots. This seems impossible</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— 10 rows of 4 would need 40 dots if no dot was shared. The secret is that a</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">single dot can lie on multiple lines simultaneously, so each dot counts in</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">every row that passes through it. The solution involves a specific</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">star-shaped or diamond-lattice arrangement. Start by drawing the lines first</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and placing trees at their intersections.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The orchard planting puzzle type dates back to at least the 17th century and</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">was a staple of Victorian puzzle books. The &apos;ten rows of four from sixteen</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">trees&apos; problem was considered a particularly elegant version because the</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">solution is so unexpected.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Plant sixteen trees in an orchard so that they form ten rows of four trees</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">each. At first this seems impossible — sixteen trees making ten rows of four</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">would require forty positions. The solution uses the diagonal and overlapping</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">intersections of a clever geometric arrangement.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>