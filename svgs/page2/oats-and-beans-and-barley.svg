<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">OATS AND BEANS AND BARLEY</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player stands in the center of a circle while the ring walks round</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">singing. At each action line — sowing seed, stamping foot, clapping hands,</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">turning round — everyone acts out the motion. When the song reaches &apos;open the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ring and take one in,&apos; the center player picks someone to join them. The ring</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sings a happy blessing to the pair, then a new player takes the center.</text>
  <text x="56" y="383" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Oats and Beans and Barley is one of the most widely distributed folk games in</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Britain, with Gomme recording over 18 distinct regional variants from</text>
  <text x="56" y="443" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Shropshire to the Isle of Man — each with slightly different crops, actions,</text>
  <text x="56" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and marriage verses.</text>
  <text x="56" y="495" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players form a ring with one child in the center. The ring walks round</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">singing while the center child mimics farming actions — sowing seed,</text>
  <text x="56" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">standing, stamping foot, clapping hands, turning round. At &apos;open the ring and</text>
  <text x="56" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">take one in,&apos; the center child chooses a partner. The ring then sings a</text>
  <text x="56" y="591" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">marriage formula while the couple stands together.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>