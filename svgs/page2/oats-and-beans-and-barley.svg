<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">OATS AND BEANS AND BARLEY</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player stands in the center of a circle while the ring walks</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">round singing. At each action line — sowing seed, stamping foot,</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">clapping hands, turning round — everyone acts out the motion. When</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the song reaches &apos;open the ring and take one in,&apos; the center player</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">picks someone to join them. The ring sings a happy blessing to the</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pair, then a new player takes the center.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Oats and Beans and Barley is one of the most widely distributed</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">folk games in Britain, with Gomme recording over 18 distinct</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">regional variants from Shropshire to the Isle of Man — each with</text>
  <text x="110" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">slightly different crops, actions, and marriage verses.</text>
  <text x="110" y="570" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players form a ring with one child in the center. The ring walks</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">round singing while the center child mimics farming actions —</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sowing seed, standing, stamping foot, clapping hands, turning</text>
  <text x="110" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">round. At &apos;open the ring and take one in,&apos; the center child chooses</text>
  <text x="110" y="666" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a partner. The ring then sings a marriage formula while the couple</text>
  <text x="110" y="684" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">stands together.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)  ·  Heritage Parlor</text>
</svg>