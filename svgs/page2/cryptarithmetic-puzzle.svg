<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CRYPTARITHMETIC PUZZLE (LETTERS F...</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">In a cryptarithmetic puzzle, letters replace digits in an arithmetic</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">equation. Each letter consistently stands for one digit (0–9), and different</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">letters represent different digits. The most famous example: SEND + MORE =</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">MONEY. Solve it by logic: M must be 1 (it&apos;s a carry digit), O must be 0, and</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">working column by column you can deduce each letter. The complete unique</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">solution is S=9, E=5, N=6, D=7, M=1, O=0, R=8, Y=2. Verify it: 9567 + 1085 =</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">10652.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">SEND + MORE = MONEY was published by Henry Dudeney in 1924 and became the</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">most famous cryptarithmetic puzzle ever created. The technique dates to</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian puzzle books, though Hoffmann used simpler examples. The answer:</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">S=9, E=5, N=6, D=7, M=1, O=0, R=8, Y=2.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An arithmetical sum is presented with each digit replaced by a letter,</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">different letters representing different digits. The solver must determine</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">what digit each letter stands for to make the sum correct. A classic example:</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">SEND + MORE = MONEY, where each letter is a unique digit.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>