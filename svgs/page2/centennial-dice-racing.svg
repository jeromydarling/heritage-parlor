<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CENTENNIAL (DICE RACING)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  3 dice</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  score track 1-100 (or paper)</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Write a number track from 1 to 100 on paper. On each turn, roll 3</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dice. Score any combination of those dice that equals your current</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">needed number. You must score numbers in order from 1 to 100 — you</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">can&apos;t skip. If your dice show 5, 7, 7 and you need 7 next: score</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one 7, now you need 8. Next roll: 3, 8, 9 — score 8 and then 9 in</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the same turn, now you need 10. You may score multiple dice per</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">roll if they hit your next needed numbers in sequence. First player</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to reach exactly 100 wins.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Centennial was one of the most popular family dice games of</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian and Edwardian England. The sequential scoring creates</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">natural suspense - a lucky run of consecutive numbers dramatically</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">closes the gap.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A satisfying dice-scoring race where you must hit every number from</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1 to 100 in sequence.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>