<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CENTENNIAL (DICE RACING)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  3 dice</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  score track 1-100 (or paper)</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Write a number track from 1 to 100 on paper. On each turn, roll 3 dice. Score</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">any combination of those dice that equals your current needed number. You</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">must score numbers in order from 1 to 100 — you can&apos;t skip. If your dice show</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">5, 7, 7 and you need 7 next: score one 7, now you need 8. Next roll: 3, 8, 9</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— score 8 and then 9 in the same turn, now you need 10. You may score</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">multiple dice per roll if they hit your next needed numbers in sequence.</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">First player to reach exactly 100 wins.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Centennial was one of the most popular family dice games of Victorian and</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Edwardian England. The sequential scoring creates natural suspense - a lucky</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">run of consecutive numbers dramatically closes the gap.</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A satisfying dice-scoring race where you must hit every number from 1 to 100</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in sequence.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>