<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">FOX AND GEESE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fox and geese board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pieces</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Need: a cross-shaped board (draw one on paper), 13 Goose pieces and 1 Fox</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">piece. Place all 13 Geese on one half of the board, Fox in the center.</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players alternate turns. Fox moves along lines and can jump over a Goose to</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">capture it (like draughts/checkers). Geese cannot jump but can hem the Fox</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">in. Fox wins by reducing Geese to 2 or fewer; Geese win by trapping the Fox</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">so it cannot move.</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fox and Geese boards have been found carved into the cloister floors of</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">medieval cathedrals — monks apparently played this during slow periods of</text>
  <text x="56" y="486" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">religious duty.</text>
  <text x="56" y="520" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Fox tries to capture Geese on a cross-shaped board; Geese try to hem in</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the Fox.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>