<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DISSECTED SQUARE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  scissors</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a square with area 25 on grid paper (5x5). Your goal: cut it</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">into the fewest pieces possible that can be rearranged into two</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">smaller squares — one 4x4 (area 16) and one 3x3 (area 9). The</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">answer uses just 3 pieces and relies on the 3-4-5 right triangle.</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Try to find those 3 cuts yourself before checking the solution!</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="483" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Square dissection puzzles became Dudeney&apos;s signature contribution</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">to recreational mathematics. His most famous: a regular triangle</text>
  <text x="110" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">can be divided into 4 pieces that form a square - he demonstrated</text>
  <text x="110" y="537" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">this with a hinged wooden model at the Royal Society.</text>
  <text x="110" y="571" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="595" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Cut a square into the minimum number of pieces that can be</text>
  <text x="110" y="613" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">reassembled into two smaller squares.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>