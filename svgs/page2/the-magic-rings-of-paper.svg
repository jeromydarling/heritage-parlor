<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC RINGS OF PAPER</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper strips</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  scissors</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glue</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Show three surprising paper-cutting tricks. (1) Cut a normal loop down the</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">middle — two loops. (2) Twist one end once before gluing (Möbius strip), then</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cut down the middle — you get ONE huge ring. (3) Twist twice before gluing,</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">then cut down the middle — two linked rings that can&apos;t be separated. The</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Möbius result always gets gasps.</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="451" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Moebius strip was described mathematically by August Moebius and Johann</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Listing in 1858 - coincidentally the same year independently. Victorian</text>
  <text x="56" y="487" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">audience members familiar with geometry were as baffled as non-mathematicians</text>
  <text x="56" y="505" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">because the result seems to violate intuition.</text>
  <text x="56" y="539" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Cutting a paper ring in half produces impossible results - one large ring,</text>
  <text x="56" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">two linked rings, or a twisted Moebius band.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>