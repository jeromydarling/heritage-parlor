<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SPELICANS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  set of spelicans</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Dump all the spelican pieces into a pile. Players take turns using</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a small hook to carefully remove one piece without moving any other</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">piece in the pile. If anything shifts, your turn ends and you put</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the piece back. Different pieces score different points — delicate</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">or awkwardly shaped pieces score more. The player with the most</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">points when all pieces are gone wins. This is basically Victorian</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Pick-Up Sticks with fancier carved pieces.</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Spelicans (also called Spilikins or Pick-Up Sticks) was sold in</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">elaborate boxed sets in Victorian toy shops as a family game</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">suitable for all ages and both sexes.</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players take turns removing shaped ivory or wooden pieces from a</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pile without disturbing any other piece.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)  ·  Heritage Parlor</text>
</svg>