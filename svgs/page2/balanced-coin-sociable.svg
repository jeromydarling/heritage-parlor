<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE BALANCED COIN</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cork</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two forks</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  coin</text>
  <text x="126" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  needle</text>
  <text x="110" y="352" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="378" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Push a needle upright into the flat face of a cork. Push two forks</text>
  <text x="110" y="399" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">symmetrically into opposite sides of the cork at a downward angle,</text>
  <text x="110" y="420" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">so the fork tines point down and out. Balance the whole assembly on</text>
  <text x="110" y="441" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the needle point — the forks droop down below the cork, lowering</text>
  <text x="110" y="462" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the center of gravity far below the balance point. Give the coin on</text>
  <text x="110" y="483" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">top a gentle spin and the whole system rotates smoothly on the</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">needle. Physics principle: stable equilibrium occurs when the</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">center of gravity is below the pivot point.</text>
  <text x="110" y="566" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="590" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This trick demonstrates the principle of center of gravity that</text>
  <text x="110" y="608" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fascinated Victorian natural philosophers. The Sociable&apos;s &apos;Science</text>
  <text x="110" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in Sport&apos; section featured dozens of such experiments as a way of</text>
  <text x="110" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">making physics both visible and entertaining.</text>
  <text x="110" y="678" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="702" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A coin is made to spin and balance on the point of a needle stuck</text>
  <text x="110" y="720" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in a cork. Two forks are inserted into the cork on opposite sides</text>
  <text x="110" y="738" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">to lower the center of gravity, allowing the</text>
  <text x="110" y="756" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">coin-and-cork-and-forks assembly to balance perfectly on the needle</text>
  <text x="110" y="774" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">point and spin freely.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>