<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">NEW PERPETUAL ROTARY MOTION</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  convex-cut quartz crystal disk</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  smooth wetted surface</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  inclined plane</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cut or obtain a small disc with a slightly convex (rounded) underside.</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Lightly wet a smooth glass or marble surface inclined at a gentle angle.</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place the disc at the top and release — it spins as it slides downward, and</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">continues spinning for a remarkably long time due to the near-frictionless</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">layer of water between the disc and surface. Victorian observers called it</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;perpetual motion,&apos; but it&apos;s really a demonstration of very low friction</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">physics — the energy that keeps it spinning comes from the disc slowly</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">descending the incline.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">No true perpetual motion machine can exist — the Second Law of Thermodynamics</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(conservation of energy) forbids it. But Victorian fascination with the</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">concept reflected an era when these thermodynamic laws had only recently been</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">established (1850) and many still believed mechanical perpetual motion was</text>
  <text x="56" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">achievable.</text>
  <text x="56" y="620" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A crystal disk cut with a convex bottom, placed on a wetted smooth inclined</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">surface, spins continuously as it slides slowly down the plane. The rotation</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">appears perpetual — the convex shape and thin water film create a gyroscopic</text>
  <text x="56" y="698" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">spinning effect as the crystal descends.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>