<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CONSEQUENCES (EXTENDED)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencils</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player gets a piece of paper. Everyone writes an adjective, folds the</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper to hide it, and passes left. Next: write a person&apos;s name, fold, pass.</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Then: &apos;met&apos; + another name, fold, pass. Then: where they met, fold, pass.</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Then: what the first person said, fold, pass. Then: what the second person</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">said, fold, pass. Finally: what happened as a result, fold, pass. Unfold and</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">read the resulting absurd story aloud.</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Consequences is the Victorian forerunner of the Surrealist &apos;Exquisite Corpse&apos;</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">game used by Andre Breton and Salvador Dali. When the Surrealists discovered</text>
  <text x="56" y="486" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Consequences in the 1920s, they saw it as a technique for bypassing rational</text>
  <text x="56" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">censorship and accessing the unconscious.</text>
  <text x="56" y="538" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Victorian writing game where players collaboratively write absurd stories</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">without seeing previous contributions.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>