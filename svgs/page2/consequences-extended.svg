<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CONSEQUENCES (EXTENDED)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencils</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player gets a piece of paper. Everyone writes an adjective,</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">folds the paper to hide it, and passes left. Next: write a person&apos;s</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">name, fold, pass. Then: &apos;met&apos; + another name, fold, pass. Then:</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">where they met, fold, pass. Then: what the first person said, fold,</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pass. Then: what the second person said, fold, pass. Finally: what</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">happened as a result, fold, pass. Unfold and read the resulting</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">absurd story aloud.</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Consequences is the Victorian forerunner of the Surrealist</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;Exquisite Corpse&apos; game used by Andre Breton and Salvador Dali.</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">When the Surrealists discovered Consequences in the 1920s, they saw</text>
  <text x="110" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it as a technique for bypassing rational censorship and accessing</text>
  <text x="110" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the unconscious.</text>
  <text x="110" y="631" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Victorian writing game where players collaboratively write absurd</text>
  <text x="110" y="673" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">stories without seeing previous contributions.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)  ·  Heritage Parlor</text>
</svg>