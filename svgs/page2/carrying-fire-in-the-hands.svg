<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CARRYING FIRE IN THE HANDS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  surgical spirit</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  damp hands</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: The performer&apos;s hands appear to be on fire — but they&apos;re</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">unharmed. Method: Wet both hands THOROUGHLY with water first.</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Quickly apply a tiny amount of isopropyl alcohol (rubbing alcohol —</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">no more than a teaspoon). Ignite it immediately with a lighter. The</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">alcohol burns with a cool blue flame that doesn&apos;t harm</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thoroughly-wet skin for a few seconds. Keep hands moving</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">constantly. Extinguish with a wet cloth nearby. SAFETY: Never use</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">more than a teaspoon of alcohol. Never do this near flammable</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">clothing, hair, or materials. Adult supervision essential. Not</text>
  <text x="110" y="523" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">recommended for home performance.</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="588" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Chemical fire effects fascinated Victorian audiences who associated</text>
  <text x="110" y="606" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">such demonstrations with alchemy and chemical knowledge. Hoffmann</text>
  <text x="110" y="624" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">included strong safety warnings: this must only be done with</text>
  <text x="110" y="642" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">genuinely wet hands and away from flammable materials.</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="700" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The magician&apos;s wet hands appear to be on fire, yet suffer no</text>
  <text x="110" y="718" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">injury.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>