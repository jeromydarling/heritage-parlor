<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CARRYING FIRE IN THE HANDS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  surgical spirit</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  damp hands</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: The performer&apos;s hands appear to be on fire — but they&apos;re unharmed.</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Method: Wet both hands THOROUGHLY with water first. Quickly apply a tiny</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">amount of isopropyl alcohol (rubbing alcohol — no more than a teaspoon).</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Ignite it immediately with a lighter. The alcohol burns with a cool blue</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">flame that doesn&apos;t harm thoroughly-wet skin for a few seconds. Keep hands</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">moving constantly. Extinguish with a wet cloth nearby. SAFETY: Never use more</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">than a teaspoon of alcohol. Never do this near flammable clothing, hair, or</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">materials. Adult supervision essential. Not recommended for home performance.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Chemical fire effects fascinated Victorian audiences who associated such</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">demonstrations with alchemy and chemical knowledge. Hoffmann included strong</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">safety warnings: this must only be done with genuinely wet hands and away</text>
  <text x="56" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">from flammable materials.</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The magician&apos;s wet hands appear to be on fire, yet suffer no injury.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>