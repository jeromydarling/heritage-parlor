<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE JUNIOR CLERK&apos;S PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Two workers start at $200/year. Worker A gets a $50 raise every</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">year. Worker B gets a $25 raise every 6 months. After 5 years, who</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">has earned more total? Calculate year by year for each. B&apos;s</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">twice-yearly raises add up differently than you might expect. Who</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">comes out ahead, and by how much?</text>
  <text x="110" y="437" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian clerks carefully tracked salary calculations — this</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle gave real insight to workers who negotiated their own pay</text>
  <text x="110" y="497" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">rates, showing that raise frequency matters as much as raise size.</text>
  <text x="110" y="531" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two clerks start at the same salary; one gets annual raises, one</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">gets half-yearly raises. Who saves more after 5 years?</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>