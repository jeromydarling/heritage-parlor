<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE JUNIOR CLERK&apos;S PUZZLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Two workers start at $200/year. Worker A gets a $50 raise every year. Worker</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">B gets a $25 raise every 6 months. After 5 years, who has earned more total?</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Calculate year by year for each. B&apos;s twice-yearly raises add up differently</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">than you might expect. Who comes out ahead, and by how much?</text>
  <text x="56" y="362" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian clerks carefully tracked salary calculations — this puzzle gave</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">real insight to workers who negotiated their own pay rates, showing that</text>
  <text x="56" y="422" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">raise frequency matters as much as raise size.</text>
  <text x="56" y="456" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="480" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two clerks start at the same salary; one gets annual raises, one gets</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">half-yearly raises. Who saves more after 5 years?</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>