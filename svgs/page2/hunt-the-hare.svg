<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HUNT THE HARE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Everyone sits in a circle. The Hare jogs around the outside of the</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">circle, building suspense, then suddenly taps a seated player on</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the shoulder and bolts. The tapped player leaps up and chases the</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hare around the full circle. If the Hare reaches the now-empty seat</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">before being tagged, the chaser becomes the new Hare. If the chaser</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tags the Hare before that, the Hare goes again. Think Duck Duck</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Goose, but without the &apos;duck duck&apos; — just a tap and a sprint.</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hunt the Hare is essentially the same game known today as &apos;Duck</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Duck Goose&apos; — it has been played in broadly similar forms across</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Europe for centuries, with local names referencing whatever animal</text>
  <text x="110" y="557" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the region considered the prime quarry for hunting.</text>
  <text x="110" y="591" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players sit in a circle with one player (the Hare) running around</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the outside. The Hare taps any seated player, who must immediately</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">jump up and chase the Hare around the circle. If the Hare reaches</text>
  <text x="110" y="669" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the empty seat before being caught, the chaser becomes the new</text>
  <text x="110" y="687" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hare.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>