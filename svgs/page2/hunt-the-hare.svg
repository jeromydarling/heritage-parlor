<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HUNT THE HARE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Everyone sits in a circle. The Hare jogs around the outside of the circle,</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">building suspense, then suddenly taps a seated player on the shoulder and</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bolts. The tapped player leaps up and chases the Hare around the full circle.</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">If the Hare reaches the now-empty seat before being tagged, the chaser</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">becomes the new Hare. If the chaser tags the Hare before that, the Hare goes</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">again. Think Duck Duck Goose, but without the &apos;duck duck&apos; — just a tap and a</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sprint.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hunt the Hare is essentially the same game known today as &apos;Duck Duck Goose&apos; —</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it has been played in broadly similar forms across Europe for centuries, with</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">local names referencing whatever animal the region considered the prime</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">quarry for hunting.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players sit in a circle with one player (the Hare) running around the</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">outside. The Hare taps any seated player, who must immediately jump up and</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">chase the Hare around the circle. If the Hare reaches the empty seat before</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">being caught, the chaser becomes the new Hare.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>