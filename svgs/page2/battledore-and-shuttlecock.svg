<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BATTLEDORE AND SHUTTLECOCK</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  battledore paddles</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  shuttlecock</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Need: two flat paddles (or improvise with large books or ping-pong paddles)</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and a shuttlecock (or badminton birdie). Hit the shuttlecock back and forth,</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">counting every successful hit. The goal is the most consecutive hits without</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dropping. This is NOT competitive like badminton — you&apos;re working together to</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keep the shuttlecock aloft as long as possible. Victorian record: 2,117</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">consecutive hits!</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Battledore and Shuttlecock was the forerunner of badminton — the modern sport</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">was codified at Badminton House, seat of the Duke of Beaufort, around 1873.</text>
  <text x="56" y="502" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="526" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players hit a feathered shuttlecock back and forth with flat bats without</text>
  <text x="56" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">letting it fall.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>