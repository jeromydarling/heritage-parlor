<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BATTLEDORE AND SHUTTLECOCK</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  battledore paddles</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  shuttlecock</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Need: two flat paddles (or improvise with large books or ping-pong</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paddles) and a shuttlecock (or badminton birdie). Hit the</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">shuttlecock back and forth, counting every successful hit. The goal</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">is the most consecutive hits without dropping. This is NOT</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">competitive like badminton — you&apos;re working together to keep the</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">shuttlecock aloft as long as possible. Victorian record: 2,117</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">consecutive hits!</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Battledore and Shuttlecock was the forerunner of badminton — the</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">modern sport was codified at Badminton House, seat of the Duke of</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Beaufort, around 1873.</text>
  <text x="110" y="595" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players hit a feathered shuttlecock back and forth with flat bats</text>
  <text x="110" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">without letting it fall.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)  ·  Heritage Parlor</text>
</svg>