<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">NAPOLEON (NAP)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 5 cards each. Going clockwise, each player bids how many tricks they&apos;ll</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">win solo (3, 4, or 5). Highest bidder leads the first card — the suit of that</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">card becomes trump. Win your bid: collect tokens equal to your bid from every</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">other player. Fail your bid: pay that many tokens to every other player.</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Special bids: &apos;Napoleon&apos; (all 5 tricks) wins or loses double stakes.</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Wellington&apos; (declaring after someone bids Napoleon) wins triple if</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">successful. Use tokens or keep score on paper instead of money. First to 20</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">points wins.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Napoleon became the most popular simple card game in Victorian England,</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">played in every class from servants&apos; halls to officers&apos; messes. Its brevity</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(5-card, 5-trick format) and simple bidding made it accessible to anyone.</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The simple British trick-taking game named after Napoleon - bid to win 3-5</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tricks as a solo player.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>