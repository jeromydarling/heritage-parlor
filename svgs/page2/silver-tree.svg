<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SILVER TREE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  silver nitrate solution</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  zinc strip</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass beaker</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Drop a clean zinc strip into a beaker of dilute silver nitrate solution. Over</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">several minutes, silver metal deposits on the zinc in beautiful branching,</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tree-like crystalline formations that slowly grow. The zinc dissolves while a</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">genuine silver metal tree grows from the chemistry. The result looks</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">genuinely magical. Important safety note: silver nitrate stains skin and</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">fabric black on contact and does not wash out easily — wear gloves and old</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">clothes. Adult supervision required. Silver nitrate solutions are available</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">from chemistry suppliers.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Silver Tree (and its cousin the Lead Tree, grown the same way) were among</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian chemists&apos; most beloved demonstrations precisely because the &apos;tree&apos;</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">growing from apparently nothing seemed genuinely miraculous. Michael Faraday</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performed it at the Royal Institution.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A zinc strip placed in a silver nitrate solution causes silver to deposit on</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the zinc, forming beautiful tree-like crystal formations that grow visibly</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">before the eye. The displaced metal prefers the zinc over the acid, creating</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a miniature metallic tree.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>