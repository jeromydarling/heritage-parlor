<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SILVER TREE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  silver nitrate solution</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  zinc strip</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass beaker</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Drop a clean zinc strip into a beaker of dilute silver nitrate</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">solution. Over several minutes, silver metal deposits on the zinc</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">in beautiful branching, tree-like crystalline formations that</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">slowly grow. The zinc dissolves while a genuine silver metal tree</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">grows from the chemistry. The result looks genuinely magical.</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Important safety note: silver nitrate stains skin and fabric black</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on contact and does not wash out easily — wear gloves and old</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">clothes. Adult supervision required. Silver nitrate solutions are</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">available from chemistry suppliers.</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="589" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Silver Tree (and its cousin the Lead Tree, grown the same way)</text>
  <text x="110" y="607" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">were among Victorian chemists&apos; most beloved demonstrations</text>
  <text x="110" y="625" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">precisely because the &apos;tree&apos; growing from apparently nothing seemed</text>
  <text x="110" y="643" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">genuinely miraculous. Michael Faraday performed it at the Royal</text>
  <text x="110" y="661" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Institution.</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="719" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A zinc strip placed in a silver nitrate solution causes silver to</text>
  <text x="110" y="737" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">deposit on the zinc, forming beautiful tree-like crystal formations</text>
  <text x="110" y="755" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that grow visibly before the eye. The displaced metal prefers the</text>
  <text x="110" y="773" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">zinc over the acid, creating a miniature metallic tree.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>