<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BEGGAR YOUR NEIGHBOR EXTENDED</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal all 52 cards equally among 2–6 players, face-down. Everyone flips their</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">top card simultaneously. When any Ace or court card (King, Queen, Jack)</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">appears, the next player must pay: Ace = 4 cards, King = 3, Queen = 2, Jack =</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">1. The last paying player wins the whole pile — unless another court card</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">appears during the payment, restarting the chain. Win by collecting all the</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The multiplayer version of Beggar My Neighbor was common in Victorian</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">nurseries where one or two extra siblings needed to join in. The pure chance</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">element meant no advantage to older players, making it genuinely</text>
  <text x="56" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">child-friendly.</text>
  <text x="56" y="516" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An extended version of Beggar My Neighbor where multiple players race to win</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all cards.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>