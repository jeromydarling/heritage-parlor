<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE POPGUN</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  elder branch</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  wooden dowel</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  knife</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cut a 6-inch section of elder branch and push out the soft inner pith to make</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a hollow tube. Carve a wooden rod that fits snugly inside; wrap tow (rope</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">fiber) around one end to seal the gap. Pack a small tow pellet into each end</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of the tube. Push the rod in sharply from one end — compressed air fires the</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">front pellet out with a satisfying pop. Adult supervision recommended for the</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">whittling steps.</text>
  <text x="56" y="448" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="472" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Homemade popguns from elder wood were described in virtually every Victorian</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">boys&apos; activity book. The principle is a simple air-pressure piston. Elder</text>
  <text x="56" y="508" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">wood was preferred because its soft pith is easily removed, creating a</text>
  <text x="56" y="526" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">natural bore.</text>
  <text x="56" y="560" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Whittle and assemble a simple popgun from elder wood that fires pellets with</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a satisfying pop.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>