<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE TRICK OF THIRTY-ONE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  playing cards (ace through 6, each suit)</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Use only cards ace through 6 (ace = 1). Take turns flipping a card</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">face-up and announcing the running total. Whoever makes the total</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reach exactly 31 wins — going over 31 loses immediately. The</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">unbeatable strategy: ensure you land on 3, 10, 17, and 24 on your</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">turns. Each is spaced 7 apart, and since the max card is 6, your</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opponent can never jump past your control points. If you go first</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and play correctly, you can always win. Go second and your opponent</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">might claim 3 — in which case recover by hitting 10, 17, and 24.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Thirty-One trick is a mathematical game theory problem. The</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">winning strategy (controlling positions modulo 7) is an instance of</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Nim theory — a branch of combinatorial game theory not formally</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">developed until 1901, but implicitly understood by Victorian</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle-masters.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two players alternately turn up cards and add their values, the one</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">who reaches exactly 31 winning. The cards are ace to six. The</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer can always win by controlling the running totals to land</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">on 3, 10, 17, and 24 — leaving the opponent unable to reach 31</text>
  <text x="110" y="726" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">first.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>