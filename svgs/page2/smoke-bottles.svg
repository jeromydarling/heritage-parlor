<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SMOKE BOTTLES</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two glass bottles</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hartshorn (ammonia) solution</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  salt solution</text>
  <text x="126" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  corks</text>
  <text x="110" y="352" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="378" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Prepare one container with ammonia solution and another with</text>
  <text x="110" y="399" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hydrochloric acid solution. When their openings are brought close</text>
  <text x="110" y="420" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">together, the vapors combine instantly: NH₃ + HCl → NH₄Cl,</text>
  <text x="110" y="441" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">producing a dense white cloud of ammonium chloride. The effect is</text>
  <text x="110" y="462" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dramatic and instant. This demonstration requires adult</text>
  <text x="110" y="483" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">supervision, proper ventilation, eye protection, and careful</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">handling. Both chemicals are irritants — keep away from face. The</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">same reaction is used in theatrical fog effects today.</text>
  <text x="110" y="566" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="590" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This reaction between ammonia and hydrochloric acid is so visually</text>
  <text x="110" y="608" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dramatic that Victorian chemistry demonstrators called it &apos;bottled</text>
  <text x="110" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">lightning&apos; — the white smoke appears instantly and fills a large</text>
  <text x="110" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">volume. The same reaction is used today in theatrical fog effects.</text>
  <text x="110" y="678" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="702" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two bottles are prepared — one containing hartshorn (ammonia)</text>
  <text x="110" y="720" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">vapors and one containing muriatic acid (hydrochloric acid) fumes.</text>
  <text x="110" y="738" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">When their corks are removed simultaneously and the bottle mouths</text>
  <text x="110" y="756" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">brought close together, a dense white cloud of smoke instantly</text>
  <text x="110" y="774" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fills the air between them.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>