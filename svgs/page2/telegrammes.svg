<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">TELEGRAMMES</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencils</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player picks a word of 5–8 letters and writes it vertically on</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper. Everyone writes a &apos;telegram message&apos; where each letter</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">begins a new word of the message in order. Set a timer for 2</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">minutes. Read aloud: the funniest or most creative message wins the</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">round. Example: STORM = Send The Otter Running, Magically. The</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">constraint of the preset letters is what makes it surprisingly hard</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and hilarious.</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Telegrammes combined the Victorian obsession with the telegram (a</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">new technology from 1837) with wordplay. The constraint of fitting</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a message to preset initial letters was seen as good mental</text>
  <text x="110" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">exercise - similar to modern acrostic puzzles.</text>
  <text x="110" y="613" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Use each letter of a word as the first letter of successive words</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in a telegram message.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)  ·  Heritage Parlor</text>
</svg>