<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DISSECTION OF VIERECK&apos;S SQUARE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  scissors</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Can you cut one large square into a small number of pieces and</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rearrange them into two smaller squares? The famous 3-4-5 right</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">triangle shows it&apos;s possible: cut a 5×5 square into 4 pieces that</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rearrange into a 3×3 and a 4×4 square. This works because 3² + 4² =</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">5² (the Pythagorean theorem). Draw it on grid paper and try the</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cuts.</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This puzzle is a hands-on version of the Pythagorean theorem —</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">because 3² + 4² = 5², the square on the long side can always be</text>
  <text x="110" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dissected into the two smaller squares.</text>
  <text x="110" y="574" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="598" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Cut a large square into the fewest number of pieces that can be</text>
  <text x="110" y="616" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">rearranged into two smaller squares.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>