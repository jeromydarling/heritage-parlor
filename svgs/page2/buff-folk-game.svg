<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BUFF (FOLK GAME)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  stick</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player acts as &apos;Buff,&apos; performing a solemn routine with a stick before</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the seated group and delivering the ritual dialogue with complete deadpan</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sincerity. The entire group must keep a perfectly straight face. Anyone who</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cracks a smile — player or audience — owes a fun penalty: a silly dance, a</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">joke, or a song line. Buff themselves must also never smile. A wonderful game</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of collective deadpan performance.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;Buff&apos; — meaning a strong-faced, straight-faced person — gives us the phrase</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;blind man&apos;s buff&apos; and &apos;calling one&apos;s bluff.&apos; This game may be the origin of</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">both expressions.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players sit in a row; one thumps a stick and delivers the dialogue. The goal</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">is to make &apos;Buff&apos; smile for a forfeit. &apos;Knock, knock! / Who&apos;s there? / Buff.</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">/ Buff says Buff to all his men, / And I say Buff to you again, / Buff</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">neither laughs nor smiles.&apos; Anyone who laughs pays a forfeit.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>