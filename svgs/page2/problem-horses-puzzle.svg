<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE THREE HORSES PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">A dealer buys three horses for $90 total. They sells all three for</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">$30 each. On the first, they makes a 10% profit. On the second,</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">they breaks even. On the third, they takes a 10% loss. Does they</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">come out ahead, behind, or exactly even overall? Work it out: if</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">they gains 10% selling for $30, they paid about $27.27 for that</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">horse. If they loses 10% selling for $30, they paid about $33.33.</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Add all three purchase prices. The answer surprises most people —</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">they actually loses money overall.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This percentage paradox catches people because equal percentage</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">gains and losses on different base prices don&apos;t cancel out — a trap</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that catches investors today just as it caught Victorian</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle-solvers.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A dealer buys three horses for £90 total. He sells the first for</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">£30 and gains 10%, the second for £30 and neither gains nor loses,</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and the third for £30 and loses 10%. How much does he gain or lose</text>
  <text x="110" y="712" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">overall? The apparent paradox resolves simply when each horse&apos;s</text>
  <text x="110" y="730" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">original price is calculated.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>