<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ALL THE BOYS IN OUR TOWN</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players form a large circle with one player in the middle. The</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">circle sings the song while walking round. At the verse about</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wanting a sweetheart, the center player picks one person from the</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ring to join them. The pair act out the courtship verses together —</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">holding hands, turning, and taking a bow — while the ring sings.</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Then a new player takes the center and the game continues.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This singing game is one of a large family of Victorian</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">partner-choosing games that mimicked adult courtship rituals,</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">giving children a playful way to rehearse social customs</text>
  <text x="110" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">surrounding marriage and romance.</text>
  <text x="110" y="570" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Children form a ring with one child in the center. After the first</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">verse, a child from the ring goes to join the center child. The</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">rest sing verses while the central pair perform actions suiting the</text>
  <text x="110" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">words, pairing off like sweethearts. The song runs: &apos;All the boys</text>
  <text x="110" y="666" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in our town / Shall lead a happy life, / Except &apos;tis ——, and he</text>
  <text x="110" y="684" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">wants a wife.&apos;</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>