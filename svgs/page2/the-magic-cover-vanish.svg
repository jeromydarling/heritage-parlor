<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC COVER VANISH</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  coin</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cup or cover</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A coin placed under a small cup vanishes when the cup is</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">lifted. Method: Place a coin on the table and cover it with a small</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cup. Drape a handkerchief over both. While &apos;adjusting&apos; the covered</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cup with both hands, use the moment to palm (secretly grip) the</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">coin in your fingers. Tap the covered cup, then lift the</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">handkerchief and cup together — the coin has gone. The palming</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">happens in the split second when both hands briefly hold the draped</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cup. You need: a coin, a small cup, and a handkerchief.</text>
  <text x="110" y="544" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This elementary disappearance uses the principle that covering an</text>
  <text x="110" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">object before vanishing it makes the vanish more impossible - the</text>
  <text x="110" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">audience expects the cover to protect the coin from interference.</text>
  <text x="110" y="638" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A coin placed under a cover vanishes completely when the cover is</text>
  <text x="110" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">lifted.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>