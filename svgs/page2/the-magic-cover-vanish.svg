<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC COVER VANISH</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  coin</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cup or cover</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A coin placed under a small cup vanishes when the cup is lifted.</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Method: Place a coin on the table and cover it with a small cup. Drape a</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">handkerchief over both. While &apos;adjusting&apos; the covered cup with both hands,</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">use the moment to palm (secretly grip) the coin in your fingers. Tap the</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">covered cup, then lift the handkerchief and cup together — the coin has gone.</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The palming happens in the split second when both hands briefly hold the</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">draped cup. You need: a coin, a small cup, and a handkerchief.</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="493" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This elementary disappearance uses the principle that covering an object</text>
  <text x="56" y="511" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">before vanishing it makes the vanish more impossible - the audience expects</text>
  <text x="56" y="529" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the cover to protect the coin from interference.</text>
  <text x="56" y="563" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="587" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A coin placed under a cover vanishes completely when the cover is lifted.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>