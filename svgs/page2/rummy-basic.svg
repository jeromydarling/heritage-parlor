<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">RUMMY (BASIC)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 10 cards each (2 players) or 7 cards each (3–6 players). Flip one card</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">face-up to start the discard pile; leave the rest as the draw pile. On your</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">turn: draw one card from the pile or the discard pile. Lay down melds face-up</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— sets (three or more matching values) or runs (three or more consecutive</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards in the same suit). Add cards to any meld already on the table,</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">including other players&apos;. End your turn by discarding one card. Go out by</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">melding or laying off all your cards. First to go out wins.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Basic Rummy was developed from Conquian in the early 1900s and immediately</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">became the most widely played card game family in the world. Gin Rummy</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(1909), Canasta (1940s), and Kalooki are all descendants.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The most popular card game family in the world - draw, meld, and be first to</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">empty your hand.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>