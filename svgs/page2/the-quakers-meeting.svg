<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE QUAKER&apos;S MEETING</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player stands up and addresses the group with the most serious,</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pompous manner imaginable — delivering completely ridiculous</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">speeches, absurd announcements, or nonsense facts with total</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">deadpan sincerity. Everyone else must maintain absolute silence and</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keep a straight face. Anyone who laughs, smiles, or fidgets owes a</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">silly penalty (sing a line of a song, do a funny dance, tell a</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">joke). A new speaker can take over at any time without having</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cracked a smile.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Quakers were known in Victorian England for their extremely</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">solemn meeting-houses where no laughter was permitted. The game</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">satirized this solemnity by making the effort to maintain a</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">straight face during the most ridiculous speeches the center of</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">entertainment.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Maintain perfect Quaker solemnity while others attempt to make you</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">laugh or move.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)  ·  Heritage Parlor</text>
</svg>