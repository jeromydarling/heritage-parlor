<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BUZZ</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players count in turn around the circle: 1, 2, 3... But whenever the number</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">is a multiple of 7 (7, 14, 21, 28...) OR contains the digit 7 (7, 17, 27, 37,</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">47, 57, 67, 70, 71...), you must say &apos;Buzz!&apos; instead of the number. Say the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">actual number by mistake and you&apos;re out. The counting continues from where</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you left off. Last player standing wins.</text>
  <text x="56" y="383" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Buzz trains rapid mental arithmetic — Victorian educators praised games that</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">developed &apos;mental arithmetic&apos; as essential for commerce and trade.</text>
  <text x="56" y="459" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="483" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players count in sequence but must say &apos;Buzz&apos; instead of any multiple of</text>
  <text x="56" y="501" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">seven or number containing a seven.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>