<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">DICE (CHUCK-A-LUCK)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  3 dice</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  birdcage or cup</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  betting layout</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">A device tumbles 3 dice. Before rolling, players bet on any number</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">from 1 to 6. If your number appears on 1 die: win even points. On 2</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dice: win double. On all 3 dice: win triple. If it doesn&apos;t appear:</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">lose your bet. Use points or chips instead of money. For a family</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">game, set a fixed starting budget of chips and see who has the most</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">at the end. The chance your number shows at least once is about</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">42%.</text>
  <text x="110" y="523" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="547" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Chuck-a-Luck (also called Sweat-Cloth) was a staple of American</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">frontier gambling alongside Faro. The distinctive birdcage tumbler</text>
  <text x="110" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">for rolling three dice became the game&apos;s iconic image. The house</text>
  <text x="110" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">has about a 7.9% edge in the standard version.</text>
  <text x="110" y="635" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="659" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The American dice banking game where you bet on which numbers will</text>
  <text x="110" y="677" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">come up on three dice.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>