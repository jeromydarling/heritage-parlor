<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">COMMERCE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">3–8 players. Everyone puts a chip in the pot. Deal 3 cards each;</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">leftover cards go face-up as the &apos;offer.&apos; On your turn, either buy</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the top offered card (pay a chip) and discard one, or swap a card</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with another player. Best 3-card hand wins the pot. Rankings from</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">best: Three of a Kind, Sequence Flush, Flush, Pair, Sequence. Play</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">several rounds — chips can be replaced with points.</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Commerce was a widely played Victorian family card game considered</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">suitable for all ages because its simple trading mechanism did not</text>
  <text x="110" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">require card-counting skills. Victorian children&apos;s books frequently</text>
  <text x="110" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mention it as an after-dinner family entertainment.</text>
  <text x="110" y="592" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="616" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Victorian party card game where players trade and exchange to</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">build the best three-card combination.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>