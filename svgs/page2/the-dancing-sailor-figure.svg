<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DANCING SAILOR FIGURE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  stiff paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine thread</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  button</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A small paper figure dances, bows, and waves as if alive. Method: Cut</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a jointed sailor shape from stiff cardstock — arms and legs loosely connected</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">so they can move. Attach a long fine thread from one wrist, running along</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your body to a loop or button at your knee. Place the figure on the table and</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">step back. Move your knee gently and the thread makes the sailor dance and</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bow. Keep movements small and let the figure do the performing. Great for</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">entertaining younger kids.</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="493" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Thread-operated paper marionettes were popular Victorian parlor entertainment</text>
  <text x="56" y="511" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">for children. The figures were sold as kits in toy shops and described in</text>
  <text x="56" y="529" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">boys&apos; hobby books of the 1860s-1880s.</text>
  <text x="56" y="563" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="587" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A jointed paper sailor figure dances and bows on a table in response to</text>
  <text x="56" y="605" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">invisible commands.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>