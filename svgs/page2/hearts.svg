<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HEARTS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 13 cards each. Pass 3 cards to your left neighbor (everyone</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">does simultaneously). The player with the 2 of clubs leads the</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">first trick. Follow suit if you can; otherwise play anything.</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hearts and the Queen of Spades are penalty cards — avoid taking</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">them in tricks. Score: 1 point per heart, 13 points for the Queen</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of Spades. OR — collect ALL 26 penalty points yourself to &apos;shoot</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the moon&apos;: every other player scores 26 points instead of you.</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">First player to reach 100 points loses; lowest score wins.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hearts evolved from 17th-century penalty-card games. The &apos;shoot the</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">moon&apos; rule was added much later and completely transformed the</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">strategy by introducing an aggressive high-risk option that rewards</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bold play.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Avoid winning hearts and the Queen of Spades - unless you dare to</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">shoot the moon.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>