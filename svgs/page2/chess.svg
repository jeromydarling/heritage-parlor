<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CHESS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chess board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chess pieces</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chess clock (optional)</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player controls 16 pieces with different abilities on an 8×8 board.</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Goal: checkmate your opponent&apos;s King — put it under attack with no escape.</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Piece movements: Pawns advance forward 1 square (2 on first move), capture</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">diagonally. Rooks move any distance straight. Bishops move diagonally.</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Knights jump in an L-shape. Queens move any direction any distance. Kings</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">move one square any direction. Special rules: castling (King and Rook swap),</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">en passant pawn capture, and pawn promotion when reaching the far end. White</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">always moves first.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Chess originated in India as Chaturanga around 600 AD, evolved through Persia</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and the Arab world, and reached Europe by 900 AD. The modern rules were</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">standardized around 1475 when the Queen gained her current powerful movement.</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="608" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The royal game of strategy - command 16 pieces with different powers on 64</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">squares.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>