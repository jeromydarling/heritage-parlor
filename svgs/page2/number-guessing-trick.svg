<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE NUMBER GUESSING TRICK</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Ask someone to think of any number. Tell them: &apos;Multiply it by 3.</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">If the result is odd, drop the half and round down. Now multiply</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">that result by 3 again. Tell me the answer.&apos; To find their original</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">number: divide their final answer by 9. If they thought of 7:</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">7×3=21, drop the half → 10, 10×3=30. 30÷9=3.33... but you round to</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the nearest whole number → 7? Actually: try different starting</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">numbers to find the pattern, then perform it live. The math works</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cleanly for even numbers — practice before performing.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Mental arithmetic tricks presented as mind-reading acts were</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">extremely popular Victorian entertainment. Performers like</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;Lightning Calculators&apos; performed at music halls and were</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">celebrated as possessors of almost supernatural powers before the</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mathematical basis was understood.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Ask someone to think of any number, triple it, halve the result (if</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">odd, drop the fraction), triple that, then tell you the result. The</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer instantly determines the original number. If the final</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">result is even, the original was even; divide the result by 9 to</text>
  <text x="110" y="726" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">get the original number.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>