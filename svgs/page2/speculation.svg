<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SPECULATION</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 3 cards face-down to each player and flip one card to set trump. All</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">players add chips to a central pool. The face-up trump card is the current</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;best trump in view.&apos; Players may now buy and sell each other&apos;s unplayed</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards sight-unseen, speculating that a card they buy might be a higher trump.</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">When all cards have been revealed or exchanged, the holder of the highest</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">trump card wins the entire pool. Use tokens or points instead of money.</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Simple but social — lots of bluffing and bargaining between rounds.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Jane Austen wrote in a letter that she played Speculation with her nieces and</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">found it &apos;very entertaining.&apos; It appears prominently in Mansfield Park (1814)</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as the card game played at Mansfield Park.</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A card game of speculation where players buy and sell the highest trump card</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">seen so far.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>