<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE GAME OF CONVERSATION</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player says any word aloud. Moving clockwise, each player must</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">instantly say a word associated with the previous one — no pausing</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">more than 3 seconds, no repeating a word already used, no phrases</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(one word only). One player watches the time and calls out any</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hesitation. Penalties for slipping up: tell a joke, do an</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">impression, or sing a line of a song. There&apos;s no clear winner — the</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">fun is in seeing where the chain of associations leads.</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Particularly funny when the chain takes a wild or unexpected turn.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Word association games were considered excellent mental exercise in</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian England, and some physicians recommended them as memory</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">training. The game fell out of fashion as a parlor game but</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">survives as a psychological test (Jung used it diagnostically from</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1904).</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players pass a theme word around the circle; each must give a</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">related word without hesitation.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>