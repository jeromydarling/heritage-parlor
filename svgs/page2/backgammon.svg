<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BACKGAMMON</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  backgammon board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  30 pieces (15 per player)</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  4 dice</text>
  <text x="72" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  2 dice cups</text>
  <text x="56" y="298" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="324" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player has 15 pieces moving in opposite directions around 24 narrow</text>
  <text x="56" y="345" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">triangular points. Roll 2 dice; move any of your pieces those exact numbers</text>
  <text x="56" y="366" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of points forward. You can split the move between two pieces. Landing on a</text>
  <text x="56" y="387" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">single opponent piece sends it to the &apos;bar&apos; — it must re-enter from your</text>
  <text x="56" y="408" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opponent&apos;s home board before you can move anything else. Build &apos;primes&apos;</text>
  <text x="56" y="429" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(blocks of two or more pieces) to block your opponent. Once all your pieces</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">are in your home board, start &apos;bearing them off.&apos; First to bear off all 15</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pieces wins.</text>
  <text x="56" y="512" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Backgammon boards have been found in ancient Mesopotamia dating back 5,000</text>
  <text x="56" y="554" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">years. The doubling cube was added in New York around 1920 and transformed</text>
  <text x="56" y="572" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the game&apos;s strategic depth. Backgammon tournaments today offer prizes over</text>
  <text x="56" y="590" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">$100,000.</text>
  <text x="56" y="624" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The most ancient board game still widely played, combining dice luck with</text>
  <text x="56" y="666" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">deep tactical skill.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>