<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BACKGAMMON</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  backgammon board</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  30 pieces (15 per player)</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  4 dice</text>
  <text x="126" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  2 dice cups</text>
  <text x="110" y="352" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="378" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player has 15 pieces moving in opposite directions around 24</text>
  <text x="110" y="399" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">narrow triangular points. Roll 2 dice; move any of your pieces</text>
  <text x="110" y="420" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">those exact numbers of points forward. You can split the move</text>
  <text x="110" y="441" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">between two pieces. Landing on a single opponent piece sends it to</text>
  <text x="110" y="462" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the &apos;bar&apos; — it must re-enter from your opponent&apos;s home board before</text>
  <text x="110" y="483" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you can move anything else. Build &apos;primes&apos; (blocks of two or more</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pieces) to block your opponent. Once all your pieces are in your</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">home board, start &apos;bearing them off.&apos; First to bear off all 15</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pieces wins.</text>
  <text x="110" y="587" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="611" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Backgammon boards have been found in ancient Mesopotamia dating</text>
  <text x="110" y="629" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">back 5,000 years. The doubling cube was added in New York around</text>
  <text x="110" y="647" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1920 and transformed the game&apos;s strategic depth. Backgammon</text>
  <text x="110" y="665" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tournaments today offer prizes over $100,000.</text>
  <text x="110" y="699" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="723" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The most ancient board game still widely played, combining dice</text>
  <text x="110" y="741" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">luck with deep tactical skill.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>