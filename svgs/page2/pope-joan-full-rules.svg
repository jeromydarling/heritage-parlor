<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">POPE JOAN (FULL RULES)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  48-card deck (remove 8 of diamonds)</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  Pope Joan board</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Use a 48-card deck (remove the 8 of Diamonds). You need a Pope Joan board — a</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">round board with labeled compartment pockets. Players ante chips to eight</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pockets: Ace, King, Queen, Jack, Matrimony (K+Q of trumps), Intrigue (Q+J of</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">trumps), Game (goes to hand-emptier), Pope Joan (the 9 of Diamonds). Play</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sequences in suit; collect from the matching pocket when you play those</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">special cards. Empty your hand first to win the Game pocket.</text>
  <text x="56" y="448" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="472" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pope Joan boards were elaborately decorated and sold as luxury parlor games.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The 9 of diamonds was called Pope Joan because an anti-Catholic English</text>
  <text x="56" y="508" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tradition held that the playing-card depicted a legendary female pope.</text>
  <text x="56" y="542" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="566" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An old English card game played on a decorated board with pools for King,</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Queen, Jack, and Pope Joan.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>