<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HAND (CODDEM)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small coin or pebble</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Team A has a small object (a coin, a button, a pebble). All Team A players</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hold both fists closed — but only one person holds the object, in one</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">specific hand. Team B must guess: which player has it, AND which hand? Team A</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">may shuffle and pass the object between players between guesses to confuse.</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Bluffing and misdirection are the main strategies. Teams swap after three</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">correct guesses.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This ancient guessing game appears in the writings of Aristotle as a</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">children&apos;s pastime — Greek children called it &apos;artiazein&apos; or &apos;odd-even hand.&apos;</text>
  <text x="56" y="480" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One team hides a small object in one player&apos;s closed hand; the opposing team</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">must guess which hand holds it.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>