<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HUCKLE BUCKLE BEANSTALK</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small hidden object</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player hides a small object in plain sight while everyone else waits</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">outside. Players come in and search. Here&apos;s the twist: when you spot the</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hidden object, you DON&apos;T tell anyone. Instead, quietly sit down and say</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Huckle Buckle Beanstalk.&apos; You&apos;ve signaled you found it without giving away</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the location. Everyone else keeps searching. The last person still hunting</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">has to pay a silly penalty — like making up a rhyme or doing a silly dance.</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The fun is in watching others search while you sit smugly knowing the secret.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Huckle Buckle Beanstalk teaches an unusual social skill: discretion after</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">discovery. The silent sit-down rule prevents the early finders from ruining</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it for later searchers - a distinctly Victorian value of consideration for</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">others.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hunt for a hidden object; when you find it, sit silently saying &apos;Huckle</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Buckle Beanstalk&apos; rather than pointing.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>