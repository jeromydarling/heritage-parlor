<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ALL A ROW</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Small children line up one behind another in a single row, each</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with hands on the shoulders of the child ahead. March together</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">while singing the Bell-horses song (or any walking rhyme). No</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">winners or losers — the fun is moving together as a group. A</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">perfect first group game for the youngest players.</text>
  <text x="110" y="437" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This simple marching rhyme is one of thousands of children&apos;s</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">singing games recorded by Alice Gomme in her landmark 1894 study,</text>
  <text x="110" y="497" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">which remains the most comprehensive collection of traditional</text>
  <text x="110" y="515" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">British children&apos;s folk games ever assembled.</text>
  <text x="110" y="549" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A marching game for very little children, who follow each other in</text>
  <text x="110" y="591" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a row singing: &apos;All a row, a bendy bow, / Shoot at a pigeon and</text>
  <text x="110" y="609" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">kill a crow; / Shoot at another and kill his brother; / Shoot again</text>
  <text x="110" y="627" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and kill a wren, / And that&apos;ll do for gentlemen.&apos;</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>