<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MYSTERIOUS FUNNEL</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  metal funnel</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  water</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Water poured into a funnel flows through — until you command it to</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">stop, and it does. Method: Use a metal funnel with a small pinhole on the</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">side. While the hole is covered by your ring finger, air can&apos;t enter to</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">replace the water, so nothing flows. Release your finger and water flows</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">freely. The finger covering the hole is invisible to the audience. Present</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">each change as the water obeying your command. This works on the same</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">principle as covering the top of a straw to hold liquid in it. You need: a</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">metal funnel with a pinhole drilled in the side.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This trick demonstrates the Torricelli/vacuum principle discovered in 1644.</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The same principle explains why a straw holds liquid when you cover its top.</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">It was particularly impressive to Victorian audiences unfamiliar with</text>
  <text x="56" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pneumatics.</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Water poured into a funnel can be made to flow through or stop flowing at the</text>
  <text x="56" y="622" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magician&apos;s command.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>