<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BADGER THE BEAR</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  string or cord</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  caps or handkerchiefs for pelting</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player is the Bear (kneeling on all fours) held by a string held by the</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Keeper. The other players circle and taunt from a safe distance. Players may</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">only try to tag the Bear when the Keeper shouts &apos;My Bear is free!&apos; — anyone</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">who reaches in before that signal becomes the new Bear. The Keeper pulls the</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">string to defend. A high-energy game requiring a safe open space.</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="429" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This game dramatizes the once-popular sport of bear-baiting, transforming a</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">brutal spectacle into a childhood game. It survived long after real</text>
  <text x="56" y="465" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bear-baiting was outlawed in Britain in 1835.</text>
  <text x="56" y="499" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="523" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One boy plays the &apos;Bear&apos; on hands and knees, held by a string. A &apos;Keeper&apos;</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">defends him from attacks by other players who pelt him with caps and neckties</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">on string. Players may only strike when the Keeper cries &apos;My Bear is free!&apos;</text>
  <text x="56" y="577" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Any player who strikes too early becomes the new Bear.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>