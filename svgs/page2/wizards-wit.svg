<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE WIZARD&apos;S WIT (REMOVE MIDDLE COIN)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  3 coins</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place three coins in a row: A B C. Challenge: remove the middle coin (B)</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">without touching it. Solution: slide coin A over the top of coin B so that A</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">now rests where B used to be and C&apos;s spot is still occupied. Now look — B is</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">no longer the middle coin, because A is where B was. Pick up B. When your</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">friend protests, point out: you were told not to touch the middle coin. Once</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you moved A, B was no longer the middle coin — so you could pick it up</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">freely.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This puzzle exploits the ambiguity between a fixed positional definition of</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;middle&apos; and a relational one. It was a popular gentleman&apos;s wager precisely</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">because winning requires questioning the terms of the wager itself — a</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">logical rather than physical solution.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three coins are laid in a row. The wager: remove the middle coin without</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">touching it. The apparent impossibility dissolves with the solution — slide</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">either side coin over the middle one. The middle coin is now on the side and</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">can be picked up. The lateral-thinking solution makes this both a puzzle and</text>
  <text x="56" y="633" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a bet-winner.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>