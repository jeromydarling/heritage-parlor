<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HOW WHERE AND WHEN</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player secretly picks a subject — a person, animal, or object. Others</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">take turns asking: &apos;How do you like it?&apos;, &apos;Where do you like it?&apos;, &apos;When do</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you like it?&apos; The subject-holder answers truthfully but as ambiguously as</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">possible, giving answers that could fit many things. The group tries to guess</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the subject. The longer it takes to guess, the better the subject-holder</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">played.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The brilliance of this game is that good players can make almost anything</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sound like anything else — a master of the game could describe a boot as if</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">speaking of a poem.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players answer &apos;how,&apos; &apos;where,&apos; and &apos;when&apos; questions about a secret subject</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">using ambiguous answers.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>