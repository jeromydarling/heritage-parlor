<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">FIRE EATING</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">SAFETY NOTE: This is a historical description only — do not attempt this at</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">home. Victorian performers prepared by coating their tongue with a protective</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">substance (alum solution), then briefly touched a small piece of burning</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">material to their tongue before blowing it out. The trick relied on speed,</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">moisture, and fireproof preparation — not any real resistance to heat.</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Professional fire performers train for years with proper safety equipment.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian fire-eaters performed at fairgrounds and music halls — the parlor</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">version was considered daring but achievable. Always have water nearby and</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">never attempt with unprepared tongue.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A performer appears to chew and swallow glowing fire safely through a</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">chemical preparation.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>