<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE EGG BAG</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth bag</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  eggs</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Eggs appear and vanish from a cloth bag that looks</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">completely empty — over and over. Method: The bag has a hidden</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pocket sewn inside at the mouth. An egg placed in the bag can be</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">secretly held in this outer pocket when you show the bag &apos;empty.&apos;</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">To find the egg again, reach into the pocket while appearing to</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reach inside the bag. Add a second egg for extra comedy — the</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">audience expects it to be gone, then gone again, then back again.</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">You need: a cloth bag with a secret pocket (sewn yourself or</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bought), and a few hard-boiled or plastic eggs.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Egg Bag is one of the fundamental parlor magic props. Its</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">comedy potential - repeatedly finding eggs in an &apos;empty&apos; bag - made</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it enormously popular with Victorian family audiences and in</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">children&apos;s entertainment.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Eggs appear and disappear from an apparently empty cloth bag in a</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">baffling and comedic way.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>