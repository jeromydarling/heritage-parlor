<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE EGG BAG</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth bag</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  eggs</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Eggs appear and vanish from a cloth bag that looks completely empty —</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">over and over. Method: The bag has a hidden pocket sewn inside at the mouth.</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">An egg placed in the bag can be secretly held in this outer pocket when you</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">show the bag &apos;empty.&apos; To find the egg again, reach into the pocket while</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">appearing to reach inside the bag. Add a second egg for extra comedy — the</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">audience expects it to be gone, then gone again, then back again. You need: a</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cloth bag with a secret pocket (sewn yourself or bought), and a few</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hard-boiled or plastic eggs.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Egg Bag is one of the fundamental parlor magic props. Its comedy</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">potential - repeatedly finding eggs in an &apos;empty&apos; bag - made it enormously</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">popular with Victorian family audiences and in children&apos;s entertainment.</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Eggs appear and disappear from an apparently empty cloth bag in a baffling</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and comedic way.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>