<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CHINESE PICTURES (WATER TRICK)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  rice paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chemical solutions</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A completely plain piece of paper is painted with water —</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and a hidden image appears as if from nowhere. Method: Use</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wax-resist art: draw a picture with a white wax crayon or candle</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">stub on white paper — invisible against the white background. When</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you brush watercolor paint over the whole sheet, the paint sticks</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">everywhere EXCEPT where the wax is, making the image appear.</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Alternatively, pre-treat paper with a design using rubber cement,</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">let dry, and paint over. A lovely activity as much as a trick. You</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">need: white paper, white crayon or candle, and watercolor paint.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Wax-resist art (batik) has been practiced in Indonesia and China</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">for centuries. In Victorian England, a similar technique was used</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as a children&apos;s amusement - drawing with white crayon on white</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">paper, then painting over it with watercolor to reveal the image.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Plain water drawn across special paper reveals an invisible</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">painting, as if conjured from nothing.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>