<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ECARTE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  32-card Piquet deck</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Use the 32-card deck (7s through Aces). Deal 5 cards each; flip one for</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">trump. Either player may propose exchanging cards — you swap as many as you</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">like from your hand for fresh ones, hoping to improve it. If your opponent</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">accepts and then fails to win 3 tricks, they lose a point. If they refuse and</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you win all 5 tricks, you score an extra point. The goal is to win 3 of the 5</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tricks. The King of trump held in hand scores a bonus point. Play to 5</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">points. Note: original game included betting; substitute points or tokens.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Écarté was the rage of Parisian cafés from 1820–1850, then swept London club</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">card rooms. The game&apos;s name means &apos;discarded&apos; in French, referring to its</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">unique card-exchange mechanism.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An elegant French two-player game in which players exchange cards to improve</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">their hand before playing tricks.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>