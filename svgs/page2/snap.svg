<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SNAP</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck or snap deck</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal all cards equally into face-down packs. Take turns flipping the top card</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">onto a central pile. When any two face-up piles have matching top cards —</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">shout &apos;SNAP!&apos; first and take all the cards in those piles. If you shout</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;SNAP!&apos; when the top cards don&apos;t match, you pay a penalty (put some of your</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards at the bottom of the central pile). Run out of cards and you&apos;re out.</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Last player with cards wins. Expect arguments over who shouted first — that&apos;s</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">part of the fun.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Snap was first sold as a dedicated card game by John Jacques &amp; Son in 1866 -</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the same company that invented Croquet. Victorian nursery literature</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">repeatedly describes children playing Snap as an after-tea entertainment.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The fastest and most chaotic card game ever invented - shout SNAP when</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">matching cards appear.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>