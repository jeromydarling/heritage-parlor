<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MIRACULOUS APPLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  apple</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine needle</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  thread</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A whole apple — skin perfectly intact — falls apart into neat</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">segments at a gentle pull. Method: the preparation happens well before the</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">performance. Thread a needle with strong thread and insert it into the apple</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through the stem hole. Loop the thread inside the apple through several</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">insertion points, creating internal divisions, then withdraw the needle. The</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">apple looks completely normal. To perform: hold the apple out, grip the stem,</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and give a firm but smooth pull — the thread segments the flesh cleanly</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">inside while the skin falls open in sections.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Miraculous Apple is a perfect example of the &apos;advance preparation&apos;</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">principle in conjuring — the hardest work is done long before the</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performance, so that in the moment, the performer needs no skill at all. This</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">principle underlies many of magic&apos;s most baffling effects.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An apparently whole apple is divided into segments without breaking its skin.</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The method: a needle and thread are threaded through the apple under the skin</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in multiple directions before the performance. When the audience asks for the</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">apple to be &apos;divided,&apos; simply pulling the thread segments the flesh inside</text>
  <text x="56" y="698" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">while the skin remains intact.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>