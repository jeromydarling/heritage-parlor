<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MIRACULOUS APPLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  apple</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine needle</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  thread</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A whole apple — skin perfectly intact — falls apart into</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">neat segments at a gentle pull. Method: the preparation happens</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">well before the performance. Thread a needle with strong thread and</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">insert it into the apple through the stem hole. Loop the thread</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">inside the apple through several insertion points, creating</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">internal divisions, then withdraw the needle. The apple looks</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">completely normal. To perform: hold the apple out, grip the stem,</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and give a firm but smooth pull — the thread segments the flesh</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cleanly inside while the skin falls open in sections.</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="589" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Miraculous Apple is a perfect example of the &apos;advance</text>
  <text x="110" y="607" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">preparation&apos; principle in conjuring — the hardest work is done long</text>
  <text x="110" y="625" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">before the performance, so that in the moment, the performer needs</text>
  <text x="110" y="643" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">no skill at all. This principle underlies many of magic&apos;s most</text>
  <text x="110" y="661" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">baffling effects.</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="719" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An apparently whole apple is divided into segments without breaking</text>
  <text x="110" y="737" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">its skin. The method: a needle and thread are threaded through the</text>
  <text x="110" y="755" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">apple under the skin in multiple directions before the performance.</text>
  <text x="110" y="773" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">When the audience asks for the apple to be &apos;divided,&apos; simply</text>
  <text x="110" y="791" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pulling the thread segments the flesh inside while the skin remains</text>
  <text x="110" y="809" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">intact.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>