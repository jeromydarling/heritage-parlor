<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE LOST NUMBER</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Ask someone to secretly think of a number. Tell them: double it,</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">add 10, halve the result, subtract their original number. They&apos;ll</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">always end up with 5 — no matter what they started with! For a more</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">impressive version: &apos;Think of a number, multiply by 9, add the</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">digits of the result together, subtract 5.&apos; They&apos;ll always get 4.</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">These work because the algebra always cancels out the secret</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">number.</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Number-guessing tricks like this fascinated Victorian audiences who</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">didn&apos;t know basic algebra — the same arithmetic that reveals the</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">trick would have seemed magical to non-mathematical parlor guests.</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Through a series of calculations, reveal a number a person has</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">secretly thought of.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>