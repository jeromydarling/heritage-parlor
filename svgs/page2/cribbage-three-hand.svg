<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CRIBBAGE (THREE-HAND)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cribbage board</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">3 players, each playing independently. Deal 5 cards each, with 3</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">remaining. Everyone discards 1 card to the crib (dealer gets it).</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cut a starter card. Count and score each hand separately against</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the starter. Use a 3-track cribbage board with three sets of pegs</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(or keep written score). First player to peg 121 wins. The</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">three-way competition means you can&apos;t just block one opponent — you</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">have to think about both.</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three-hand Cribbage requires a special three-track cribbage board,</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">which was sold as a Victorian luxury item in mahogany and ivory.</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The three-way competition introduced new strategic elements</text>
  <text x="110" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">compared to the classic two-player game.</text>
  <text x="110" y="613" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The three-player variant of Cribbage where each player plays</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">independently.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>