<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE FOUR KINGS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of playing cards</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: The four kings are placed in four separate spots throughout the deck</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— yet after one cut, they&apos;re all found together. Method: before performing,</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hide three other face cards face-down behind three of the kings. Fan all four</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">kings openly (the hidden cards aren&apos;t visible from the front). Place the</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">visible kings at four positions in the deck — you&apos;re actually placing the</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hidden indifferent cards too. The fourth king goes on top. When the deck is</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cut, that top king falls to join the other three (with their hidden cards).</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Fan the deck to show four kings together.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Four Kings is one of the oldest and most widely taught card tricks in the</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">world, appearing in magic books from the 17th century. It teaches the most</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fundamental principle in card magic: that appearance and reality can be</text>
  <text x="56" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">completely separated through misdirection.</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The four kings are shown and placed separately throughout the deck. After a</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">single cut, all four kings are found together. The secret: the other three</text>
  <text x="56" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">kings have three indifferent court cards hidden between them; the fourth is</text>
  <text x="56" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">placed last. After the cut, the hidden cards fill the apparent gap between</text>
  <text x="56" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the kings.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>