<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PAIRS REPAIRED</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of playing cards</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: 16 cards are laid in 4 rows of 4. Spectators memorize 8</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pairs. You leave the room. On return, each spectator tells you</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">which row their two cards are in — and you instantly name the exact</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards. Method: the layout uses 8 pre-selected pairs placed</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">according to a position grid coded by the mnemonic &apos;MUTUS DEDIT</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">NOMEN COCIS&apos; (each pair of repeated letters codes two positions).</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">When told which rows a pair is in, look up the two row numbers in</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the grid — they decode to exact positions instantly. Requires</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">memorizing the position table.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">MUTUS DEDIT NOMEN COCIS is Latin nonsense (&apos;The mute man gave his</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">name to the cook&apos;) chosen purely because its repeated letters form</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the perfect code pattern for the 16-position grid — one of the</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">earliest known mnemonic systems used in magic.</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="657" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Sixteen cards are laid in four rows of four. Spectators memorize</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pairs; the performer leaves the room. On return, the performer</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">names which cards are paired. The secret is the mnemonic &apos;MUTUS</text>
  <text x="110" y="711" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">DEDIT NOMEN COCIS&apos; — each letter codes the row of paired cards</text>
  <text x="110" y="729" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">according to a mathematical table.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>