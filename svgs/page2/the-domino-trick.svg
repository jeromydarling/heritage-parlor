<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DOMINO TRICK</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard domino set</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: You leave the room. Everyone builds a chain with all remaining</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dominoes. When you return, you name both numbers showing at the ends —</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">without seeing the chain. Method: Before leaving, secretly pocket one domino.</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Everyone links up all remaining pieces into a chain. When you return, the two</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">end numbers always match the two numbers on the domino in your pocket. It</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">works because in a complete set, every number appears a balanced number of</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">times — removing one piece exposes exactly those two values at the ends.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This works because a complete domino set forms a perfect Eulerian circuit -</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">every value appears exactly the right number of times. Removing one piece</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">breaks the circuit, exposing exactly those two values at the chain&apos;s ends.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">While absent, the magician names the two end numbers of any domino chain</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">built by spectators.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>