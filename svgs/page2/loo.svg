<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">LOO</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips or counters</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">All players contribute 3 tokens to a central pool. Deal 3 cards</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">each; flip one for trump. Players decide to play or pass. If you</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">play and win 0 tricks, you&apos;re &apos;Looed&apos;: pay 3 tokens to the next</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pool. Win 1 trick = take one-third of the pool. Win all 3 = take</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the whole pool. The player holding the Jack of clubs always wins</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one trick. The pool can grow dramatically as more players are</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">looed, creating big swings. Use tokens or points instead of money.</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Note: historically played for stakes — keep it friendly with small</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">counters.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Loo was the most widely played betting card game in Georgian and</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">early Victorian England. Jane Austen mentions it in her novels. The</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">game could cause significant losses - Beau Brummel reportedly lost</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">his fortune partly through Loo.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Victorian betting card game where losing a trick sends you to the</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">penalty pool.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>