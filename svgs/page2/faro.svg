<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">FARO</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  faro layout board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  betting chips</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players bet on a card denomination (Ace through King) shown on a painted</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">layout board. The dealer draws two cards: the first is the &apos;losing&apos; card</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(house collects bets on that value), the second is the &apos;winning&apos; card (house</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pays bets on that value). Players can also &apos;copper&apos; a bet by placing a token</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on it — that reverses their bet to win on the losing card. Low house edge</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">made this very popular. Note: Faro was the dominant gambling game of the</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">American frontier and required special equipment. Presented here as</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">historical context; not recommended for modern family play.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Faro dominated American gambling from the 1820s through the early 1900s. Doc</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Holliday dealt Faro professionally. Every Western frontier town saloon had a</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Faro layout. It declined rapidly after 1900 due to widespread dealer</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">cheating.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The legendary banking card game of the American Frontier - once the most</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">widely played game in the USA.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>