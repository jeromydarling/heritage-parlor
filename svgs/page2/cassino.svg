<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CASSINO</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 4 cards to each player and lay 4 face-up on the table. On your</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">turn, choose one: (1) Capture — play a card matching a table card&apos;s</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">value, or matching the sum of several table cards, and take them</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">all; (2) Build — combine a hand card with a table card to make a</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">build you&apos;ll capture next turn; (3) Trail — simply add a card to</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the table. Score: most cards = 3 pts, most spades = 1 pt, the 10 of</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">diamonds (Big Cassino) = 2 pts, the 2 of spades (Little Cassino) =</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">1 pt, each Ace = 1 pt. Highest score after 4 deals wins.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Cassino derives from the Italian scopa and was popular in</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">18th-century France and England. Foster describes it as &apos;one of the</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">most amusing of all round games&apos; because of its combination of</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">arithmetic and card memory.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An Italian card game of capturing: match table cards with hand</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">cards to collect them for points.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>