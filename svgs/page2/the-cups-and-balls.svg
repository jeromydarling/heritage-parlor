<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CUPS AND BALLS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  3 cups</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  4 small balls</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  2 large final loads</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Three small balls travel impossibly between three upside-down cups —</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">vanishing, multiplying, and reappearing. At the climax, each cup is lifted to</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reveal a large surprise object (like an orange or lemon) that appeared from</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">nowhere. Method: Uses palming and loading — secretly holding and placing</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">balls out of sight. The full routine takes 10–15 minutes and requires</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mastering several ball-concealment techniques. Equipment needed: 3 cups, 4</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">small balls, 2–3 large &apos;load&apos; objects. Advanced difficulty — but deeply</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rewarding.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The cups and balls is the oldest recorded magic trick in history - mentioned</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">by Roman writers and depicted in Egyptian tomb paintings. Every great</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magician from antiquity to today has performed some version of it.</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="608" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Three balls travel magically between three inverted cups, vanishing and</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">reappearing impossibly.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>