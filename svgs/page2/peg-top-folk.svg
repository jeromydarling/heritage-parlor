<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PEG-TOP</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  spinning tops with metal pegs</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each player winds and spins their top as powerfully as possible.</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The goal: throw your spinning top to strike and crack open an</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opponent&apos;s top. A split top releases its metal peg — the victor</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keeps it as a trophy. Skill in launching your top while keeping it</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">spinning is the key challenge. This is a rough, competitive game</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">best played on hard ground away from windows.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian peg-tops were deliberately made with wooden bodies and</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">iron pegs so that a strong strike could crack the wood — splitting</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">an opponent&apos;s top was the ultimate victory and a point of great</text>
  <text x="110" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">schoolyard pride.</text>
  <text x="110" y="570" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A top is spun and others peg-strike it with their own tops while it</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">spins. If a player fails to make their top spin properly, they must</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">lay their top down to be struck by others. The ultimate prize:</text>
  <text x="110" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">splitting the loser&apos;s top to release the metal peg as a trophy.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)  ·  Heritage Parlor</text>
</svg>