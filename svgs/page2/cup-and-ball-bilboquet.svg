<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CUP AND BALL (BILBOQUET)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cup-and-ball toy</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hold the handle so the cup faces up. Swing the ball (attached by string) out</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and upward in an arc. Tilt the cup to catch the ball as it swings back. For</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the spike version, swing up and try to land the ball on the pointed tip. Once</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you can do it consistently, challenge yourself: catch it behind your back,</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">while spinning, or while kneeling. You need a bilboquet (cup-and-ball toy)</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">available from toy shops.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Cup and Ball (bilboquet) was a favorite toy of French royal children and</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Henry III of France was reportedly obsessed with it in the 1580s. Marie</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Antoinette played it regularly. Victorian instruction books called it &apos;the</text>
  <text x="56" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">most graceful of all toys.&apos;</text>
  <text x="56" y="516" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Catch a ball attached by a string on a spike or in a cup with a flick of the</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">wrist.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>