<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">VINGT-ET-UN (PONTOON)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chips</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">3–8 players. One player is Banker. Everyone bets chips, then gets 2 cards.</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Goal: get as close to 21 as possible without going over. Special rules: a</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">natural Pontoon (Ace + any 10-value card) wins double from all non-Banker</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">players. A Five-Card Trick (5 cards that total 21 or under) also wins double</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">if no one has Pontoon. Banker wins ties. When a player wins naturally, they</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">take over as Banker.</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pontoon is the British name for the Twenty-One/Blackjack family. The name</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">allegedly derives from &apos;Vingt-et-Un&apos; being mispronounced by British soldiers</text>
  <text x="56" y="486" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">during World War One who called it &apos;Van John&apos; and later &apos;Pontoon.&apos;</text>
  <text x="56" y="520" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The British version of Twenty-One: the Pontoon version with special bonus</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">payments for natural and five-card tricks.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>