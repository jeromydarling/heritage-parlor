<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PILLIE-WINKIE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  blindfold</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  stick</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  egg or similar small object</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place a small target object on the ground. One player (Winkie) is</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">blindfolded and handed a stick. Other players give deliberately</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">misleading verbal directions about where the object actually is.</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Winkie must bring the stick straight down to hit the target.</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Success wins the pool of staked items. A miss gives other players</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">more chances to confuse. Play on soft ground and keep the stick</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">low.</text>
  <text x="110" y="523" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="547" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pillie-Winkie is a Scottish folk game, and its name likely comes</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">from old Scots &apos;winkie&apos; meaning a blinking or winking eye —</text>
  <text x="110" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">perfectly fitting a game where the central action depends on being</text>
  <text x="110" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">blindfolded.</text>
  <text x="110" y="635" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="659" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An egg, bird, or nest is placed in front of a blindfolded &apos;Winkie&apos;</text>
  <text x="110" y="677" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">who must strike it perpendicularly with a stick, breaking it</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">without touching or destroying the surrounding area. Other players</text>
  <text x="110" y="713" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mislead Winkie with false descriptions. Breaking the target wins</text>
  <text x="110" y="731" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all staked items.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)  ·  Heritage Parlor</text>
</svg>