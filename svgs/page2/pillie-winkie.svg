<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PILLIE-WINKIE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  blindfold</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  stick</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  egg or similar small object</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place a small target object on the ground. One player (Winkie) is blindfolded</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and handed a stick. Other players give deliberately misleading verbal</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">directions about where the object actually is. Winkie must bring the stick</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">straight down to hit the target. Success wins the pool of staked items. A</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">miss gives other players more chances to confuse. Play on soft ground and</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keep the stick low.</text>
  <text x="56" y="448" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="472" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Pillie-Winkie is a Scottish folk game, and its name likely comes from old</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Scots &apos;winkie&apos; meaning a blinking or winking eye — perfectly fitting a game</text>
  <text x="56" y="508" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">where the central action depends on being blindfolded.</text>
  <text x="56" y="542" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="566" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An egg, bird, or nest is placed in front of a blindfolded &apos;Winkie&apos; who must</text>
  <text x="56" y="584" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">strike it perpendicularly with a stick, breaking it without touching or</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">destroying the surrounding area. Other players mislead Winkie with false</text>
  <text x="56" y="620" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">descriptions. Breaking the target wins all staked items.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>