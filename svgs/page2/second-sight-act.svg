<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SECOND SIGHT ACT</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: One performer is blindfolded while their partner holds up</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">objects from the audience. The blindfolded performer names each</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">object perfectly. Method: The two performers agree on a secret word</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">code beforehand. The asking partner uses specific phrases to signal</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">what each object is — the exact wording is the code. For example:</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Now then, what is this?&apos; = ring; &apos;Can you tell me?&apos; = coin; &apos;What</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">have I here?&apos; = watch. Design your own code, practice until it&apos;s</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">automatic, then perform it as apparent mindreading. Two-person act.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Second Sight acts were a Victorian sensation. Annie Eva Fay</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performed it for scientist William Crookes FRS, who was genuinely</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fooled and endorsed her powers in print. Hoffmann was first to</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">publish an explanation, controversially revealing the secret to the</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">public.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A blindfolded assistant names any object held up by the audience,</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">guided by a secret spoken code.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>