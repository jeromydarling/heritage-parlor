<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">RING OUT OF A HANDKERCHIEF</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  borrowed ring</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fake wire ring</text>
  <text x="72" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  rod held by spectators</text>
  <text x="56" y="298" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="324" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A borrowed ring is placed in a tied handkerchief and then vanishes,</text>
  <text x="56" y="345" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">appearing instead on a rod held between two spectators. Method: as you wrap</text>
  <text x="56" y="366" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the ring in the handkerchief, switch it for a wire fake ring. The spectator</text>
  <text x="56" y="387" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">feels the fake through the cloth and ties the handkerchief. You palm the real</text>
  <text x="56" y="408" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ring. Two spectators hold a rod between them — secretly load the real ring</text>
  <text x="56" y="429" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">onto the rod while everyone watches the handkerchief. Shake out the</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">handkerchief: empty. The ring is found on the rod. Using a borrowed ring</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">makes the trick impossible to explain away.</text>
  <text x="56" y="512" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The borrowed ring trick is considered an ideal effect because it uses the</text>
  <text x="56" y="554" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">spectator&apos;s own property — making any accusation of a pre-prepared fake ring</text>
  <text x="56" y="572" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">completely illogical. Victorian magicians called this principle &apos;borrowing</text>
  <text x="56" y="590" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">your proof.&apos;</text>
  <text x="56" y="624" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A borrowed ring vanishes from a tied handkerchief and appears on a rod held</text>
  <text x="56" y="666" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">by the audience. The method uses a fake ring made of sharpened wire that</text>
  <text x="56" y="684" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">unbends and passes through the handkerchief fabric; the real ring is slipped</text>
  <text x="56" y="702" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">onto the rod secretly during the wrapping process.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>