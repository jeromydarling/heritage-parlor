<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">RING OUT OF A HANDKERCHIEF</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  borrowed ring</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fake wire ring</text>
  <text x="126" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  rod held by spectators</text>
  <text x="110" y="352" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="378" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A borrowed ring is placed in a tied handkerchief and then</text>
  <text x="110" y="399" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">vanishes, appearing instead on a rod held between two spectators.</text>
  <text x="110" y="420" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Method: as you wrap the ring in the handkerchief, switch it for a</text>
  <text x="110" y="441" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wire fake ring. The spectator feels the fake through the cloth and</text>
  <text x="110" y="462" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ties the handkerchief. You palm the real ring. Two spectators hold</text>
  <text x="110" y="483" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a rod between them — secretly load the real ring onto the rod while</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">everyone watches the handkerchief. Shake out the handkerchief:</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">empty. The ring is found on the rod. Using a borrowed ring makes</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the trick impossible to explain away.</text>
  <text x="110" y="587" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="611" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The borrowed ring trick is considered an ideal effect because it</text>
  <text x="110" y="629" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">uses the spectator&apos;s own property — making any accusation of a</text>
  <text x="110" y="647" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pre-prepared fake ring completely illogical. Victorian magicians</text>
  <text x="110" y="665" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">called this principle &apos;borrowing your proof.&apos;</text>
  <text x="110" y="699" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="723" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A borrowed ring vanishes from a tied handkerchief and appears on a</text>
  <text x="110" y="741" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">rod held by the audience. The method uses a fake ring made of</text>
  <text x="110" y="759" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sharpened wire that unbends and passes through the handkerchief</text>
  <text x="110" y="777" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fabric; the real ring is slipped onto the rod secretly during the</text>
  <text x="110" y="795" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">wrapping process.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>