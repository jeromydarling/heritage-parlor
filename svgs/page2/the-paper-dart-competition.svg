<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PAPER DART COMPETITION</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper sheets</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Fold a sheet of paper into a dart: fold in half lengthwise, fold</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the top corners to the center crease, fold the new triangle tips to</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the center, then fold the whole thing in half again. Pinch the fold</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">near the back and throw with a smooth overhead motion. Compete for:</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">farthest distance, most accurate target hit, or best looping</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">flight. Try different designs for speed vs. glide.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Paper dart throwing was a staple amusement in Victorian schoolrooms</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and parlors. Every Boy&apos;s Book described the classic design with</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">additional variants for speed versus stability. The aerodynamics of</text>
  <text x="110" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">paper darts was a popular topic in Victorian popular science</text>
  <text x="110" y="554" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">writing.</text>
  <text x="110" y="588" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fold and throw paper darts in a competition for distance and</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">accuracy.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)  ·  Heritage Parlor</text>
</svg>