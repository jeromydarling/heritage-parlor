<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE GORDIAN KNOT</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A handkerchief is tied into what looks like an impossibly complex</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">knotted ball. You place it behind your back — and a moment later reveal it</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">completely untied. Method: fold the handkerchief into thirds lengthwise. Tie</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it into an overhand knot, but layer the corners in a specific mirrored</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sequence as you tie — this creates a &apos;knot&apos; that looks solid but reverses</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">easily. Behind your back, simply pull the layered corners in reverse order.</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The &apos;knot&apos; falls apart instantly. Bring the handkerchief out spread flat with</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a flourish.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The mythological Gordian Knot (cut by Alexander the Great in 333 BC) was so</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">culturally prominent that Victorian magicians regularly borrowed its name for</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">complicated-looking but secretly simple knot effects, adding classical</text>
  <text x="56" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">gravitas to their performances.</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A handkerchief is tied into what appears to be an impossibly tight, complex</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ball. The magician places it behind their back and — a moment later — reveals</text>
  <text x="56" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it completely untied. The secret: the corners are layered in a specific way</text>
  <text x="56" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that reverses the process when pulled correctly.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>