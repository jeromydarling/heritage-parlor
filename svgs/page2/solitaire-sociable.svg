<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SOLITAIRE (PEG SOLITAIRE)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  peg solitaire board with 33 holes</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  32 pegs</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Fill all 33 holes of the cross-shaped board with pegs, leaving only the</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">center empty. A legal move: jump one peg over an adjacent peg (horizontally</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">or vertically) into a vacant hole; remove the jumped peg. Keep jumping until</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">no moves remain. The perfect solution: exactly one peg left, sitting in the</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">center hole. Most attempts leave several pegs — cracking the perfect solution</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">takes serious planning. Peg Solitaire boards are widely sold and also</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">available as free printable versions.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Peg Solitaire was invented in France around 1687 and became fashionable</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">across Europe. Leibniz mentioned analyzing it mathematically in 1710, and the</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">perfect single-center solution was not published until 1912 — over 200 years</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of puzzlers trying.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Thirty-three holes are arranged in a cross pattern. Thirty-two pegs fill all</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">holes but the center. Players jump one peg over an adjacent peg into an empty</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">hole, removing the jumped peg. The goal is to reduce all 32 pegs to exactly</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">one peg remaining in the center hole.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>