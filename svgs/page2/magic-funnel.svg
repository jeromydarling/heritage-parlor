<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC FUNNEL</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  special double-walled funnel with finger-controlled holes</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Water flows freely from a funnel, then stops completely at</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the performer&apos;s command — and flows again on command. Method: the</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">funnel has a hidden air tube running through its interior with a</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">small hole at the top. Covering the hole with a fingertip creates a</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">partial vacuum that holds the water suspended — the same principle</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">as pressing your finger on a straw to hold liquid inside. Remove</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the finger and water flows freely. The finger is hidden on the back</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of the handle. This looks completely miraculous. Make a simplified</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">version with a bendy straw to demonstrate the principle.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Magic Funnel demonstrates atmospheric pressure — the same</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">principle prevents liquid from flowing from a covered test tube.</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Torricelli discovered the principle in 1644 as he invented the</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">barometer, but Victorian conjurers exploited it for entertainment</text>
  <text x="110" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">long before physics teachers used it for education.</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Water pours freely from a funnel, then stops entirely at the</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer&apos;s command — then pours again. A double-walled funnel has</text>
  <text x="110" y="711" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">small holes in its inner tube; when the performer secretly covers</text>
  <text x="110" y="729" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">one hole with a finger, air is excluded and water cannot flow.</text>
  <text x="110" y="747" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Uncovering the hole allows flow to resume.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>