<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">DIGITAL ROOTS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The digital root of a number is found by adding its digits, then adding again</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">until you have a single digit. Example: 256 → 2+5+6 = 13 → 1+3 = 4. Digital</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">roots reveal divisibility shortcuts: if the root is 9, the number divides by</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">9; if the root is 3 or 6, it divides by 3. Use this to quickly check your</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">math — if you add a column of numbers wrong, the digital root will catch the</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">error.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Digital roots are one of mathematics&apos; most elegant shortcuts — accountants</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">used them for centuries to quickly verify calculations. Dudeney made this</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">professional technique accessible to parlor players.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Find the digital root of any number and discover its relationship to</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">divisibility by 9.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>