<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DANCING EGG</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  egg</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  top hat</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine hair or thread attached from egg to coat</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: An egg resting on a hat brim dances and bobs in time to</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">music — appearing genuinely alive. Method: attach a fine hair or</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thin monofilament thread from the egg to a pin or button on your</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">coat lapel. When music plays, sway gently in time — the movement</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">transmits through the thread and makes the egg bob and rotate</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">convincingly. Stop swaying and the egg stops. The synchronization</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with music makes the effect appear genuinely animated. Practice</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with a piece of masking tape and thread before graduating to a</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">proper thread setup.</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="589" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Animated-object magic was one of the most beloved categories of</text>
  <text x="110" y="607" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian performance, reflecting the era&apos;s fascination with</text>
  <text x="110" y="625" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">clockwork automata. When synchronizing with a live musician, the</text>
  <text x="110" y="643" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Dancing Egg could be performed with apparent spontaneity.</text>
  <text x="110" y="677" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="701" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An egg placed on top of a hat appears to dance and bob in time to</text>
  <text x="110" y="719" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">music. A nearly invisible hair runs from the egg to the performer&apos;s</text>
  <text x="110" y="737" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">coat — small movements of the body cause the egg to animate</text>
  <text x="110" y="755" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">convincingly, responding to music as if alive.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>