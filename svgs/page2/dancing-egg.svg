<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DANCING EGG</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  egg</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  top hat</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine hair or thread attached from egg to coat</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: An egg resting on a hat brim dances and bobs in time to music —</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">appearing genuinely alive. Method: attach a fine hair or thin monofilament</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thread from the egg to a pin or button on your coat lapel. When music plays,</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sway gently in time — the movement transmits through the thread and makes the</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">egg bob and rotate convincingly. Stop swaying and the egg stops. The</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">synchronization with music makes the effect appear genuinely animated.</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Practice with a piece of masking tape and thread before graduating to a</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">proper thread setup.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Animated-object magic was one of the most beloved categories of Victorian</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performance, reflecting the era&apos;s fascination with clockwork automata. When</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">synchronizing with a live musician, the Dancing Egg could be performed with</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">apparent spontaneity.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An egg placed on top of a hat appears to dance and bob in time to music. A</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">nearly invisible hair runs from the egg to the performer&apos;s coat — small</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">movements of the body cause the egg to animate convincingly, responding to</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">music as if alive.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>