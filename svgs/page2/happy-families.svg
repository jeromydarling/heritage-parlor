<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">HAPPY FAMILIES</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  Happy Families illustrated card set</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal all 44 cards (11 families of 4 — Mr., Mrs., Master, and Miss</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of each family). On your turn, ask any player for a specific card</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">by name (e.g., &apos;Do you have Miss Bun the Baker&apos;s Daughter?&apos;). If</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">they have it, you receive it and may ask again. If not, your turn</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ends. Lay down complete sets of all four family members when you</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">collect them. The player who lays down the most complete families</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wins. The trick is asking for cards you know someone has — pay</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">attention to what cards others have asked for.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Happy Families was designed by John Tenniel (Alice in Wonderland</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">illustrator) and first published by John Jacques in 1851. The</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">original families include Mr. Bun the Baker, Mr. Chips the</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Carpenter, and Miss Buff the Butler&apos;s Daughter. It is still sold</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">today.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The classic Victorian card game: collect complete families of four</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">illustrated cards by asking other players.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>