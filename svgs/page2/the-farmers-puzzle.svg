<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE FARMER&apos;S PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The puzzle: a square field is divided into 25 equal smaller squares</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(like a 5×5 grid). Four trees stand at specific grid positions. Can</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you divide the whole field into 4 equal pieces that are all</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">identical in shape, with exactly one tree in each piece? Simple</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">quarters won&apos;t work — you need to find irregular or L-shaped</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pieces. Draw the 5×5 grid on paper and experiment with different</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cut lines. Hint: the pieces must be the same shape AND the same</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">size — not just the same area.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Land division puzzles were practically important to Victorian</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">farmers dealing with inheritance law. The equal-shape requirement</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">(not just equal area) makes this a much harder constraint.</text>
  <text x="110" y="616" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="640" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Divide a square field into four identical parts each containing</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">exactly one tree.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>