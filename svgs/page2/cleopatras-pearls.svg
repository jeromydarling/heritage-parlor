<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CLEOPATRA&apos;S PEARLS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small chalk or calcium carbonate pellet</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass of vinegar</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Drop a piece of chalk (calcium carbonate — the same material as a pearl) into</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a glass of white vinegar. Bubbles form immediately and the chalk gradually</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dissolves: CaCO₃ + 2CH₃COOH → Ca(CH₃COO)₂ + H₂O + CO₂. The bubbles are carbon</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dioxide gas. With a real pearl, the same reaction would occur — but much more</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">slowly, since wine vinegar is far weaker than pure acetic acid. A simple,</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">safe, and dramatic demonstration of acid-base chemistry that any kitchen can</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">produce.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Whether Cleopatra actually dissolved a pearl in wine vinegar is historically</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">debated — the story comes from Pliny the Elder. Modern chemists calculate</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that at wine&apos;s acid concentration, dissolution would take days, not the</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dramatic moment the story describes.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A pearl (or chalk) dropped into vinegar dissolves — demonstrating the</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">chemical principle by which Cleopatra supposedly dissolved her famous pearl</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">earring in wine vinegar and drank it to win a wager with Mark Antony over who</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">could throw the most lavish feast.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>