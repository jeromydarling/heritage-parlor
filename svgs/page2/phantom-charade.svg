<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">PHANTOM (DRAMATIC CHARADE)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fan</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  minimal props</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">This is a dramatic charade for the word PHANTOM. The performers</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">write and act two short scenes without revealing the mystery word.</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Scene one suggests the syllable &apos;FAN&apos; (PHAN) — for example, a scene</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">involving a fan as a key prop. Scene two features a character named</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Tom (TOM). After both scenes, the audience debates and guesses the</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">full word. The challenge: syllables may be suggested by action or</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">props, not spoken directly. More theatrical rehearsal makes for a</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">more baffling charade.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Dramatic charades were distinct from simpler acting charades in</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that they required genuine scene-writing and rehearsal, making them</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the most theatrical parlor entertainment of the Victorian era and a</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">training ground for amateur actors.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A two-act dramatic charade for the word PHANTOM (PHAN-TOM). In the</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">first scene, a clerk named Tom returns a lost fan to Mrs. Reeves in</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">an office setting. In the second scene, a romantic subplot unfolds</text>
  <text x="110" y="712" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">between Ellen and Tom. The audience must identify both syllables</text>
  <text x="110" y="730" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and the complete word.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>