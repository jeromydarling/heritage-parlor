<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE GRANDMOTHER&apos;S NECKLACE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  beaded necklace</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  string</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A necklace is threaded onto a string held by two spectators</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">at both ends — and you remove the necklace without untying the</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">string or releasing the ends. Method: Thread the string through the</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">beads in a specific looping sequence that creates a temporary</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pathway. The trick depends on threading the string through a bead</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hole twice in opposite directions, creating a loop that releases</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">when pulled. The exact threading sequence is the secret — practice</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it slowly until the move is smooth. You need: a beaded necklace and</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a piece of string about 60cm long.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">String and bead puzzles were among the oldest form of mechanical</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzles, appearing in ancient China and throughout medieval Europe</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as both puzzles and party tricks. Hoffmann described over a dozen</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">variants.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A string of beads threaded onto a string is removed without untying</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the knot.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>