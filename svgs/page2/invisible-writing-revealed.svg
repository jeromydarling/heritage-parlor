<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">INVISIBLE WRITING REVEALED</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  lemon juice</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  candle heat</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A blank piece of paper held near a candle flame slowly</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reveals a hidden message. Method: Write your message using lemon</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">juice on white paper and let it dry completely — it becomes</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">invisible. During the trick, hold the paper close to (but not</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">touching) a candle or lamp. The acids in lemon juice scorch at a</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">lower temperature than paper, so your writing appears in brown</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">letters. Milk, diluted vinegar, and onion juice also work. Safety:</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">keep the paper moving and never let it catch fire. Write your</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">prediction before the show — then reveal it as a prophecy.</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="589" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Invisible ink has been used for genuine espionage throughout</text>
  <text x="110" y="607" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">history. American Revolution spies including Benjamin Franklin used</text>
  <text x="110" y="625" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it routinely. Victorian boys&apos; books described it as a parlor game,</text>
  <text x="110" y="643" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">but the technique was classified by the CIA as recently as the</text>
  <text x="110" y="661" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1950s.</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="719" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A blank paper held near a flame reveals a hidden message written by</text>
  <text x="110" y="737" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the magician.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>