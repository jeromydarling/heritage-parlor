<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">INVISIBLE WRITING REVEALED</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  lemon juice</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  candle heat</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A blank piece of paper held near a candle flame slowly reveals a</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hidden message. Method: Write your message using lemon juice on white paper</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and let it dry completely — it becomes invisible. During the trick, hold the</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper close to (but not touching) a candle or lamp. The acids in lemon juice</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">scorch at a lower temperature than paper, so your writing appears in brown</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">letters. Milk, diluted vinegar, and onion juice also work. Safety: keep the</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper moving and never let it catch fire. Write your prediction before the</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">show — then reveal it as a prophecy.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Invisible ink has been used for genuine espionage throughout history.</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">American Revolution spies including Benjamin Franklin used it routinely.</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian boys&apos; books described it as a parlor game, but the technique was</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">classified by the CIA as recently as the 1950s.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A blank paper held near a flame reveals a hidden message written by the</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magician.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>