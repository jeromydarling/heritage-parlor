<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE WHEEL OF ARISTOTLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two concentric circles drawn on a disc</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw two concentric circles on a round disc — one large, one small. Roll the</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">disc along a flat surface for exactly one full rotation, marking where each</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">circle starts and ends. Paradox: the larger outer circle travels a distance</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">equal to its full circumference. But the smaller inner circle appears to</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">travel the same distance — even though its circumference is shorter. How? The</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">resolution: the smaller circle isn&apos;t purely rolling — it&apos;s also sliding</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">slightly. This &apos;slip&apos; makes up the difference. The paradox baffled</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">philosophers for 2,000 years.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Aristotle&apos;s Wheel Paradox appears in the ancient Greek text &apos;Mechanica&apos; and</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">was seriously debated by mathematicians including Galileo (who proposed it</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">might prove the existence of infinitesimals) until the development of</text>
  <text x="56" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">infinitesimal calculus finally resolved it.</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A wheel with two concentric circles of different sizes rolls along a surface.</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The smaller inner circle appears to cover the same distance in one rotation</text>
  <text x="56" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as the larger outer circle — even though their circumferences are different.</text>
  <text x="56" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This is Aristotle&apos;s Paradox, which puzzled philosophers for 2,000 years.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>