<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE WHEEL OF ARISTOTLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two concentric circles drawn on a disc</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw two concentric circles on a round disc — one large, one small.</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Roll the disc along a flat surface for exactly one full rotation,</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">marking where each circle starts and ends. Paradox: the larger</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">outer circle travels a distance equal to its full circumference.</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">But the smaller inner circle appears to travel the same distance —</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">even though its circumference is shorter. How? The resolution: the</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">smaller circle isn&apos;t purely rolling — it&apos;s also sliding slightly.</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">This &apos;slip&apos; makes up the difference. The paradox baffled</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">philosophers for 2,000 years.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Aristotle&apos;s Wheel Paradox appears in the ancient Greek text</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;Mechanica&apos; and was seriously debated by mathematicians including</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Galileo (who proposed it might prove the existence of</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">infinitesimals) until the development of infinitesimal calculus</text>
  <text x="110" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">finally resolved it.</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A wheel with two concentric circles of different sizes rolls along</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a surface. The smaller inner circle appears to cover the same</text>
  <text x="110" y="711" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">distance in one rotation as the larger outer circle — even though</text>
  <text x="110" y="729" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">their circumferences are different. This is Aristotle&apos;s Paradox,</text>
  <text x="110" y="747" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">which puzzled philosophers for 2,000 years.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>