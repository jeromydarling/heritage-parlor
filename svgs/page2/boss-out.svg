<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOSS-OUT</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marbles</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Player 1 rolls their marble to stop wherever it lands. Player 2 then rolls</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">their marble, trying to either hit Player 1&apos;s marble directly or land within</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a hand-span of it. A direct hit wins the target marble immediately. If both</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">miss, alternate rolling until one player succeeds. No extra rules — pure aim</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and judgment win the game.</text>
  <text x="56" y="383" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Boss-Out is one of the simplest forms of the vast family of marble games</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">played by British children for centuries, forming the basis for more</text>
  <text x="56" y="443" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">elaborate games like Ring Taw and Plum Pudding.</text>
  <text x="56" y="477" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="501" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player bowls a marble as the mark. The antagonist bowls to try to hit it</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">or land within a span&apos;s touch. A hit wins the mark marble outright. If</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">neither hits on the first roll, players alternate until someone wins. A</text>
  <text x="56" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">clean, simple two-player marble game of skill.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>