<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SPIDER AND THE FLY</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">A room is 12 ft wide, 12 ft wide, and 30 ft long. A spider on one</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">end wall (1 ft from the ceiling, centered) must reach a fly on the</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opposite wall (1 ft from the floor, centered). What is the shortest</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">path crawling along the room&apos;s surfaces? The trick: unfold the</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">walls flat like a cardboard box, then draw a straight line. The</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">surprising answer is 40 ft — going across the floor is shorter than</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">going straight across the ceiling.</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This is Dudeney&apos;s most famous puzzle. He presented it at the Royal</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Society in 1905. The key insight — unfolding the room — makes a</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">hard 3D problem into a simple straight-line calculation.</text>
  <text x="110" y="595" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A spider must crawl along room surfaces to reach a fly — find the</text>
  <text x="110" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">shortest possible route.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>