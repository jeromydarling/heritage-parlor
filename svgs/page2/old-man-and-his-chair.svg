<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE OLD MAN AND HIS CHAIR</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  loop of string</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hold a loop of string across both hands. As you narrate the story of an old</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">man at home, form string figures to illustrate each scene: two candles (a</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cat&apos;s cradle position), a chair (transformed by threading fingers through</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">specific loops), scissors (another hand configuration), and a walking staff.</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Each figure is held up at its named moment in the story. The narrative</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">framework helps both you and the audience track each transformation. String</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">figure how-to guides for these specific figures are available in library</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">books on cat&apos;s cradle.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">String figure storytelling is practiced by indigenous cultures on every</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">continent — from the Arctic to Polynesia to Central Africa — making it one of</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the most universal human art forms. Victorian anthropologists brought it back</text>
  <text x="56" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">to Europe as a curiosity without realizing it was equally alive in their own</text>
  <text x="56" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">folk traditions.</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Using only a loop of string and both hands, the performer creates a sequence</text>
  <text x="56" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of string figures while telling a story: candles, a chair, scissors, a</text>
  <text x="56" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">policeman&apos;s staff. Each figure is formed through specific finger loops and</text>
  <text x="56" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pulls while the narrative gives the shapes meaning and context.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>