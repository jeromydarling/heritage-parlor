<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE OLD MAN AND HIS CHAIR</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  loop of string</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hold a loop of string across both hands. As you narrate the story</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of an old man at home, form string figures to illustrate each</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">scene: two candles (a cat&apos;s cradle position), a chair (transformed</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">by threading fingers through specific loops), scissors (another</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hand configuration), and a walking staff. Each figure is held up at</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">its named moment in the story. The narrative framework helps both</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">you and the audience track each transformation. String figure</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">how-to guides for these specific figures are available in library</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">books on cat&apos;s cradle.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">String figure storytelling is practiced by indigenous cultures on</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">every continent — from the Arctic to Polynesia to Central Africa —</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">making it one of the most universal human art forms. Victorian</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">anthropologists brought it back to Europe as a curiosity without</text>
  <text x="110" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">realizing it was equally alive in their own folk traditions.</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Using only a loop of string and both hands, the performer creates a</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sequence of string figures while telling a story: candles, a chair,</text>
  <text x="110" y="711" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">scissors, a policeman&apos;s staff. Each figure is formed through</text>
  <text x="110" y="729" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">specific finger loops and pulls while the narrative gives the</text>
  <text x="110" y="747" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">shapes meaning and context.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>