<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BUCK, BUCK</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The Buck bends over while a rider sits on their back, holding up</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">some fingers behind the Buck&apos;s head. The rider calls: &apos;Buck, buck,</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">how many fingers do I hold up?&apos; The Buck guesses without being able</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to see. Wrong guess: rider stays for another turn. Correct guess:</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the rider becomes the new Buck. With a row of stoopers, the rider</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">leaps from back to back asking at each one.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Buck, Buck is one of the oldest recorded British children&apos;s games —</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the Roman author Petronius mentions a nearly identical game called</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">&apos;Bucca, bucca&apos; played in ancient Rome, making it at least 2,000</text>
  <text x="110" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">years old.</text>
  <text x="110" y="570" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One boy stoops (the Buck) on a table with a rider on his back</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">holding up fingers. &apos;Buck, buck, how many horns do I hold up?&apos; The</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">stooper must guess the number; a wrong guess means the position</text>
  <text x="110" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">continues until correct. A variant has a whole row of stoopers that</text>
  <text x="110" y="666" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the rider leaps along while asking.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>