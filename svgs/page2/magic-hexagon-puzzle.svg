<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC HEXAGON</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hexagonal grid diagram</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  19 numbered counters</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a hexagonal grid with 19 positions (1 center, 6 in the inner ring, 12 in</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the outer ring — like a honeycomb with 3 rings). Place numbers 1 through 19</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">so that every straight row — in any of the three directions through the</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hexagon — sums to 38. This is the Magic Hexagon. There are essentially only 7</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">distinct solutions (counting rotations as the same). Mathematicians proved in</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">1964 that this is the ONLY magic hexagon that exists for any size — making it</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a unique mathematical object hiding inside a puzzle.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The 3-ring magic hexagon is the ONLY magic hexagon that exists for any ring</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">count — meaning no 4-ring, 5-ring, or larger version is possible. This</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">uniqueness was not proven until 1964, making it a genuine mathematical</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">discovery hiding inside a Victorian puzzle.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Place numbers in a hexagonal grid arrangement so that every straight row —</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">whether going in any of three directions through the hexagon — sums to the</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">same total. This extends the magic square concept into a honeycomb geometry.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>