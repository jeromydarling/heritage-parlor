<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">POOR MARY SITS A-WEEPING</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player sits in the center of a circle, head bowed, pretending</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to weep. The circle of players walks around them singing, asking</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">why Mary weeps. Mary dramatically announces her reason (lost love,</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">loneliness — hamming it up is encouraged). The group sings</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">encouragement — choose someone to love, be happy! Mary stands,</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">picks a partner from the ring, and the two act out the wedding</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">verse together while the group sings. The chosen partner becomes</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the new weeping Mary, and the game repeats.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Poor Mary Sits A-Weeping was recorded by Gomme in 20 variants</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">across Britain, making it one of the most geographically widespread</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">British singing games. Scholars believe it preserves ancient</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mourning rituals transformed into play.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One child sits weeping in the center of a ring. The ring sings and</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">asks why Mary weeps. She names her reason — sweetheart lost, father</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dead. The ring comforts her, telling her to choose a lover and</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">marry. Variants include going to church, placing a ring on, and the</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">couple kneeling together. The song: &apos;Poor Mary sits a-weeping / On</text>
  <text x="110" y="726" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a bright summer&apos;s day.&apos;</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. II (1898)  ·  Heritage Parlor</text>
</svg>