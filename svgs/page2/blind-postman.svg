<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BLIND POSTMAN</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chairs</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Players sit in chairs — one fewer than players. Each player is</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">assigned a town name. The extra player is the blindfolded Postman,</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">who stands in the middle. Postman calls out two town names — those</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">two players must immediately swap chairs while the Postman tries to</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">steal a seat. Whoever is left standing becomes the new Postman.</text>
  <text x="110" y="437" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This game reflects the Victorian era&apos;s romantic fascination with</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the postal service, which was a marvel of modern communication —</text>
  <text x="110" y="497" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">letters could travel across England in a single day.</text>
  <text x="110" y="531" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Each player represents a town; the postman calls two towns whose</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">players must swap seats while the blind postman tries to steal a</text>
  <text x="110" y="591" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">seat.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)  ·  Heritage Parlor</text>
</svg>