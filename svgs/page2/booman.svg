<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOOMAN</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  flowers optional</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player lies still in the center of the ring as the recently-departed</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Booman.&apos; The circle acts out a solemn mock Victorian funeral: some mime</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ringing bells, others weep dramatically, all sing the dirge and process</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">around the body. They mime digging a grave and scattering flowers with great</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ceremony. After the burial, a new Booman is chosen and the ceremony begins</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">again.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Booman is a striking example of how Victorian children used play to process</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the reality of death, which was far more visible in 19th-century life than</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">today, with high child mortality and public funerals a common sight.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One child lies as the &apos;Booman&apos; in the center of a ring. The ring of boys</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">raises and lowers their hands like bells while the girls weep. They carry out</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a dramatic funeral: digging the grave and strewing flowers. The song: &apos;Dill</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">doule for Booman... / Where shall we bury him? / Dig his grave...&apos; A new</text>
  <text x="56" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Booman is then chosen.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>