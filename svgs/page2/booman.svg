<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOOMAN</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  flowers optional</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player lies still in the center of the ring as the</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">recently-departed &apos;Booman.&apos; The circle acts out a solemn mock</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Victorian funeral: some mime ringing bells, others weep</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dramatically, all sing the dirge and process around the body. They</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mime digging a grave and scattering flowers with great ceremony.</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">After the burial, a new Booman is chosen and the ceremony begins</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">again.</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Booman is a striking example of how Victorian children used play to</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">process the reality of death, which was far more visible in</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">19th-century life than today, with high child mortality and public</text>
  <text x="110" y="557" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">funerals a common sight.</text>
  <text x="110" y="591" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One child lies as the &apos;Booman&apos; in the center of a ring. The ring of</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">boys raises and lowers their hands like bells while the girls weep.</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">They carry out a dramatic funeral: digging the grave and strewing</text>
  <text x="110" y="669" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">flowers. The song: &apos;Dill doule for Booman... / Where shall we bury</text>
  <text x="110" y="687" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">him? / Dig his grave...&apos; A new Booman is then chosen.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>