<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE BEADS AND STRINGS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two strings</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  large beads</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Beads threaded on two intertwined strings appear inextricably trapped</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— yet the performer removes them instantly. Method: before the audience sees</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the setup, cross the two strings at their midpoint, then thread the beads</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">over the crossed section. The beads appear to be strung straight through, but</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">they&apos;re sitting on crossed strings. When spectators hold the four ends and</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pull, the beads seem locked. Under cover of your hand &apos;working the magic,&apos;</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">uncross the center — the beads slip free as the strings separate.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">String-and-bead tricks formed one of the largest categories of Victorian</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">parlor magic because they required no special equipment — any household had</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">strings and beads. The mathematical secret (crossing strings) was considered</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">elegant by the era&apos;s many amateur mathematicians.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Thread beads onto two strings twisted together and tied at their ends.</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Spectators pull both ends and the beads seem inextricably locked — yet the</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magician removes them easily. The secret: strings are secretly crossed at the</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">center, and the center bead is passed over the juncture; pulling loops free</text>
  <text x="56" y="655" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">releases all beads under cover of hand.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>