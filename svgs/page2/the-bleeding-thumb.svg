<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE BLEEDING THUMB</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  red vegetable juice or dye</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: You make your thumb appear to bleed freely, then heal it</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">instantly. Method: Secretly place a small amount of red juice</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(tomato, beet juice, or theatrical blood) under your thumbnail</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">before performing. Announce you can make your thumb bleed through</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">concentration. Press your nail slowly into your fingertip — the red</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">liquid oozes out convincingly. To &apos;heal,&apos; wipe your thumb with a</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pre-dampened cloth. Note: this is a shock-effect trick suited to</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">older audiences; use judgment about whether it&apos;s right for your</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">group.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Bizarre shock effects were considered somewhat transgressive for</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian drawing rooms. Hoffmann placed this in a &apos;miscellaneous</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">minor effects&apos; chapter for supper table entertainment.</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="639" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The magician&apos;s thumb appears to bleed freely, then heals instantly.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>