<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE HANDCUFFS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two loops of string</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Tie a loop of string around each wrist of player A. Before tying</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player B&apos;s loops, thread B&apos;s string through A&apos;s loop. Now A and B</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">are linked together. Can they separate without untying any knots or</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cutting the string? The solution: take one of your own loops, pass</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it through the string on your partner&apos;s wrist (not around it), then</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">slip it over your partner&apos;s hand. With the right move, you&apos;ll pop</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">free. Most people give up too quickly!</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This classic &apos;handcuff&apos; puzzle has been used as a party trick for</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">centuries — the solution is counter-intuitive enough to defeat most</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">people on first attempt.</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two people with loops of string linked around their wrists must</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">separate without untying the knots.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)  ·  Heritage Parlor</text>
</svg>