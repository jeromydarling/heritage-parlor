<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CAPTIVE SIXPENCE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  special brass box with depressible top and internal ball</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The brass box contains a coin under a spring-loaded lid. Pressing the lid</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">releases it slightly, but not far enough for the coin to escape. Try as you</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">might, it won&apos;t come out right-side-up. The solution: turn the box completely</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">upside-down. An internal ball-bearing rolls to a new position, changing how</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">far the mechanism can travel. Now press the lid (which is now facing down)</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and the coin drops free into your waiting palm. A gravity-dependent puzzle</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">that changes behavior when inverted.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This puzzle exemplifies the principle that gravity-dependent mechanisms</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">create puzzles that solve differently when inverted — a principle used in</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">countless Victorian puzzle boxes and which continues to inspire puzzle</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">designers today.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A box contains a sixpence trapped under a top that can be depressed but</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">springs back. The coin cannot be shaken out. Solution: invert the box — a</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">hidden ball shifts to allow the top to be depressed far enough to release the</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">coin.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>