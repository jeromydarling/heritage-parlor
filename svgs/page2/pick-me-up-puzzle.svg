<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PICK-ME-UP PUZZLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cylindrical box with internal spiral incline</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marble</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hold the cylindrical puzzle box with the marble inside. By gently and</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">continuously tilting and rotating the box in smooth circles, guide the marble</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">up the internal spiral ramp from the bottom to the top. Any sudden jerk sends</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the marble flying off the track. The challenge is developing the rhythmic</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wrist rotation needed to complete the full spiral without interruption — then</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reverse it. Pure patience and muscle memory. Similar dexterity maze toys are</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">widely available today.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Professor Hoffmann (the pen name of Lewis Angelo) was the Victorian era&apos;s</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">greatest puzzle scholar, and his 1893 book catalogued more mechanical puzzles</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">than any previous work. The dexterity puzzle category was his special</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">interest — he owned over 200 examples.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A cylindrical box contains a spiral incline. A marble must be worked steadily</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">up and down the spiral without the box being jerked or tilted so violently</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that the marble flies off the track. The secret is a perfectly smooth,</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">rhythmic motion — no sudden movements.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>