<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PICK-ME-UP PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cylindrical box with internal spiral incline</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marble</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hold the cylindrical puzzle box with the marble inside. By gently</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and continuously tilting and rotating the box in smooth circles,</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">guide the marble up the internal spiral ramp from the bottom to the</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">top. Any sudden jerk sends the marble flying off the track. The</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">challenge is developing the rhythmic wrist rotation needed to</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">complete the full spiral without interruption — then reverse it.</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Pure patience and muscle memory. Similar dexterity maze toys are</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">widely available today.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Professor Hoffmann (the pen name of Lewis Angelo) was the Victorian</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">era&apos;s greatest puzzle scholar, and his 1893 book catalogued more</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mechanical puzzles than any previous work. The dexterity puzzle</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">category was his special interest — he owned over 200 examples.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A cylindrical box contains a spiral incline. A marble must be</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">worked steadily up and down the spiral without the box being jerked</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">or tilted so violently that the marble flies off the track. The</text>
  <text x="110" y="712" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">secret is a perfectly smooth, rhythmic motion — no sudden</text>
  <text x="110" y="730" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">movements.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>