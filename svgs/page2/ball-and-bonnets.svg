<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BALL AND BONNETS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  ball</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  caps or bonnets</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Lay all players&apos; hats or caps in a row near a wall. One player</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">throws a ball to land in any cap. The cap&apos;s owner immediately runs</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— everyone else chases them. When caught, that player becomes the</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">next thrower. Accumulate 6 penalty tokens in your cap (one each</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">time you&apos;re caught) and you owe a silly penalty (like doing a silly</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dance or telling a joke) — a funny performance or challenge set by</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the group.</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Variants of this cap-and-ball chasing game appear across Britain,</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Scotland, and Ireland under many names, suggesting it is one of the</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">oldest continuously played folk games in the British Isles.</text>
  <text x="110" y="595" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players&apos; caps or bonnets are laid in a row. A ball is thrown into</text>
  <text x="110" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">one cap from a distance. The owner of that cap must run while all</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">others give chase until he is caught. The caught player then throws</text>
  <text x="110" y="673" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the ball. If a player accumulates six penalty stones in their cap,</text>
  <text x="110" y="691" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">they must suffer &apos;buns&apos; — bumps with the ball against the wall.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>