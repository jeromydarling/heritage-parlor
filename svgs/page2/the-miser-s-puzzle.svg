<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MISER&apos;S PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The miser says: &apos;When I was as old as my son is now, my son was</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">only a quarter of my current age.&apos; The miser is 60. How old is the</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">son? Let the son&apos;s current age = S. The age difference = 60 − S.</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">When the miser was S years old, the son was S − (60 − S) = 2S − 60.</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">That equals 60 ÷ 4 = 15. So 2S − 60 = 15. Solve for S.</text>
  <text x="110" y="437" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Age puzzles featuring misers, fathers, and sons were a staple of</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian puzzle books — they reflected the era&apos;s strong interest</text>
  <text x="110" y="497" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in generational relations and inheritance mathematics.</text>
  <text x="110" y="531" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A miser describes his age in relation to his son&apos;s — find both</text>
  <text x="110" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ages.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>