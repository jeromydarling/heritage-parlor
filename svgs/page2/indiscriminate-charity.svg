<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">INDISCRIMINATE CHARITY</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">You meet three people, one after another. To each you give &apos;half of</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">what you have, plus one cent.&apos; After all three you have exactly 1</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cent left. How much did you start with? Work backwards: before the</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">last person you had 4 cents (half of 4 = 2, plus 1 = 3, leaving 1).</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Before the second: 10 cents. Before the first: 22 cents. Check the</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">answer by running it forwards!</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This &apos;working backwards&apos; method was one of Dudeney&apos;s favorite</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">techniques — the same approach is used in computer science to</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">verify algorithms.</text>
  <text x="110" y="552" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">After giving each of three beggars &apos;half your money plus one</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">penny,&apos; you end up with exactly one penny. How much did you start</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">with?</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)  ·  Heritage Parlor</text>
</svg>