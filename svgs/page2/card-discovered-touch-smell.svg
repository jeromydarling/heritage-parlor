<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CARD DISCOVERED BY TOUCH</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  deck with one card slightly wider (long card) than others</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: You find a spectator&apos;s chosen card by touch or smell alone,</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">eyes closed or while holding the deck behind your back. Method:</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">prepare the deck with one &apos;locator&apos; card trimmed ever-so-slightly</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wider (about 1mm) than the rest. When a card is selected and</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">returned, control it to sit adjacent to the locator. Hold the deck</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">behind your back or overhead and run your fingertips along the edge</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— the locator card stands out clearly by feel. The chosen card is</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">right next to it. Dramatically &apos;sniff&apos; each card as you approach</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the selection for theatrical effect.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Marked cards were not considered cheating in Victorian parlor magic</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">— they were accepted performance tools. Professional gamblers,</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">however, used much more subtle markings (pin pricks, ink shading)</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">to cheat at Faro and Poker, and Victorian books on magic frequently</text>
  <text x="110" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">warned readers about these criminal applications of the same</text>
  <text x="110" y="635" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">principles.</text>
  <text x="110" y="669" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A spectator names their card after the performer feels and &apos;smells&apos;</text>
  <text x="110" y="711" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the cards one by one. The secret is a prepared card: one card is</text>
  <text x="110" y="729" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">slightly wider than the others, so it can be located by touch even</text>
  <text x="110" y="747" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">with eyes closed or in the dark. The performer uses this marked</text>
  <text x="110" y="765" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">card to locate any selected card by controlling it near the</text>
  <text x="110" y="783" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">prepared one.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>