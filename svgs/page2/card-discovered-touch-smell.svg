<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CARD DISCOVERED BY TOUCH</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  deck with one card slightly wider (long card) than others</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: You find a spectator&apos;s chosen card by touch or smell alone, eyes</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">closed or while holding the deck behind your back. Method: prepare the deck</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with one &apos;locator&apos; card trimmed ever-so-slightly wider (about 1mm) than the</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rest. When a card is selected and returned, control it to sit adjacent to the</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">locator. Hold the deck behind your back or overhead and run your fingertips</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">along the edge — the locator card stands out clearly by feel. The chosen card</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">is right next to it. Dramatically &apos;sniff&apos; each card as you approach the</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">selection for theatrical effect.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Marked cards were not considered cheating in Victorian parlor magic — they</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">were accepted performance tools. Professional gamblers, however, used much</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">more subtle markings (pin pricks, ink shading) to cheat at Faro and Poker,</text>
  <text x="56" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and Victorian books on magic frequently warned readers about these criminal</text>
  <text x="56" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">applications of the same principles.</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A spectator names their card after the performer feels and &apos;smells&apos; the cards</text>
  <text x="56" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">one by one. The secret is a prepared card: one card is slightly wider than</text>
  <text x="56" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the others, so it can be located by touch even with eyes closed or in the</text>
  <text x="56" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dark. The performer uses this marked card to locate any selected card by</text>
  <text x="56" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">controlling it near the prepared one.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>