<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAN OF LAW&apos;S PUZZLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  8 numbered tokens</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  3×3 grid</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Eight numbered tiles sit in a 3×3 grid with one empty space. Slide tiles into</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the empty space to rearrange them into numerical order (1-8 in reading order,</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">empty space in the corner) using the fewest slides. This is the classic</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">8-puzzle. Key fact: about half of all starting arrangements have no solution</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">— the solvability depends on the number of &apos;inversions&apos; in the starting</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">position.</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The sliding tile puzzle was patented in 1880 and caused a craze in America.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Sam Loyd&apos;s &apos;15-puzzle&apos; version offered $1,000 for solving an impossible</text>
  <text x="56" y="486" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">starting arrangement — and kept the prize money forever.</text>
  <text x="56" y="520" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="544" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Rearrange 8 numbered prisoners in a 9-cell dungeon to numerical order in</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">minimum moves.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Canterbury Puzzles (1907)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>