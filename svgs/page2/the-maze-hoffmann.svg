<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAZE PUZZLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  enclosed box with maze pattern</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  5 pellets</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Tilt and rotate the enclosed box to roll the five pellets through the</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">internal passages you cannot see. You must learn the invisible maze layout</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">purely through the feel and sound of the pellets moving — there is no visual</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">guide. The challenge: route all five pellets to the center simultaneously.</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Developing a mental map of the interior through trial and error is the only</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">approach. A rare form of spatial reasoning puzzle still made by puzzle</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">artisans today.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Enclosed maze puzzles requiring the manipulation of a hidden interior were a</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">direct outgrowth of Victorian confidence in mechanical precision engineering</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">— only industrial-era craftsmanship could produce the consistent internal</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tolerances needed for these puzzles to work reliably.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An enclosed box contains a maze pattern on its floor with a series of walls</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and passages. Five pellets must all be maneuvered into the central</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">compartment by tilting and turning the box, navigating the pellets through</text>
  <text x="56" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the maze passages without the ability to see them directly.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>