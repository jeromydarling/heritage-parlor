<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE ASCENDING CARD</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  deck of cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  wine glass</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fine thread</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A spectator picks a card, returns it to the deck, and the card slowly</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rises upward out of the glass on its own. Method: Stand the deck upright in a</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wine glass. Before the trick, attach a fine thread to the back of the deck so</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it loops to a ring on your finger. When a card is chosen and returned near</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the top, slowly open your hand and raise it slightly — the thread lifts the</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">chosen card upward. Keep hands relaxed and the thread invisible. The rising</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">is slow, smooth, and eerie.</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="493" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Rising Card was one of the signature effects of Victorian magic shows.</text>
  <text x="56" y="511" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Robert-Houdin performed it for Napoleon III. Various mechanical apparatus</text>
  <text x="56" y="529" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">versions were sold to amateur conjurers; the hair/thread method was</text>
  <text x="56" y="547" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hoffmann&apos;s affordable alternative.</text>
  <text x="56" y="581" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="605" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A freely chosen card rises mysteriously from a glass full of cards.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>