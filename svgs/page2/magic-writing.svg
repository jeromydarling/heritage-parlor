<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">MAGIC WRITING</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chalk or charcoal</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: You write a number, show it, cover it — and when revealed it&apos;s a</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">completely different number. Method: Write a number on a card or small</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">whiteboard and show the audience. Cover it with your hand or a cloth.</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Secretly erase it and write a new number, or swap the card for a duplicate</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">showing a different number. When you reveal it, claim you changed your mind</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and updated the prediction. The secret is making the swap look like an</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ordinary adjustment. You need: either two identical cards/slates or an</text>
  <text x="56" y="427" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">erasable surface and a moment of misdirection.</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="492" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Magic Writing or slate tricks were a staple of Victorian children&apos;s conjuring</text>
  <text x="56" y="510" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">because they required only a slate and chalk - items every Victorian</text>
  <text x="56" y="528" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">schoolchild possessed. The trick teaches children the principle of</text>
  <text x="56" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">misdirection and substitution.</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The performer writes a prediction that can be changed after the audience has</text>
  <text x="56" y="622" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">seen it.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>