<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">MAGIC WRITING</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chalk or charcoal</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: You write a number, show it, cover it — and when revealed</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it&apos;s a completely different number. Method: Write a number on a</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">card or small whiteboard and show the audience. Cover it with your</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hand or a cloth. Secretly erase it and write a new number, or swap</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the card for a duplicate showing a different number. When you</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reveal it, claim you changed your mind and updated the prediction.</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The secret is making the swap look like an ordinary adjustment. You</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">need: either two identical cards/slates or an erasable surface and</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a moment of misdirection.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Magic Writing or slate tricks were a staple of Victorian children&apos;s</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">conjuring because they required only a slate and chalk - items</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">every Victorian schoolchild possessed. The trick teaches children</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the principle of misdirection and substitution.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The performer writes a prediction that can be changed after the</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">audience has seen it.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>