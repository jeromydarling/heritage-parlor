<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PLANET PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  tray with planetary orbit tracks</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  marbles of different sizes</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The tray has multiple circular grooves representing planetary</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">orbits at different distances from the center. Place the correctly</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sized marble in each orbital groove and maneuver them all to their</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">assigned positions simultaneously. The challenge: adjusting one</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">marble&apos;s position tilts the tray and disturbs the others. Develop a</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sequence — stabilize the outer planets first, then work inward. The</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">astronomical theme is a bonus — the groove positions correspond to</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">actual relative orbital distances. Similar balance and sorting</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">puzzle trays can be found in specialty toy shops.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Planet Puzzle was designed at a time when astronomy was a</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">popular parlor science topic — the 1880s and 1890s saw an explosion</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of interest in the solar system following Giovanni Schiaparelli&apos;s</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1877 report of Martian &apos;canals.&apos;</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A tray features grooved tracks representing planetary orbits. The</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle requires maneuvering marbles — representing planets — into</text>
  <text x="110" y="715" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">their correct orbital positions without them rolling out of their</text>
  <text x="110" y="733" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">grooves. As with the real solar system, some &apos;planets&apos; must be</text>
  <text x="110" y="751" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">navigated past others.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>