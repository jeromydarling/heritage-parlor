<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE FOUR ELEMENTS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  knotted handkerchief</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Stand in a circle. One player throws a knotted handkerchief to</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">another while shouting &apos;Earth!&apos;, &apos;Air!&apos;, &apos;Water!&apos;, or &apos;Fire!&apos; The</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">catcher must name a real creature from that element before the</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">count reaches 10. Earth = land animal, Air = bird or flying insect,</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Water = fish or sea creature. Fire has no real creatures — if</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;Fire!&apos; is called, stay silent. Say a wrong answer or hesitate too</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">long and you must do a silly penalty (tell a joke, do a dance move,</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sing a line of a song).</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The four classical elements (Earth, Air, Water, Fire) were a staple</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of Victorian natural philosophy — this game reinforced knowledge of</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">natural history through rapid-fire challenge.</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="618" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players must name an animal from the called element before catching</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the handkerchief reaches ten.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)  ·  Heritage Parlor</text>
</svg>