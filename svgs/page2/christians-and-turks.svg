<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CHRISTIANS AND TURKS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  15 counters of two colors</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Use 30 counters in two colors (15 of each). Arrange them in a</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">circle in a specific order, then count off every ninth counter and</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">remove it. The challenge: arrange the circle beforehand so that all</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">15 of one color are removed first, leaving all 15 of the other</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">color as survivors. There is one correct starting arrangement —</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">find it by working backward from the removal sequence. This is a</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">variant of the Josephus Problem, one of the oldest puzzles in</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mathematics.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This puzzle is a variant of the ancient &apos;Josephus Problem,&apos; named</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">after the historian Flavius Josephus who supposedly used similar</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">counting logic to be the last survivor of a suicide circle in 67</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">AD. It has been studied by mathematicians for centuries.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fifteen Christians and fifteen Turks are in a boat that must be</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">lightened. They stand in a circle and every ninth person is thrown</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">overboard. Arrange them so that all fifteen Christians survive and</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all fifteen Turks are sacrificed. The puzzle requires finding the</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">correct starting arrangement.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>