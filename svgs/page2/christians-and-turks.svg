<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CHRISTIANS AND TURKS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  15 counters of two colors</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Use 30 counters in two colors (15 of each). Arrange them in a circle in a</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">specific order, then count off every ninth counter and remove it. The</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">challenge: arrange the circle beforehand so that all 15 of one color are</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">removed first, leaving all 15 of the other color as survivors. There is one</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">correct starting arrangement — find it by working backward from the removal</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sequence. This is a variant of the Josephus Problem, one of the oldest</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">puzzles in mathematics.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This puzzle is a variant of the ancient &apos;Josephus Problem,&apos; named after the</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">historian Flavius Josephus who supposedly used similar counting logic to be</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the last survivor of a suicide circle in 67 AD. It has been studied by</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mathematicians for centuries.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Fifteen Christians and fifteen Turks are in a boat that must be lightened.</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">They stand in a circle and every ninth person is thrown overboard. Arrange</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">them so that all fifteen Christians survive and all fifteen Turks are</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sacrificed. The puzzle requires finding the correct starting arrangement.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>