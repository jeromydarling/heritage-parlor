<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BLIND BELL</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  blindfolds</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  small bell</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">One player holds a small bell and must keep ringing it while</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">staying free. All other players are blindfolded and must navigate</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">by sound to catch the bell-ringer. The first blindfolded player to</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">touch the bell-ringer wins and takes the bell for the next round.</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Make sure the play area is clear of obstacles and corners. An</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">exciting sensory game where listening matters more than looking.</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Blind Bell is a rare inversion of the usual blindfold game — here</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it is the sighted player who is hunted, creating an unusual dynamic</text>
  <text x="110" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">where sound guides the entire play.</text>
  <text x="110" y="574" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="598" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">All players are blindfolded except the &apos;Bell,&apos; who rings a bell and</text>
  <text x="110" y="616" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tries to evade the others. Any blindfolded player who catches the</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Bell wins, removes their blindfold, and becomes the new Bell. The</text>
  <text x="110" y="652" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tension comes from hearing the bell but not seeing it.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>