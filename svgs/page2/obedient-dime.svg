<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE OBEDIENT DIME</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two coins</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hidden long thumbnail</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A dime placed between two larger coins under a glass slides</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">out from between them at your verbal command. Method: place the</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">glass and coins setup on a tablecloth or fabric surface. Scratch</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your thumbnail firmly and briskly across the tablecloth just</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">outside the glass rim — the friction-vibration travels through the</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cloth and nudges the dime out from between the larger coins. The</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">larger coins don&apos;t move because their surface area provides more</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">friction. Misdirect the audience by making a dramatic gesture with</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your other hand overhead.</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="589" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Obedient Dime is a beautiful example of how Victorian magic</text>
  <text x="110" y="607" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">exploited scientific principles (acoustic/mechanical vibration</text>
  <text x="110" y="625" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">through a surface) that audiences of the era would have no context</text>
  <text x="110" y="643" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">for understanding, making a mundane physical fact appear</text>
  <text x="110" y="661" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">miraculous.</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="719" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A dime placed between two half-dollars under a glass moves from</text>
  <text x="110" y="737" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">between them at the performer&apos;s scratch command. The secret: the</text>
  <text x="110" y="755" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performer&apos;s thumbnail scratches the tablecloth just outside the</text>
  <text x="110" y="773" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">glass, propelling the dime through a slight vibration transmitted</text>
  <text x="110" y="791" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">through the cloth.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>