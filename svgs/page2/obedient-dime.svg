<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE OBEDIENT DIME</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two coins</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hidden long thumbnail</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A dime placed between two larger coins under a glass slides out from</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">between them at your verbal command. Method: place the glass and coins setup</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on a tablecloth or fabric surface. Scratch your thumbnail firmly and briskly</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">across the tablecloth just outside the glass rim — the friction-vibration</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">travels through the cloth and nudges the dime out from between the larger</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">coins. The larger coins don&apos;t move because their surface area provides more</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">friction. Misdirect the audience by making a dramatic gesture with your other</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hand overhead.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Obedient Dime is a beautiful example of how Victorian magic exploited</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">scientific principles (acoustic/mechanical vibration through a surface) that</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">audiences of the era would have no context for understanding, making a</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mundane physical fact appear miraculous.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A dime placed between two half-dollars under a glass moves from between them</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">at the performer&apos;s scratch command. The secret: the performer&apos;s thumbnail</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">scratches the tablecloth just outside the glass, propelling the dime through</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">a slight vibration transmitted through the cloth.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>