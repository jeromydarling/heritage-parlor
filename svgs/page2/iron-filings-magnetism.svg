<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">MAGNET EXPERIMENTS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  bar magnet</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  iron filings</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Lay a sheet of plain white paper over a bar magnet on a table. Sprinkle iron</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">filings from a small height over the paper, distributing them evenly. Tap the</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper gently a few times. The filings will settle into graceful arcs running</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">from one pole of the magnet to the other, tracing the invisible magnetic</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">field lines. The result is a beautiful physical map of a force you cannot see</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with the naked eye. Bar magnets and iron filings are sold together in most</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">science or craft stores.</text>
  <text x="56" y="469" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="493" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Magnetic field visualization using iron filings was one of the most performed</text>
  <text x="56" y="511" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">demonstrations of the Victorian era, popularized by Michael Faraday in the</text>
  <text x="56" y="529" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1840s. Faraday&apos;s concept of field lines — literally visible here — became the</text>
  <text x="56" y="547" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">foundation of modern electromagnetism.</text>
  <text x="56" y="581" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="605" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Place a bar magnet under a piece of paper and sprinkle iron filings on the</text>
  <text x="56" y="623" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">paper above it. Tap the paper gently and the iron filings arrange themselves</text>
  <text x="56" y="641" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">into the lines of the magnetic field — a beautiful, instantly visible map of</text>
  <text x="56" y="659" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">an invisible force.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>