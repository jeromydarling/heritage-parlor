<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">MAGNET EXPERIMENTS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  bar magnet</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  iron filings</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Lay a sheet of plain white paper over a bar magnet on a table.</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Sprinkle iron filings from a small height over the paper,</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">distributing them evenly. Tap the paper gently a few times. The</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">filings will settle into graceful arcs running from one pole of the</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">magnet to the other, tracing the invisible magnetic field lines.</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The result is a beautiful physical map of a force you cannot see</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with the naked eye. Bar magnets and iron filings are sold together</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">in most science or craft stores.</text>
  <text x="110" y="544" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Magnetic field visualization using iron filings was one of the most</text>
  <text x="110" y="586" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performed demonstrations of the Victorian era, popularized by</text>
  <text x="110" y="604" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Michael Faraday in the 1840s. Faraday&apos;s concept of field lines —</text>
  <text x="110" y="622" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">literally visible here — became the foundation of modern</text>
  <text x="110" y="640" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">electromagnetism.</text>
  <text x="110" y="674" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="698" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Place a bar magnet under a piece of paper and sprinkle iron filings</text>
  <text x="110" y="716" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">on the paper above it. Tap the paper gently and the iron filings</text>
  <text x="110" y="734" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">arrange themselves into the lines of the magnetic field — a</text>
  <text x="110" y="752" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">beautiful, instantly visible map of an invisible force.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>