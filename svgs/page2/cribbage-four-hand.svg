<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CRIBBAGE (FOUR-HAND)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cribbage board</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Four-player partnership Cribbage: two teams of two sit opposite each other.</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 5 cards each; everyone discards 1 card to the crib (the crib alternates</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">between partnerships each deal). Play and count hands exactly as in</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">two-player Cribbage. Partners share one score track on the cribbage board —</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">both partners&apos; points combine. First partnership to reach 121 wins. Strategy</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tip: coordinate discards with your partner — feed each other&apos;s crib when your</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">team holds it, and starve the opponent&apos;s crib when they hold it.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Four-hand Cribbage allows the game&apos;s characteristic pegging and counting to</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">be enjoyed as a team game. It was especially popular in English pubs and</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">working mens&apos; clubs throughout the Victorian and Edwardian eras.</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The four-player partnership version of Cribbage, played with each person</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dealt 5 cards.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>