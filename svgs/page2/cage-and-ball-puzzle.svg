<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CAGE AND BALL</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  wooden cage with enclosed marble or ball</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Study the wooden cage carefully. The ball inside seems impossible</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to remove — the bars are too close together. Look for any bar or</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pillar that seems slightly different from the others: a different</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">wood grain direction, a very slight wobble, or a faint line at its</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">base. That pillar unscrews or rotates to unlock. Twist it and pull</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">it outward — the gap created is just large enough to remove the</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">ball. Reinsert the pillar to &apos;imprison&apos; the ball again. These</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">carved wooden cage puzzles are a beautiful collector&apos;s item.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Cage and Ball is a classic example of the &apos;captive ball&apos; puzzle</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">genre, which was so popular in Victorian England that</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle-turners specialized in producing them. Some elaborate</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">examples had balls carved inside balls inside balls — an impossible</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">feat that required carving through the outer layers.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A ball is enclosed within a decorative wooden cage. The bars of the</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">cage are too close together for the ball to pass through — yet the</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ball is clearly inside. Solution: one of the cage pillars rotates</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and withdraws, creating a gap large enough for the ball to be</text>
  <text x="110" y="726" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">removed.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>