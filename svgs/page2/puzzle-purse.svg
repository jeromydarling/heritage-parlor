<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PUZZLE PURSE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  fabric purse threaded with rings on a cord</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The purse is secured by a cord threaded through several rings in a specific</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">interlocked pattern. Your challenge: open the purse and separate the rings</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">from the cord entirely — without cutting anything or untying any knot. The</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">solution requires routing the cord through specific ring combinations in the</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">right order. Think of it as a 3D disentanglement puzzle made of fabric and</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">metal. These puzzle purses can still be bought as novelty items or made at</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">home with cord and curtain rings.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Puzzle Purse was a popular Victorian novelty gift, often given as a</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Valentine&apos;s Day present with a love note hidden inside. The recipient had to</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">solve the puzzle to access the message — making the gift both sentimental and</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">intellectually challenging.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A fabric purse is closed and secured with a cord threaded through rings. The</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle is to open the purse and remove the rings without untying the cord — a</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">feat that seems impossible but has an elegant mechanical solution.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>