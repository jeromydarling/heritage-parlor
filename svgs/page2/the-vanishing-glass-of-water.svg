<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE VANISHING GLASS OF WATER</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  glass of water</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cloth tube</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">What the audience sees: a full glass of water disappears under a cloth. The</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">secret: the cloth has a stiff tube sewn inside that holds the glass&apos;s shape</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">after the glass is tilted away. Cover the glass, grip both glass and tube</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">together, tilt the glass secretly backward (toward you), and whisk the cloth</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">away — the glass is gone, and the cloth collapses flat.</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="429" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Flying glass of water effects were considered among the most mystifying of</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all Victorian magic - combining the heavy weight of water with apparent</text>
  <text x="56" y="465" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">impossibility. The cloth-tube method was Hoffmann&apos;s elegant solution to a</text>
  <text x="56" y="483" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">technically challenging effect.</text>
  <text x="56" y="517" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A full glass of water vanishes completely under a cloth and reappears</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">elsewhere.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>