<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC SQUARE (ORDER 3)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The puzzle: place the numbers 1 through 9 in a 3×3 grid so that every row,</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">every column, and both main diagonals all add up to exactly 15. There&apos;s</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">essentially one solution (rotations and reflections don&apos;t count as</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">different). Hints: the number 5 must go in the center square. Even numbers</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(2, 4, 6, 8) go in the corner squares. Odd numbers except 5 go in the edge</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">squares. Why 15? Because the numbers 1–9 sum to 45, and 45 ÷ 3 rows = 15 per</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">row.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Magic squares have fascinated mathematicians since ancient China (Lo Shu, 3rd</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">millennium BC). They appear in Durer&apos;s Melancholia engraving (1514), Benjamin</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Franklin&apos;s writings, and as amulets in Arab and Indian traditions. The 3x3</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">square has exactly one distinct solution.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Arrange numbers 1-9 in a 3x3 grid so every row, column, and diagonal sums to</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">15.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>