<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOTTLE IMPS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  weighted bottles</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Small bottle-shaped figures tip over — but always spring back upright</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on their own, no matter how many times you knock them. Method: The figures</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">are weighted at the base with a marble, ball bearing, or lead pellet. The</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">heavy base gives them an extremely low center of gravity, so they always</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">swing back upright. There&apos;s no magic involved — just physics. Present them as</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;imps&apos; who refuse to lie down and obey your commands by standing up. Fun as a</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">curiosity or an introduction to the concept of center of gravity for younger</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">kids.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Self-righting toys and novelty figures were popular Victorian drawing-room</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">curiosities. The Weeble toy (1971, &apos;Weebles wobble but they don&apos;t fall down&apos;)</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">is based on precisely the same physics principle.</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Small bottle figures stand upright, refuse to lie down, and seem to obey</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">commands.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>