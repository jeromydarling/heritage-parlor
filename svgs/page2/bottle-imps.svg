<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOTTLE IMPS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  weighted bottles</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Small bottle-shaped figures tip over — but always spring</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">back upright on their own, no matter how many times you knock them.</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Method: The figures are weighted at the base with a marble, ball</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bearing, or lead pellet. The heavy base gives them an extremely low</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">center of gravity, so they always swing back upright. There&apos;s no</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">magic involved — just physics. Present them as &apos;imps&apos; who refuse to</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">lie down and obey your commands by standing up. Fun as a curiosity</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">or an introduction to the concept of center of gravity for younger</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">kids.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Self-righting toys and novelty figures were popular Victorian</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">drawing-room curiosities. The Weeble toy (1971, &apos;Weebles wobble but</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">they don&apos;t fall down&apos;) is based on precisely the same physics</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">principle.</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="657" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Small bottle figures stand upright, refuse to lie down, and seem to</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">obey commands.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>