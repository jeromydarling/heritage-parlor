<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DISSECTED CROSS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  5 geometric pieces that form a cross</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cut out the five puzzle pieces that together form a Greek cross</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">shape. Your challenge: rearrange the same five pieces into a</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">perfect square with no gaps or overlaps. Some pieces may need to be</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rotated or flipped. The surprising mathematical fact: a cross and a</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">square of equal area can always be rearranged into each other using</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">just five pieces. This is known as a dissection puzzle — the pieces</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">are hinged by geometry, not glue. Print a template from any puzzle</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">website to cut your own pieces.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Henry Dudeney published his elegant 4-piece cross-to-square</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">dissection in 1902, improving on earlier 5-piece solutions. The</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pieces can even be hinged together to fold from one shape to the</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">other — a &apos;hinged dissection&apos; that Dudeney demonstrated in silver</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">at the Royal Institution.</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A Greek cross is cut into five pieces. The puzzle is to rearrange</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">these five pieces to form a perfect square. The solution requires a</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">specific rotation and arrangement that is far from obvious — the</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">cross-shaped whole must become a rectangular whole.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>