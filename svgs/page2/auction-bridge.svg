<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">AUCTION BRIDGE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  score pad</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Four players in two partnerships. Deal 13 cards each. All four</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">players may now bid for the right to name trump — each bid must be</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">higher than the last (either more tricks or a higher-ranking suit).</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Highest bidder&apos;s partnership plays with their suit as trump; the</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bidder&apos;s partner lays their hand face-up as dummy. Play all 13</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tricks. Score above and below the line for tricks and honors. Bonus</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">points for slams: bid and win 12 tricks (Small Slam) or all 13</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(Grand Slam). Auction Bridge upgraded regular Bridge by giving</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">everyone a chance to name trump.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Auction Bridge appeared around 1904 and replaced regular Bridge</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">within a decade. It was itself replaced by Contract Bridge (1925)</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">which only counted tricks you bid for. The rapid evolution shows</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">how actively the Victorian card-playing community sought to improve</text>
  <text x="110" y="639" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">their games.</text>
  <text x="110" y="673" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The competitive bidding evolution of Bridge - all four players</text>
  <text x="110" y="715" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">compete to name trump via auction.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>