<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE SPELLING GAME</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Player 1 says a letter aloud. Player 2 adds another. Continue</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">around the circle — each addition must be consistent with at least</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one real word. The player who completes a word loses that round and</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">performs a fun challenge (tell a joke, do an impression). You may</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">also challenge the previous player if you think no real word is</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">possible from those letters — wrong challenges cost you the round.</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Strategy: aim for long words, avoid short ones.</text>
  <text x="110" y="479" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Spelling Game is a Victorian precursor to modern Scrabble-type</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">word games. The game requires rapid lexical knowledge and strategy:</text>
  <text x="110" y="539" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">choosing letters that lead toward long words while avoiding</text>
  <text x="110" y="557" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">completion.</text>
  <text x="110" y="591" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players take turns adding letters to spell a word without</text>
  <text x="110" y="633" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">completing it - but must always be heading toward a real word.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>