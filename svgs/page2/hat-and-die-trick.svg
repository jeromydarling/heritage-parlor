<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE HAT AND DIE TRICK</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two identical top hats</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  hollow die (larger)</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  solid die (smaller)</text>
  <text x="72" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  cover</text>
  <text x="56" y="298" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="324" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A die placed under a cover on a hat vanishes and is found in a second</text>
  <text x="56" y="345" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hat. Method: the visible die is hollow (a shell) with the real solid die</text>
  <text x="56" y="366" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">inside it. When the cover is lowered over the die on the hat brim, its rim</text>
  <text x="56" y="387" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">catches the hollow shell and lifts it away invisibly as the cover is</text>
  <text x="56" y="408" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">&apos;removed&apos; — the shell rides up inside the cover. The solid die is left on the</text>
  <text x="56" y="429" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">hat, to be revealed when a spectator picks up the hat. The die appears to</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">have traveled invisibly between the two hats.</text>
  <text x="56" y="491" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="515" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Top hat magic was so associated with the Victorian era that the top hat</text>
  <text x="56" y="533" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">became the universal symbol of stage magic worldwide. The tradition of</text>
  <text x="56" y="551" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pulling things from top hats began in the 1830s and peaked in the 1860s-80s,</text>
  <text x="56" y="569" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">coinciding with the peak popularity of The Magician&apos;s Own Book.</text>
  <text x="56" y="603" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="627" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A die is shown and placed under a cover on a top hat; the cover is removed —</text>
  <text x="56" y="645" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the die has vanished. It is found in a lower hat. The method: the visible die</text>
  <text x="56" y="663" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">is hollow with the real solid die inside; when the cover is removed, the</text>
  <text x="56" y="681" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">hollow shell stays hidden in the hat while the cover conceals the transfer.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>