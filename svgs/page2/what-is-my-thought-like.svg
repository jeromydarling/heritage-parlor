<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">WHAT IS MY THOUGHT LIKE?</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Player one secretly thinks of something — a person, a place, an</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">object, or even a feeling — but says nothing. Going around the</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">circle, each player states what their thought reminds them of: &apos;My</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">thought is like a thunderstorm.&apos; &apos;Mine is like an old shoe.&apos; Once</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">everyone has spoken, the thinker reveals their secret thought. Now</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">each player must defend their comparison with creative logic — why</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">IS a thunderstorm like, say, a pizza? The most imaginative</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">explanation wins applause.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">What Is My Thought Like? was praised by Victorian games books for</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">developing the faculty of analogy and metaphorical thinking —</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">skills considered essential for poets, orators, and educated</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">conversationalists.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One player thinks of a person, place, or object without revealing</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">it. Each other player in turn must say &apos;My thought is like a ——&apos;</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">with some object, and later must justify the comparison. After all</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">comparisons are given, the hidden thought is revealed and each</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">player defends their comparison with wit.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)  ·  Heritage Parlor</text>
</svg>