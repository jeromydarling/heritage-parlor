<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">KING OF THE BARBARIE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Two players link hands to form the Fortress. A King leads a band of soldiers</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">who surround it, and both sides sing challenges and defiant replies back and</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">forth. The soldiers then try to pull apart the two linked Fortress players.</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">When the King finally breaks through, all the soldiers flood through the gap.</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Swap roles so everyone gets a turn as King and as Fortress.</text>
  <text x="56" y="383" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The &apos;King of the Barbarie&apos; game survives from medieval siege-play traditions</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and was likely influenced by actual accounts of wars with Barbary pirates,</text>
  <text x="56" y="443" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">which were major news events in the 16th and 17th centuries.</text>
  <text x="56" y="477" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="501" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Two children join hands as a &apos;fortress.&apos; A &apos;King&apos; stands at a distance with</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">soldiers behind. Soldiers surround the fortress, singing alternately with the</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">fortress defenders: &apos;O will you surrender... / To the King of the Barbarie?&apos;</text>
  <text x="56" y="555" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Eventually soldiers try to break the clasped hands; the King succeeds in</text>
  <text x="56" y="573" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">breaking through, and the troop bursts through the gap.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>