<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE LINKING RINGS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  set of 8 metal rings</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Eight solid metal rings link and unlink magically — passing</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through each other like they&apos;re made of smoke. Method: The set of 8</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">includes some pre-linked rings and one &apos;key&apos; ring with a small gap.</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The gap is always turned away from the audience. Use the key to</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">link and unlink individual rings at speed. Build the routine: start</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with separate rings, link two, build a four-ring chain, then all</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">eight, then separate them one by one. The performance hides all the</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">work in fluid motion. Equipment: set of 8 linking rings, available</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">from magic suppliers.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Chinese Linking Rings is one of the most instantly recognizable</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magic props in history. Despite its name, identical tricks were</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">performed in ancient Rome, medieval Europe, and Asia. Every</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">professional magician of the Victorian era included it in their</text>
  <text x="110" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">repertoire.</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Solid metal rings link and unlink magically, passing through each</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">other in seemingly impossible ways.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>