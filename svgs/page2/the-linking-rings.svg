<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE LINKING RINGS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  set of 8 metal rings</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: Eight solid metal rings link and unlink magically — passing through</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">each other like they&apos;re made of smoke. Method: The set of 8 includes some</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pre-linked rings and one &apos;key&apos; ring with a small gap. The gap is always</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">turned away from the audience. Use the key to link and unlink individual</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rings at speed. Build the routine: start with separate rings, link two, build</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a four-ring chain, then all eight, then separate them one by one. The</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">performance hides all the work in fluid motion. Equipment: set of 8 linking</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">rings, available from magic suppliers.</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="470" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Chinese Linking Rings is one of the most instantly recognizable magic</text>
  <text x="56" y="488" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">props in history. Despite its name, identical tricks were performed in</text>
  <text x="56" y="506" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ancient Rome, medieval Europe, and Asia. Every professional magician of the</text>
  <text x="56" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian era included it in their repertoire.</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Solid metal rings link and unlink magically, passing through each other in</text>
  <text x="56" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">seemingly impossible ways.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>