<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC BOTTLE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  special compartmented bottle with finger-controlled pour holes</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: One ordinary-looking bottle pours wine, then water, then milk in</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">sequence at the performer&apos;s command. Method: the bottle&apos;s interior is divided</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">into three separate compartments, each holding a different liquid, with three</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tiny exit holes in the spout. By covering different combinations of holes</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with the fingers holding the bottle, the performer controls which</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">compartment&apos;s liquid flows. Shifting finger positions between pours is the</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">whole secret. A modern equivalent can be demonstrated with three separate</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">syringes — or by studying the concept and building your own compartmented</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">bottle.</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="491" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Magic Bottle was considered the ultimate stage prop in Victorian parlor</text>
  <text x="56" y="509" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magic books, with detailed DIY instructions for constructing one at home</text>
  <text x="56" y="527" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">using soldered tin partitions. Professional versions were sold by magic</text>
  <text x="56" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">suppliers in London and New York.</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">One ordinary-looking bottle pours wine, then water, then milk in succession</text>
  <text x="56" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">at the performer&apos;s command — apparently containing all three liquids. The</text>
  <text x="56" y="639" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bottle has a compartmented interior with separate chambers, each with its own</text>
  <text x="56" y="657" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">pouring hole controlled by the position of the performer&apos;s fingers.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>