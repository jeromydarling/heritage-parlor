<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CHINESE RINGS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  Chinese rings apparatus: 7-9 rings on a bar with looped handle</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The Chinese Rings has a series of rings, each linked through the next, all</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">threaded on a bar. To remove a ring, the ring directly behind it must</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">currently be on the bar, and all rings in front must be off. Work one ring at</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a time. The optimal solution for 9 rings requires exactly 341 moves — there&apos;s</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">no shortcut. The puzzle is mathematically equivalent to counting in binary. A</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">beginner should start with 5 or 6 rings to learn the pattern before</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">attempting the full set.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Chinese Rings puzzle appears in European mathematical literature as early</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as 1550, when Girolamo Cardano described it. It is mathematically isomorphic</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">to the binary number system — each ring position corresponds to a binary</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">digit — a connection not formally proved until the 20th century.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A series of rings are looped onto a bar with a handle. Each ring passes</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">through the next, and all must be removed from the bar following a precise</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">sequence. To remove ring n, ring (n-1) must be on the bar and all preceding</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">rings must be off. The minimum number of moves for nine rings is 341.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>