<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE CUT STRING RESTORED</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  string</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  scissors</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hold a length of string folded in half, with the middle loop sticking up</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through your fist. Before cutting, secretly push the loop forward so you&apos;re</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">actually cutting a short extra bit near the center — not the true middle.</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Snip through that bit only. The &apos;cut&apos; ends actually belong to the same short</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">piece, not the main string. Pull the pieces apart to show they&apos;re separate,</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">then secretly pocket the small piece while revealing the string is magically</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">whole again.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This is one of the most fundamental magic tricks in the conjuring repertoire</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">— versions of the cut-and-restored string appear in books of conjuring from</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">as early as 1584.</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A piece of string is visibly cut in half and then restored to one piece.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>