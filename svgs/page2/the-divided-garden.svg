<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE DIVIDED GARDEN</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a rectangle with 10 dots (trees) arranged in two rows of five.</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The challenge: divide the rectangle into 5 pieces of identical</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">shape, each containing exactly 2 trees. Your goal is to find cuts</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">that give each of 5 people a matching-shaped plot with 2 trees.</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Hint: the pieces don&apos;t have to be rectangles — L-shapes and</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">irregular shapes are allowed as long as all 5 pieces match each</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">other.</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Geometric division puzzles like this appeared in Victorian</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">arithmetic textbooks as exercises in practical geometry — the idea</text>
  <text x="110" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">that mathematics should solve real problems like fair land</text>
  <text x="110" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">division.</text>
  <text x="110" y="613" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="637" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Divide a garden with 10 trees so that 5 children each receive an</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">equal share containing exactly 2 trees.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Every Boy&apos;s Book (1869)  ·  Heritage Parlor</text>
</svg>