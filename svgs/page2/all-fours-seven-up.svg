<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ALL FOURS (SEVEN UP)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 6 cards each; flip one card to propose trump. Each player can accept or</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">reject this trump proposal (if rejected, the dealer must choose a different</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">one). Play tricks. At the end, four points are available: High (1 pt — player</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">who held the highest trump in play), Low (1 pt — player who held the lowest</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">trump), Jack (1 pt — player who takes a trick containing the Jack of trumps),</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and Game (1 pt — player who collected the highest pip total in their tricks).</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">First to 7 points wins.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">All Fours appeared in Charles Cotton&apos;s Compleat Gamester in 1674 - the first</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">English card game rulebook. Also called Seven Up or High-Low-Jack. American</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">frontiersmen played it throughout the 18th and 19th centuries; Hoyle</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">describes dozens of regional variants.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The first card game described in a printed English rulebook - ancestor of</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Auction Pitch.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>