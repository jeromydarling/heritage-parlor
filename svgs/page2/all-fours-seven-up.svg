<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">ALL FOURS (SEVEN UP)</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal 6 cards each; flip one card to propose trump. Each player can</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">accept or reject this trump proposal (if rejected, the dealer must</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">choose a different one). Play tricks. At the end, four points are</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">available: High (1 pt — player who held the highest trump in play),</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Low (1 pt — player who held the lowest trump), Jack (1 pt — player</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">who takes a trick containing the Jack of trumps), and Game (1 pt —</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player who collected the highest pip total in their tricks). First</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to 7 points wins.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">All Fours appeared in Charles Cotton&apos;s Compleat Gamester in 1674 -</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the first English card game rulebook. Also called Seven Up or</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">High-Low-Jack. American frontiersmen played it throughout the 18th</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">and 19th centuries; Hoyle describes dozens of regional variants.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The first card game described in a printed English rulebook -</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">ancestor of Auction Pitch.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)  ·  Heritage Parlor</text>
</svg>