<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BARLEY-BREAK</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">6 players form 3 pairs. Divide the play area into three zones. The</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">center zone is the trap, and the pair in it must catch players from</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the end zones without uncoupling their linked arms. Any pair they</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tag swaps to become the new center pair. The game continues with</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pairs rotating through the center. Works well on a lawn or in a</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">large room.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Barley-Break is one of the oldest named games in British history,</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mentioned by Philip Sidney in 1580 and referenced by John Fletcher</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in 1614. The &apos;barley&apos; in the name likely refers to the stacks</text>
  <text x="110" y="536" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">around which it was originally played at harvest time.</text>
  <text x="110" y="570" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Six players (three of each sex) are coupled in pairs. The ground is</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">divided into three compartments, with the middle called &apos;Hell.&apos; The</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Hell couple must catch others from the end zones without</text>
  <text x="110" y="648" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">separating. Caught players swap to Hell. The last couple remaining</text>
  <text x="110" y="666" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">in Hell are said to be &apos;in Hell&apos; and lose the game.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>