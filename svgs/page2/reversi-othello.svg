<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">REVERSI (OTHELLO)</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  8x8 board</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  64 two-sided discs in black and white</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Start with 2 white and 2 black discs in the center four squares (diagonal</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">arrangement). On your turn, place a disc so it &apos;flanks&apos; one or more of your</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">opponent&apos;s discs in a straight line (horizontal, vertical, or diagonal) —</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">with your disc at one end and an existing disc of yours at the other. All</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">flanked discs flip to your color. If you can&apos;t flank any disc, you must pass.</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Game ends when the board is full or no moves are possible. Player with the</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">most discs of their color wins.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Reversi was invented by Lewis Waterman and John Mollett in England around</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1883. Mattel re-issued it as Othello in 1971 with the tagline &apos;a minute to</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">learn, a lifetime to master.&apos; World Othello Championships have been held</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">annually since 1977.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Victorian strategy game of encirclement - place discs to flank and flip</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">opponent&apos;s pieces.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Foster&apos;s Complete Hoyle (1914)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>