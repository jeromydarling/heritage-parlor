<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BEGGAR MY NEIGHBOR</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  standard deck of 52 cards</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Deal all 52 cards equally into face-down packs. Take turns flipping</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your top card onto a central pile. When a court card appears — Ace</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(pay 4 cards), King (pay 3), Queen (pay 2), or Jack (pay 1) — the</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">NEXT player must &apos;pay&apos; by flipping that many cards face-down onto</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the pile. If they flip another court card during their payment, the</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">penalty transfers to the next player. If a player pays all their</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">penalty cards without hitting a court card, the player who played</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the original court card takes the entire pile. Last player with</text>
  <text x="110" y="480" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">cards wins.</text>
  <text x="110" y="521" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="545" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Beggar My Neighbor (also called Beat Your Neighbor Out of Doors)</text>
  <text x="110" y="563" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">was popular in English nurseries throughout the Victorian era. It&apos;s</text>
  <text x="110" y="581" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mentioned by Pip in Dickens&apos;s Great Expectations. There&apos;s actually</text>
  <text x="110" y="599" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">no winning strategy - outcome is entirely determined by the initial</text>
  <text x="110" y="617" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">shuffle.</text>
  <text x="110" y="651" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="675" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A card game of pure chance where players try to win all cards by</text>
  <text x="110" y="693" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">playing penalty cards.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: My Book of Indoor Games (1916)  ·  Heritage Parlor</text>
</svg>