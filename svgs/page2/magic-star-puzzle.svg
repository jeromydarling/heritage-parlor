<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC STAR</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  star pattern diagram</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  12 numbered counters</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a six-pointed Star of David pattern. The 12 positions are: 6</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">points of the star and 6 inner intersections. Number counters 1</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">through 12. Place them on the positions so that every straight line</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">of four numbers sums to the same total (26 is one possible target).</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Multiple solutions exist. Start by placing the highest and lowest</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">numbers symmetrically, then work inward by trial and adjustment.</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Paper and pencil are your best tools — sketch different</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">arrangements before committing.</text>
  <text x="110" y="522" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="546" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Magic star puzzles were considered an advanced form of the classic</text>
  <text x="110" y="564" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magic square. Hoffmann devoted several pages to them in his book,</text>
  <text x="110" y="582" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">noting that unlike magic squares, magic stars have been</text>
  <text x="110" y="600" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">surprisingly little studied by professional mathematicians.</text>
  <text x="110" y="634" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="658" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Arrange numbered counters on a six-pointed star so that every</text>
  <text x="110" y="676" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">straight row of four numbers adds up to the same total. The star</text>
  <text x="110" y="694" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">has six points and six sides, each containing four positions. A</text>
  <text x="110" y="712" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">satisfying mathematical arrangement puzzle that extends the magic</text>
  <text x="110" y="730" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">square concept.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>