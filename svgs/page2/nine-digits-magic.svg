<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">NINE DIGITS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  pencil</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Draw a 3×3 grid. Place each digit from 1 to 9 exactly once so that every row,</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">every column, and both diagonals all add up to 15. Your goal: find the</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">arrangement. There is essentially one solution (not counting rotations or</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mirror images). Hint: 5 goes in the center. Once you&apos;ve found it, try to</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">figure out why 15 is the only possible sum, and why the center must always be</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">5.</text>
  <text x="56" y="426" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="450" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The 3×3 magic square summing to 15 is called the Lo Shu square and appears in</text>
  <text x="56" y="468" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Chinese legend as a pattern carried on the back of a tortoise. It is the</text>
  <text x="56" y="486" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">earliest known magic square, appearing in Chinese mathematical texts from</text>
  <text x="56" y="504" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">around 650 BC.</text>
  <text x="56" y="538" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="562" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Arrange the nine digits 1 through 9 in a three-by-three square so that every</text>
  <text x="56" y="580" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">row, every column, and both diagonals add up to the same number — fifteen.</text>
  <text x="56" y="598" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This is the oldest known magic square.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>