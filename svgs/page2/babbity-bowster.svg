<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BABBITY BOWSTER</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  handkerchief</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">A closing dance for a group party. One player dances solo before everyone and</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">drops a handkerchief at their chosen partner&apos;s feet. That person picks it up,</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">gives the dancer a kiss on the cheek, then dances before everyone else and</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">drops the handkerchief at their own choice. That chosen person chases the</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dancer around the room. When caught, the two join a growing line that dances</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a reel together. Repeat until all are paired.</text>
  <text x="56" y="404" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Babbity Bowster (from &apos;bab at the bolster&apos;) was traditionally played using an</text>
  <text x="56" y="446" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">actual bolster or pillow rather than a handkerchief — a survival of much</text>
  <text x="56" y="464" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">older courtship customs at harvest festivals and rural dances.</text>
  <text x="56" y="498" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="522" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">At the end of a country ball, a boy dances before the girls singing the first</text>
  <text x="56" y="540" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">verse, throws a handkerchief on the selected girl for a kiss. The girl takes</text>
  <text x="56" y="558" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the handkerchief, sings the second verse, throws it to a boy, and is pursued</text>
  <text x="56" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">back. Pairs form a line and dance like Sir Roger de Coverley. The song: &apos;Wha</text>
  <text x="56" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">learned you to dance... / Babbity Bowster brawly?&apos;</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>