<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">MUSICAL CHAIRS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chairs</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  music</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Set up chairs in a circle — one fewer than the number of players.</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Music plays; everyone marches or dances around the chairs. When the</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">music stops suddenly, everyone scrambles to sit. The player left</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">standing is out, and one chair is removed. Keep going until only</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">two players and one chair remain. Last player to grab a chair wins.</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="483" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Musical Chairs (also called &apos;Going to Jerusalem&apos;) was one of the</text>
  <text x="110" y="501" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">most popular Victorian children&apos;s party games and remains</text>
  <text x="110" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">universally known today — a remarkable 150-year run.</text>
  <text x="110" y="553" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="577" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players march around one fewer chair than the number of players;</text>
  <text x="110" y="595" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">when music stops, all must sit — the one left standing is</text>
  <text x="110" y="613" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">eliminated.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)  ·  Heritage Parlor</text>
</svg>