<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">MUSICAL CHAIRS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  chairs</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  music</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Set up chairs in a circle — one fewer than the number of players. Music</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">plays; everyone marches or dances around the chairs. When the music stops</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">suddenly, everyone scrambles to sit. The player left standing is out, and one</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">chair is removed. Keep going until only two players and one chair remain.</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Last player to grab a chair wins.</text>
  <text x="56" y="405" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="429" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Musical Chairs (also called &apos;Going to Jerusalem&apos;) was one of the most popular</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian children&apos;s party games and remains universally known today — a</text>
  <text x="56" y="465" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">remarkable 150-year run.</text>
  <text x="56" y="499" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="523" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Players march around one fewer chair than the number of players; when music</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">stops, all must sit — the one left standing is eliminated.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Cassell&apos;s Book of In-door Amusements, Card Games, and Fireside Fun (1881)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>