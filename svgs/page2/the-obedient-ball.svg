<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE OBEDIENT BALL</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  rubber ball</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  dark thread</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: A ball rises and falls in the air in response to your spoken</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">commands. Method: Thread a long dark thread through a rubber ball (or tie it</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to a hook on the ball). Attach both ends of the thread under your sleeves to</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your wrists. Hold the thread taut but invisible against a dark background or</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">jacket. Raise your wrists slightly and the ball rises. Lower them and it</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">descends. Vary the tension to make it pause mid-air. Use dark thread against</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">dark clothing for best results — and perform in dim lighting if possible.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Obedient Ball was one of the standard &apos;starter tricks&apos; Hoffmann</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">recommended for young magicians. Its simplicity made it perfect for</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">children&apos;s birthday parties - a Victorian institution by the 1870s.</text>
  <text x="56" y="541" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="565" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A ball on a string rises, stops, and descends in response to the magician&apos;s</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">spoken commands.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>