<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE PUZZLING MONEY-BOXES</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place exactly 6 coins totaling $4.50 into four boxes with these rules: Box 1</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">holds twice as much as Box 2; Box 3 holds twice as much as Box 4; Box 1 + Box</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">3 = Box 2 + Box 4 + $1.00. Find valid coin assignments. Hint: set Box 2 = x</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and Box 4 = y, then express everything else in terms of x and y, and find</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">values that work with real coin denominations.</text>
  <text x="56" y="383" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Victorian piggy banks and painted tin money boxes were a staple of every</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">household. Dudeney cleverly turned the familiar money box into an algebra</text>
  <text x="56" y="443" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle.</text>
  <text x="56" y="477" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="501" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Place six coins into four boxes totaling 45 shillings, with specific</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">conditions on each box.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Amusements in Mathematics (1917)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>