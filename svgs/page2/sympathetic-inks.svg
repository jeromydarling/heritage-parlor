<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SYMPATHETIC OR INVISIBLE INKS</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  lemon juice or milk (for heat-revealed)</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  candle or heat source</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Write a secret message using lemon juice (or milk) on plain white paper — dip</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a toothpick or small brush in the juice and write carefully. Let it dry</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">completely until invisible. To reveal: hold the paper a few inches above a</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">candle or warm light bulb. The organic acids in the lemon juice char at a</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">lower temperature than the paper, making the letters appear in brown. A</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">modern iron on a low setting also works. For extra fun: use different</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">invisible inks that require different developers — lemon juice needs heat,</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">while other formulas need chemical developers.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Invisible ink has a serious intelligence history: George Washington&apos;s spy</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">network used a silver nitrate formula during the American Revolutionary War,</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">with Hercules Mulligan as a key operative. The formula was invented by James</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Jay, brother of Founding Father John Jay.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Various recipes produce invisible writing that can only be revealed by</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">specific treatments: lemon juice or milk revealed by heat, lead acetate made</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">visible by hydrogen sulfide gas, and sulphate of iron revealed by oak galls</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">solution. The book provides multiple formulas for different secret writing</text>
  <text x="56" y="698" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">scenarios.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>