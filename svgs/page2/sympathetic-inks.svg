<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">SYMPATHETIC OR INVISIBLE INKS</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  lemon juice or milk (for heat-revealed)</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  paper</text>
  <text x="126" y="290" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  candle or heat source</text>
  <text x="110" y="330" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="356" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Write a secret message using lemon juice (or milk) on plain white</text>
  <text x="110" y="377" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">paper — dip a toothpick or small brush in the juice and write</text>
  <text x="110" y="398" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">carefully. Let it dry completely until invisible. To reveal: hold</text>
  <text x="110" y="419" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the paper a few inches above a candle or warm light bulb. The</text>
  <text x="110" y="440" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">organic acids in the lemon juice char at a lower temperature than</text>
  <text x="110" y="461" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the paper, making the letters appear in brown. A modern iron on a</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">low setting also works. For extra fun: use different invisible inks</text>
  <text x="110" y="503" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">that require different developers — lemon juice needs heat, while</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">other formulas need chemical developers.</text>
  <text x="110" y="565" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="589" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Invisible ink has a serious intelligence history: George</text>
  <text x="110" y="607" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Washington&apos;s spy network used a silver nitrate formula during the</text>
  <text x="110" y="625" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">American Revolutionary War, with Hercules Mulligan as a key</text>
  <text x="110" y="643" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">operative. The formula was invented by James Jay, brother of</text>
  <text x="110" y="661" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Founding Father John Jay.</text>
  <text x="110" y="695" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="719" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Various recipes produce invisible writing that can only be revealed</text>
  <text x="110" y="737" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">by specific treatments: lemon juice or milk revealed by heat, lead</text>
  <text x="110" y="755" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">acetate made visible by hydrogen sulfide gas, and sulphate of iron</text>
  <text x="110" y="773" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">revealed by oak galls solution. The book provides multiple formulas</text>
  <text x="110" y="791" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">for different secret writing scenarios.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)  ·  Heritage Parlor</text>
</svg>