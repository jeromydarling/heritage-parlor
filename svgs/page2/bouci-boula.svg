<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOUCI-BOULA</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  double glass bulb containing red and white pellets</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The glass object has two connected bulbs with small pellets of two</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">colors mixed together. Your goal: sort all pellets of one color</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">into one bulb and all of the other color into the other bulb —</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">without opening the glass. Tilt the object to consolidate all</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">pellets in one bulb. Shake gently — slight differences in size or</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">weight cause the pellets to partially sort. Carefully tilt to</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">transfer lighter or smaller pellets through the narrow connecting</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">neck first. Build toward full separation one group at a time.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Bouci-Boula was likely a French puzzle import — the name has no</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">clear English meaning but appears in French toy catalogs of the</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">1880s. Its elegant glass construction made it a desirable and</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">attractive curiosity as well as a genuine puzzle.</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="636" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A double glass bulb contains both red and white pellets mixed</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">together. The puzzle is to separate them by color — all red in one</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">bulb, all white in the other — without opening the glass. The</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">solution requires carefully tilting all pellets to one side,</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">shaking to group by color through size or density differences, then</text>
  <text x="110" y="726" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">transferring small groups across the narrow neck.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>