<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">BOUCI-BOULA</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  double glass bulb containing red and white pellets</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">The glass object has two connected bulbs with small pellets of two colors</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">mixed together. Your goal: sort all pellets of one color into one bulb and</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">all of the other color into the other bulb — without opening the glass. Tilt</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the object to consolidate all pellets in one bulb. Shake gently — slight</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">differences in size or weight cause the pellets to partially sort. Carefully</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">tilt to transfer lighter or smaller pellets through the narrow connecting</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">neck first. Build toward full separation one group at a time.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Bouci-Boula was likely a French puzzle import — the name has no clear English</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">meaning but appears in French toy catalogs of the 1880s. Its elegant glass</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">construction made it a desirable and attractive curiosity as well as a</text>
  <text x="56" y="503" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">genuine puzzle.</text>
  <text x="56" y="537" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A double glass bulb contains both red and white pellets mixed together. The</text>
  <text x="56" y="579" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">puzzle is to separate them by color — all red in one bulb, all white in the</text>
  <text x="56" y="597" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">other — without opening the glass. The solution requires carefully tilting</text>
  <text x="56" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">all pellets to one side, shaking to group by color through size or density</text>
  <text x="56" y="633" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">differences, then transferring small groups across the narrow neck.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>