<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE ERRATIC EGG</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  egg</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two wine glasses</text>
  <text x="56" y="254" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="280" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Balance an egg across the rims of two wine glasses placed close together</text>
  <text x="56" y="301" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(rims almost touching). Lean in and blow a short, sharp, horizontal puff of</text>
  <text x="56" y="322" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">air against the near side of the egg. The egg rolls over the gap and into the</text>
  <text x="56" y="343" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">far glass. The physics: the sharp airflow lowers pressure on the blown side</text>
  <text x="56" y="364" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(Bernoulli&apos;s principle) while pushing the egg forward. The key is a quick</text>
  <text x="56" y="385" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">horizontal burst rather than a gentle continuous stream. Practice over a</text>
  <text x="56" y="406" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">table first — the egg rolls cleanly once you get the puff angle right.</text>
  <text x="56" y="447" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="471" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Erratic Egg trick demonstrates Bernoulli&apos;s principle, described by Daniel</text>
  <text x="56" y="489" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Bernoulli in 1738. The same principle explains how airplane wings generate</text>
  <text x="56" y="507" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">lift. Victorian science writers delighted in finding domestic demonstrations</text>
  <text x="56" y="525" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">of this principle long before anyone dreamed of flight.</text>
  <text x="56" y="559" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="583" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">An egg is placed between two wine glasses. By blowing sharply on one side,</text>
  <text x="56" y="601" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">the egg hops from one glass to the other without being touched. The</text>
  <text x="56" y="619" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">aerodynamic pressure difference causes the transfer.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Magician&apos;s Own Book (1862)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>