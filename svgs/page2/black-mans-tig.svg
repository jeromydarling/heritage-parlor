<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">CHAIN TIG</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  rope</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Tie a rope to a fixed post. One player holds the free end and tries</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to tag others. Each tagged player joins the chain by holding hands,</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">extending the chain&apos;s reach. As the chain grows longer, it sweeps</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">across the playing area in an unstoppable line. The last free</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">player is the winner. A rope and a post are the only equipment</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">needed.</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="482" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">This rope-and-chain variant of Tig (British slang for Tag) is</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">notable for its use of growing team cooperation as a central</text>
  <text x="110" y="518" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">mechanic, making the game more exciting with every capture.</text>
  <text x="110" y="552" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="576" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A rope is tied to a gate or pole. One player holds the end and</text>
  <text x="110" y="594" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">tries to catch another. Once captured, the caught player joins the</text>
  <text x="110" y="612" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">chain by holding hands, helping to catch the rest. The chain grows</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">longer and longer until all are caught.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Traditional Games of England, Scotland, and Ireland, Vol. I (1894)  ·  Heritage Parlor</text>
</svg>