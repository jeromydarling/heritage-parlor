<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE MAGIC SWORD CARD CATCH</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  deck of cards</text>
  <text x="126" y="268" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  prop sword or letter knife</text>
  <text x="110" y="308" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="334" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Effect: An entire deck is thrown into the air and one chosen card</text>
  <text x="110" y="355" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">is caught on the tip of a sword. Method: Ask a spectator to choose</text>
  <text x="110" y="376" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">a card and return it to the deck. Crimp it slightly (bend it so it</text>
  <text x="110" y="397" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">protrudes from the pack). Hold a prop sword or letter opener in</text>
  <text x="110" y="418" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your right hand. Throw the deck upward with a spinning outward</text>
  <text x="110" y="439" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">motion. Thrust the blade into the cascade of flying cards — the</text>
  <text x="110" y="460" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">crimped card&apos;s slight separation makes it catchable with practice.</text>
  <text x="110" y="481" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Note: use a prop sword with a blunt tip. Clear the area first.</text>
  <text x="110" y="502" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Practice the throw and thrust separately before combining.</text>
  <text x="110" y="543" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="567" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The sword card catch was a favorite flourish of 19th-century stage</text>
  <text x="110" y="585" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">magicians. Hoffmann notes that Carl Herrmann performed it with</text>
  <text x="110" y="603" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">genuine swords thrown by assistants and could locate the card by</text>
  <text x="110" y="621" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">feel alone.</text>
  <text x="110" y="655" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="679" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A full deck is thrown into the air and the chosen card alone is</text>
  <text x="110" y="697" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">caught on a sword point.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Modern Magic (1876)  ·  Heritage Parlor</text>
</svg>