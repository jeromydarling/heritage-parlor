<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE WIFE OF BATH&apos;S RIDDLES</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Nothing special — just the game board on page 1.</text>
  <text x="56" y="232" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Two classic riddles. Riddle 1: Why is one stopper like another stopper?</text>
  <text x="56" y="279" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Answer: because one is &apos;bung&apos; (a barrel plug) and the other is also &apos;bung&apos;</text>
  <text x="56" y="300" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">(slang for &apos;thrown&apos;) — they&apos;re alike in name. Riddle 2: How can a son</text>
  <text x="56" y="321" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">truthfully say his mother is not his mother? Answer: the son&apos;s mother</text>
  <text x="56" y="342" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">remarried, becoming his grandmother&apos;s daughter-in-law — making his &apos;mother&apos;</text>
  <text x="56" y="363" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">in law not his birth mother. Riddling was a major Victorian parlor</text>
  <text x="56" y="384" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">entertainment.</text>
  <text x="56" y="425" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Riddles were the dominant intellectual entertainment of the Middle Ages —</text>
  <text x="56" y="467" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Dudeney&apos;s Wife of Bath speaks for centuries of riddle tradition from the Old</text>
  <text x="56" y="485" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">English Exeter Book to Lewis Carroll.</text>
  <text x="56" y="519" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="543" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Solve two classic riddles: Why is one bung like another? And how can a son</text>
  <text x="56" y="561" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">say his mother is not his mother?</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Canterbury Puzzles (1907)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>