<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE THAUMATROPE</text>
  <text x="408" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="134" x2="596" y2="134" stroke="#ccc" stroke-width="0.75"/>
  <text x="56" y="166" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="72" y="192" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  card disc</text>
  <text x="72" y="214" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  two strings</text>
  <text x="72" y="236" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  drawings on both sides</text>
  <text x="56" y="276" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="56" y="302" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Cut a circle from stiff card. Draw a bird on one side; draw an empty birdcage</text>
  <text x="56" y="323" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on the other side (oriented upside-down relative to the bird). Pierce holes</text>
  <text x="56" y="344" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">on opposite sides and thread strings through. Hold both strings, swing the</text>
  <text x="56" y="365" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">disc to wind them up, then pull both ends taut to make it spin. As it spins,</text>
  <text x="56" y="386" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">your eyes blend the two images and you see a bird sitting inside the cage.</text>
  <text x="56" y="407" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">This works because your brain holds each image for a fraction of a second —</text>
  <text x="56" y="428" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the same principle behind movies. Make your own with any two images you want</text>
  <text x="56" y="449" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">to combine.</text>
  <text x="56" y="490" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="56" y="514" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The thaumatrope was invented in 1826 and became a beloved scientific toy</text>
  <text x="56" y="532" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">throughout the Victorian era. Its principle of persistence of vision directly</text>
  <text x="56" y="550" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">led to the invention of cinema — the thaumatrope is a direct ancestor of the</text>
  <text x="56" y="568" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">motion picture.</text>
  <text x="56" y="602" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="56" y="626" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">A card disc with a bird drawn on one side and a cage drawn on the other is</text>
  <text x="56" y="644" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">attached to two strings. Twisting and releasing the strings makes the disc</text>
  <text x="56" y="662" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">spin rapidly — and the two images appear to merge into one picture of a bird</text>
  <text x="56" y="680" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">inside the cage, demonstrating persistence of vision.</text>
  <line x1="56" y1="992" x2="760" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="56" y="1012" font-family="Georgia, serif" font-size="11" fill="#555">Source: The Sociable, or One Thousand and One Home Amusements (1858)</text>
  <text x="760" y="1012" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#555">Heritage Parlor  ·  Page 2 of 2</text>
</svg>