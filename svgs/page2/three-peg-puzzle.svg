<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 1056" width="816" height="1056">
  <defs>
    <pattern id="ph2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="816" height="1056" fill="#faf6f0"/>
  <rect width="816" height="1056" fill="url(#ph2)"/>
  <rect x="24" y="24" width="768" height="1008" rx="2" fill="none" stroke="#1a1a1a" stroke-width="0.75" opacity="0.2"/>
  <text x="408" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1a1a1a" letter-spacing="2">THE THREE PEG PUZZLE</text>
  <text x="408" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Instructions</text>
  <line x1="220" y1="188" x2="596" y2="188" stroke="#ccc" stroke-width="0.75"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">What You Need</text>
  <text x="126" y="246" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">·  10 pegs or counters in two colors</text>
  <text x="110" y="286" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">How to Play</text>
  <text x="110" y="312" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Place 5 black pegs on the left side of an 11-hole row, leave the</text>
  <text x="110" y="333" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">center hole empty, and place 5 white pegs on the right. Black pegs</text>
  <text x="110" y="354" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">move rightward only; white pegs move leftward only. Legal moves:</text>
  <text x="110" y="375" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">slide one space forward into an empty hole, or jump over one peg of</text>
  <text x="110" y="396" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">the opposite color into an empty hole. Never move backward. Goal:</text>
  <text x="110" y="417" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">get all blacks to the right side and all whites to the left in 35</text>
  <text x="110" y="438" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">moves. Key tip to avoid deadlock: alternate between single-steps</text>
  <text x="110" y="459" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">and jumps, and never let three same-colored pegs block each other.</text>
  <text x="110" y="500" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#8b4513">Did You Know?</text>
  <text x="110" y="524" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">The Leapfrog Puzzle (as it&apos;s also called) is mathematically</text>
  <text x="110" y="542" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">equivalent to sorting algorithms in computer science. The optimal</text>
  <text x="110" y="560" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">35-move solution follows a pattern (1 jump, 2 jumps, 3 jumps...5</text>
  <text x="110" y="578" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">jumps...5 jumps, 4 jumps...1 jump) that Hoffmann found &apos;pleasing in</text>
  <text x="110" y="596" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">its mathematical regularity.&apos;</text>
  <text x="110" y="630" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#1a1a1a">Original Victorian Description</text>
  <text x="110" y="654" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">Five black and five white pegs are placed in a row of eleven holes</text>
  <text x="110" y="672" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">with one empty center hole. Black pegs on the left must reach the</text>
  <text x="110" y="690" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">right side, white pegs must reach the left — by moving forward one</text>
  <text x="110" y="708" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">step or jumping over one peg of the opposite color. The challenge</text>
  <text x="110" y="726" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#555">is to do it in the minimum number of moves.</text>
  <line x1="110" y1="992" x2="706" y2="992" stroke="#ccc" stroke-width="0.5"/>
  <text x="408" y="1012" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Source: Puzzles Old and New (1893)  ·  Heritage Parlor</text>
</svg>